# ═══════════════════════════════════════════════════════════════
# Pattern 001 — Réceptionniste IA vocale 24/7
# Version 2.0 : Trois voies d'implémentation (self-serve, accompagné, custom)
# ═══════════════════════════════════════════════════════════════

id: ai-voice-receptionist
title_fr: Réceptionniste IA vocale 24/7
category: service-client-appels
version: 2.0
last_updated: 2026-04-21
language: fr

# ───── RÉSUMÉS (prose narrative pour livrable client) ─────

summary_short_fr: >
  Agent IA qui répond aux appels téléphoniques 24 h/24, qualifie les
  demandes, prend des rendez-vous et transfère aux humains au besoin.

summary_long_fr: |
  Un agent IA vocal qui répond automatiquement aux appels téléphoniques
  24 h/24, 7 j/7. Il qualifie les demandes entrantes, prend des rendez-vous
  dans le calendrier de l'entreprise, et transfère les appels complexes à
  un humain quand c'est nécessaire. Idéal pour les entreprises de service
  où chaque appel manqué représente une vente perdue à la compétition.

# ───── CIBLAGE (tags structurés pour recherche vectorielle) ─────

target_industries:
  - plomberie
  - electricite
  - hvac
  - renovation
  - serrurerie
  - paysagement
  - demenagement
  - mecanique-auto
  - dentaire
  - veterinaire
  - chiropratique
  - therapie
  - salon-coiffure
  - spa-beaute
  - immobilier
  - droit-avocats
  - comptabilite
  - inspection-batiment

target_business_sizes:
  - solopreneur
  - micro-2-9
  - petite-10-49

tech_comfort_required: faible
requires_existing_phone_line: true

# ───── PROBLÈME (voix du client pour narratif) ─────

pain_point_fr: |
  Je rate des appels constamment. Mes clients me joignent pendant que je
  suis sur un chantier, et quand je rappelle deux heures plus tard, ils ont
  déjà appelé le concurrent. Les soirs et fins de semaine, c'est pire :
  personne ne répond, et le client ne revient jamais.

problem_facts:
  - claim_fr: "40 % à 50 % des appels dans les services à domicile se produisent hors heures ouvrables"
    source_id: avoca-top-flight-electric
  - claim_fr: "Un client qui attend plus de 30 secondes raccroche souvent pour appeler le prochain"
    source_id: avoca-my-plumber-plus
  - claim_fr: "Coût typique d'une réceptionniste humaine temps plein : environ 48 000 $ US/an"
    source_id: agentzap-pricing
  - claim_fr: "Selon FloatAI, les PME québécoises gagnent environ 15 h/semaine en gestion administrative et réduisent de 40 % les appels manqués avec l'IA"
    source_id: floatai-pme-quebec

# ───── SOLUTION (prose + structure) ─────

solution_summary_fr: |
  Un agent IA vocal est configuré sur la ligne téléphonique existante ou
  via un nouveau numéro dédié. L'IA répond en moins de 3 secondes, comprend
  la demande en langage naturel, qualifie l'urgence, prend le rendez-vous
  dans le calendrier de l'entreprise et transfère à un humain au besoin.
  Elle gère plusieurs appels simultanément et envoie un résumé par courriel
  ou Slack après chaque appel. Trois voies d'implémentation sont possibles
  selon le budget et le confort technique du client.

deployment_modes:
  - id: overflow
    name_fr: Débordement
    description_fr: L'IA prend les appels quand la ligne principale est occupée
  - id: after-hours
    name_fr: Après-heures
    description_fr: L'IA prend tous les appels en dehors des heures ouvrables
  - id: replacement
    name_fr: Remplacement complet
    description_fr: L'IA devient la réceptionniste principale (typique pour solopreneurs)

typical_capabilities:
  - Transcription et enregistrement automatique des appels
  - Intégrations CRM (HubSpot, Salesforce, Zoho, Zapier et 5000+ apps)
  - Qualification de leads avec questions personnalisées
  - Jusqu'à 50 paires question-réponse personnalisées
  - Numéro local ou sans frais dédié
  - Transfert intelligent multi-destinataires
  - Résumés d'appels envoyés par email, Slack ou Teams

# ───── VOIES D'IMPLÉMENTATION (core du pattern) ─────

implementation_paths:

  - id: self-serve
    name_fr: Voie A — Self-serve (autonomie)
    ideal_profile_fr: |
      Solopreneur qui veut tester avec engagement minimal. À l'aise avec la
      techno, accepte d'y passer une demi-journée, volume d'appels modéré.
      Budget limité (100-200 $/mois).
    description_fr: |
      Le client s'inscrit lui-même sur un service SaaS d'AI receptionist
      (AgentZap ou My AI Front Desk), fournit ses informations (services,
      tarifs, horaires, FAQ), teste et active. 5PennyAi intervient pour
      l'audit et la recommandation du bon outil et plan.
    setup_duration: quelques-heures
    client_time_required_hours:
      min: 4
      max: 8
    total_cost_cad:
      setup_range:
        min: 0
        max: 1500
      monthly_min: 150
      monthly_max: 300
      first_year: "1 800 à 5 100 $"
    recommended_tools_priority:
      - tool_id: my-ai-front-desk
        reason_fr: Positionnement solopreneur, no-code, pages sectorielles dédiées
      - tool_id: agentzap
        reason_fr: Plan Starter accessible, 72+ industries couvertes, setup guidé
    fivepennyai_service_fr: |
      Audit payant (99-299 $) qui identifie le bon outil et le bon plan
      pour le contexte client. Inclut liste de questions à paramétrer.
    fivepennyai_revenue_potential: faible-par-client-mais-volume
    honest_note_fr: |
      La voie self-serve est plus difficile pour le vocal que pour le chat.
      Il n'existe pas d'équivalent "Crisp gratuit" côté vocal. Les tarifs
      démarrent typiquement à 100 $/mois. La voie A est réaliste mais
      suppose que le client veut vraiment investir ce montant.

  - id: accompanied
    name_fr: Voie B — Accompagnement hybride (prêt-à-l'emploi)
    ideal_profile_fr: |
      PME de 5 à 20 employés (service à domicile, clinique, salon avec équipe)
      qui veut un résultat professionnel sans y perdre des soirées.
      Budget modéré (1 500-3 000 $ setup), préfère déléguer la configuration.
    description_fr: |
      5PennyAi configure l'outil SaaS choisi : setup complet sur AgentZap
      ou Avoca, rédaction des scripts d'accueil, configuration des FAQ,
      intégration au calendrier et au CRM, tests avec différents scénarios,
      formation du client (1 h) et support ponctuel 30 jours.
    setup_duration: 1-3-jours
    client_time_required_hours:
      min: 4
      max: 8
    total_cost_cad:
      setup_range:
        min: 1500
        max: 3500
      monthly_tool_range:
        min: 200
        max: 500
      first_year: "3 900 à 9 500 $"
    recommended_tools_priority:
      - tool_id: agentzap
        reason_fr: Meilleure documentation, tarifs transparents, 30 jours garantie
      - tool_id: avoca-ai
        reason_fr: Pour HVAC/plomberie établies, intégration ServiceTitan, cas documentés
    fivepennyai_service_fr: |
      Forfait "Réceptionniste IA clé en main" : audit + configuration complète
      + rédaction des scripts + tests + formation + 30 jours support.
    fivepennyai_revenue_potential: moyen-par-client

  - id: custom
    name_fr: Voie C — Développement sur mesure
    ideal_profile_fr: |
      PME de 20+ employés avec besoins très spécifiques : multi-locations,
      logique de dispatch complexe, intégration avec système legacy,
      branding strict, volume élevé. Budget 8 000 $+.
    description_fr: |
      5PennyAi développe un agent vocal custom en utilisant une plateforme
      comme Vapi, Retell AI, ou construction directe sur LiveKit + Anthropic.
      L'agent est entraîné sur le contexte exact du client, intégré à ses
      systèmes (CRM, ERP, calendrier métier), avec flux d'appel complexes.
    setup_duration: 3-6-semaines
    client_time_required_hours:
      min: 15
      max: 40
    total_cost_cad:
      setup_range:
        min: 8000
        max: 20000
      monthly_hosting_range:
        min: 100
        max: 800
      first_year: "9 200 à 29 600 $"
    recommended_tools_priority:
      - tool_id: vapi
        reason_fr: Plateforme de développement vocal IA, flexible, bon pour custom
      - tool_id: retell-ai
        reason_fr: Alternative à Vapi, approche API-first
      - tool_id: anthropic-api
        reason_fr: Moteur IA (Claude Sonnet 4) combiné à LiveKit pour voice
    fivepennyai_service_fr: |
      AI Sprint 3-6 semaines : développement, déploiement, formation,
      option maintenance mensuelle continue.
    fivepennyai_revenue_potential: eleve-par-client-mais-volume-faible
    honest_note_fr: |
      La voie custom vocale est techniquement plus complexe que le chat.
      Réserver aux clients qui ont un vrai besoin non couvert par AgentZap
      ou Avoca. Dans beaucoup de cas, la voie B est suffisante et plus rentable
      pour le client.

