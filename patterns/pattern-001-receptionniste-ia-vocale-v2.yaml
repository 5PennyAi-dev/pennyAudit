# ───── NOTES HONNÊTES (usage interne uniquement) ─────

internal_notes_fr: |
  CHANGEMENTS v1 → v2 :
  - Trois voies d'implémentation explicites (self-serve / accompagné / custom)
  - Ajout d'outils pour la voie custom (Vapi, Retell AI, Anthropic+LiveKit)
  - Intégrateurs québécois listés (FloatAI est le principal concurrent direct)
  - Champ `relevance_for_micro` ajouté aux cas clients pour filtrer les
    cas d'entreprises trop grosses
  - Champ `affiliate_potential` ajouté à chaque outil

  RÉALITÉ DU MARCHÉ VOCAL FRANÇAIS :
  Contrairement au chat où Crisp offre une solution française native gratuite,
  il n'existe PAS d'équivalent côté vocal. Tous les outils majeurs (AgentZap,
  Avoca, My AI Front Desk) sont anglophones et entraînés sur du français
  européen au mieux. Pour un client qui exige un français québécois impeccable,
  la voie B (accompagnée) ou C (custom) devient pratiquement obligatoire.

  VOIE A DIFFICILE EN VOCAL :
  La voie self-serve est moins accessible pour le vocal que pour le chat.
  Tarif minimum réaliste 109 $/mois + setup 1000 $. Pour un plombier qui
  gagne 60 000 $/an, c'est un engagement notable. Dans l'audit, présenter
  honnêtement ce coût et montrer le ROI basé sur les cas documentés.

  POSITIONNEMENT 5PENNYAI :
  - Voie A : audit + pointage vers AgentZap (vérifier programme partenaires)
  - Voie B : sweet spot, forfait 1500-3500 $ + mensuel outil
  - Voie C : AI Sprints 8000-20000 $, réserver aux vrais besoins custom
    (français exigeant, multi-locations, logique dispatch complexe)

  CAS CLIENTS À PRIVILÉGIER POUR MICRO-ENTREPRISE :
  ProFlow Plumbing, Premier Dental, Glow Beauty, Pawsome Pet Clinic,
  Rapid Response Locksmith, Harmony Wellness sont le plus transposables.
  My Plumber Plus (129M$) est impressionnant mais pas représentatif.
  FloatAI pour le benchmark local québécois.

