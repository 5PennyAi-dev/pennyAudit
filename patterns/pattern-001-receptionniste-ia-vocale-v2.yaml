# ───── RISQUES ─────

risks:
  - type: technique
    title_fr: Hallucinations possibles
    severity: moyen
    description_fr: L'IA peut donner une information erronée sur un service ou un tarif si mal configurée
    mitigation_fr: Limiter à un set de FAQ vérifiées, tester en production avec écoute des premiers enregistrements

  - type: technique
    title_fr: Performance en français québécois
    severity: moyen
    description_fr: |
      La plupart des outils (AgentZap, Avoca) sont entraînés sur corpus
      anglophone nord-américain; accents régionaux et anglicismes
      peuvent poser problème. Pas d'équivalent Crisp côté vocal.
    mitigation_fr: |
      Tester spécifiquement en français québécois avant déploiement.
      Prévoir ajustements. Pour cas sensibles au français parfait,
      envisager voie C avec Anthropic API (Claude performe très bien en FR).

  - type: technique
    title_fr: Dépendance à l'infrastructure
    severity: faible
    description_fr: Coupure Internet ou téléphonique = coupure du service
    mitigation_fr: Avoir un plan B (transfert vers mobile personnel en cas de panne)

  - type: business
    title_fr: Réaction négative de certains clients
    severity: moyen
    description_fr: Clientèle âgée ou particulière peut préférer un humain et raccrocher
    mitigation_fr: Offrir explicitement une option "tapez 0 pour un humain" en début d'appel

  - type: business
    title_fr: Image de marque
    severity: moyen
    description_fr: Un agent IA mal configuré peut nuire à la réputation
    mitigation_fr: Choisir un outil avec voix de qualité, ajuster le script, monitorer les premiers appels

  - type: business
    title_fr: Coûts variables
    severity: faible
    description_fr: Dépassement des minutes incluses peut faire grimper la facture
    mitigation_fr: Monitorer le volume le premier mois et ajuster le plan si nécessaire

  - type: business
    title_fr: Dépendance fournisseur
    severity: faible
    description_fr: Changer d'outil implique une reconfiguration complète
    mitigation_fr: Documenter la configuration, garder les données d'appel exportables

  - type: reglementaire-qc
    title_fr: Loi 25 (protection des renseignements personnels)
    severity: important
    description_fr: Données personnelles captées par l'IA doivent respecter les obligations de consentement, conservation et sécurité
    mitigation_fr: Politique de confidentialité à jour, vérification de la localisation des données, signaler l'enregistrement

  - type: reglementaire-qc
    title_fr: Enregistrement des appels
    severity: important
    description_fr: L'enregistrement des appels doit être annoncé en début d'appel
    mitigation_fr: Script d'accueil qui mentionne l'enregistrement explicitement

  - type: reglementaire-qc
    title_fr: Renseignements de santé (cliniques)
    severity: important
    description_fr: Données de santé particulièrement sensibles, obligations provinciales spécifiques
    mitigation_fr: Vérifier conformité HIPAA/BAA et obligations provinciales canadiennes applicables

# ───── PRÉREQUIS ─────

prerequisites:
  - Ligne téléphonique d'entreprise active
  - Calendrier numérique utilisé activement (Google Calendar, Outlook, Calendly, Jobber, ServiceTitan, Acuity)
  - Liste claire et à jour des services, tarifs, horaires et FAQ
  - Connexion Internet stable au bureau
  - Consentement à l'enregistrement des appels
  - Pour cliniques : vérification de la conformité santé

