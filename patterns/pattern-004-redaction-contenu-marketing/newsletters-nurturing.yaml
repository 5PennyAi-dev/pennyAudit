type: implementation_template
id: newsletters-nurturing
use_case_fr: |
  Production d'une newsletter régulière et de séquences d'emails
  de nurturing pour entretenir la relation avec une base de contacts
  qualifiés (clients passés, prospects tièdes, communauté).
triggers_when:
  industry_in:
    - commerce-en-ligne
    - boutique-vetements
    - bijouterie
    - cosmetiques
    - immobilier
    - agent-immobilier
    - courtier-immobilier
    - coach-vie
    - coach-business
    - consultant-solo
    - therapie
