risks:
  - type: technique
    title_fr: Qualité variable du contenu
    severity: moyen
    description_fr: |
      Le contenu IA brut peut être générique, répétitif, ou contenir des
      erreurs factuelles. Sans révision humaine, la qualité baisse et
      le contenu devient reconnaissable comme "de l'IA".
    mitigation_fr: |
      Toujours réviser le contenu avant publication. Former le client à
      reconnaître le "ton IA" et à ajouter sa touche personnelle. Créer
      une voix de marque forte dans les prompts pour démarquer.
  - type: technique
    title_fr: Hallucinations sur les faits
    severity: moyen
    description_fr: |
      L'IA peut inventer des statistiques, citations, références qui
      semblent plausibles mais sont fausses. Risque de diffuser de la
      désinformation.
    mitigation_fr: |
      Toujours vérifier les faits, statistiques et citations avant
      publication. Utiliser Perplexity ou ChatGPT en mode recherche web
      pour les contenus qui nécessitent des faits vérifiés.
  - type: technique
    title_fr: Français québécois
    severity: faible-a-moyen
    description_fr: |
      Les outils IA sont entraînés majoritairement sur français européen.
      Des expressions peuvent sonner "France" plutôt que "Québec".
    mitigation_fr: |
      Claude gère mieux le français québécois que ChatGPT. Spécifier dans
      le prompt "utilise un français québécois naturel". Relire et ajuster
      les expressions francées.
  - type: business
    title_fr: Dilution de la voix de marque
    severity: moyen
    description_fr: |
      Sans configuration soignée, le contenu IA peut sonner générique et
      diluer la personnalité de la marque. Tous les clients qui utilisent
      ChatGPT finissent par sonner pareil.
    mitigation_fr: |
      Investir du temps initial dans la définition de la voix de marque
      (c'est la vraie valeur de la voie B). Créer des prompts qui encodent
      cette voix. Relire et ajouter des touches personnelles.
  - type: business
    title_fr: Détection de contenu IA
    severity: faible
    description_fr: |
      Les moteurs de recherche et certaines plateformes détectent le
      contenu IA pur. Risque de pénalité SEO (rare en pratique si le
      contenu est de qualité).
    mitigation_fr: |
      Publier du contenu de qualité, pas juste du volume. Google pénalise
      le contenu médiocre, pas le contenu IA par essence. Ajouter de la
      valeur humaine (anecdotes, expertise, opinions personnelles).
  - type: business
    title_fr: Dépendance à l'outil
    severity: faible
    description_fr: |
      Le client peut devenir dépendant de l'IA et perdre ses compétences
      d'écriture/créativité.
    mitigation_fr: |
      Positionner l'IA comme assistant, pas comme remplaçant. Former le
      client à utiliser l'IA comme un "copilote" avec sa propre direction
      créative.
  - type: reglementaire-qc
    title_fr: Transparence sur l'utilisation de l'IA
    severity: moyen
    description_fr: |
      Règles en évolution sur l'obligation de divulguer l'usage d'IA dans
      le contenu publicitaire et marketing. L'AI Transparency Act
      européen (2025) exige mention obligatoire pour contenu publicitaire
      IA. Le Canada suit une tendance similaire.
    mitigation_fr: |
      Pour les campagnes publicitaires importantes, envisager mention
      discrète. Pour le contenu organique (posts, articles), la révision
      humaine substantielle atténue le risque.
  - type: reglementaire-qc
    title_fr: Propriété intellectuelle
    severity: faible
    description_fr: |
      Zones grises sur qui possède le contenu généré par IA. Les grandes
      plateformes (OpenAI, Anthropic) accordent les droits à l'utilisateur,
      mais les règles évoluent.
    mitigation_fr: |
      Lire les conditions d'utilisation de chaque outil. Garder une trace
      des contributions humaines (prompts, édition) pour démontrer la
      paternité en cas de besoin.
  - type: reglementaire-qc
    title_fr: Loi 25 (protection des renseignements personnels)
    severity: moyen
    description_fr: |
      Si le client utilise des données personnelles de ses propres clients
      (ex. email de liste, noms, historique) dans les prompts IA, ces
      données peuvent être traitées par les serveurs de l'outil IA.
    mitigation_fr: |
      Ne pas inclure de données personnelles dans les prompts. Utiliser
      des plans business (ChatGPT Team, Claude Team) qui offrent des
      garanties renforcées sur la non-utilisation des données pour
      l'entraînement.
prerequisites:
  - Avoir une idée claire de la voix de la marque (ton, vocabulaire, valeurs)
  - Avoir identifié les publics cibles (personas)
  - Avoir au moins une plateforme de publication active (site web, réseaux sociaux, liste email)
  - Avoir du contenu existant qui peut servir d'exemple (pour entraîner l'IA)
  - Accepter de faire de la révision humaine systématique
  - Pour e-commerce: catalogue produits accessible
