pain_point_fr: |
  Je sais que je devrais publier plus souvent sur Instagram et Facebook,
  envoyer une infolettre régulière, tenir un blog. Mais quand je m'assois
  pour écrire, je reste bloqué devant ma page blanche. Quand je finis
  par écrire quelque chose, ça me prend des heures et je ne suis jamais
  satisfait. Résultat : je publie trois fois par mois quand je devrais
  publier trois fois par semaine. Je vois mes concurrents publier sans
  arrêt et je me demande comment ils font.
problem_facts:
  - claim_fr: 60 % du temps de création de contenu est passé sur la structuration, le brainstorming et la première version, pas sur l'expertise métier
    source_id: comkuate-ia-marketing
  - claim_fr: Un message publicitaire généré avec aide de l'IA augmente en moyenne de 32 % le taux de clics selon HubSpot 2025
    source_id: aivancity-ia-redaction
  - claim_fr: 78 % des agences marketing dans le monde utilisent désormais des outils d'IA générative en 2026 (+42 % depuis 2023)
    source_id: aivancity-ia-redaction
  - claim_fr: Les entreprises utilisant Jasper rapportent 50 à 80 % de gain de temps sur la création de contenu
    source_id: prompts-ai-content-platforms
solution_summary_fr: |
  On met en place un workflow IA adapté au contexte du client : ChatGPT
  ou Claude comme moteur principal de rédaction, avec des prompts
  personnalisés qui encodent la voix de la marque, les publics cibles
  et les formats utilisés. Pour la partie visuelle, on ajoute Canva Magic
  (création facile) et/ou Midjourney/DALL-E (création avancée). Pour les
  clients plus exigeants sur le SEO, on ajoute Surfer SEO. Le client
  apprend à utiliser ces outils avec confiance pour les tâches récurrentes :
  3-5 posts sociaux par semaine, une infolettre par mois, descriptions
  produits, articles de blog, scripts. La révision humaine reste
  indispensable : l'IA produit un brouillon de qualité, pas une version
  finale.
content_subcategories:
  - id: social-media-posts
    name_fr: Posts réseaux sociaux
    description_fr: Instagram, Facebook, LinkedIn, TikTok scripts. Posts avec accroches, hashtags, appels à l'action.
    typical_frequency: 3-5-par-semaine
    typical_time_saved_per_week_hours: 3-5
  - id: blog-articles
    name_fr: Articles de blog
    description_fr: Articles de fond (800-2000 mots) avec structure, SEO, sous-titres. Point fort pour acquisition organique.
    typical_frequency: 1-4-par-mois
    typical_time_saved_per_article_hours: 2-4
  - id: newsletters
    name_fr: Infolettres et courriels marketing
    description_fr: Contenu d'infolettres mensuelles ou hebdomadaires, courriels de relance, campagnes de promotion.
    typical_frequency: 1-2-par-mois
    typical_time_saved_per_newsletter_hours: 1-3
  - id: product-descriptions
    name_fr: Descriptions de produits ou de propriétés
    description_fr: |
      Pour e-commerce, descriptions attractives et optimisées SEO à l'échelle
      (10-1000 produits). Pour courtage immobilier au Québec, génération
      de fiches Centris (descriptions des propriétés mises en marché) qui
      passent typiquement de 30-60 minutes manuelles à 5-10 minutes avec
      un LLM bien prompté — tout en respectant les règles publicitaires
      OACIQ. Voir le profil sectoriel courtage immobilier QC pour le
      contexte réglementaire.
    typical_frequency: une-fois-puis-mise-a-jour
    typical_time_saved_per_100_products_hours: 10-20
  - id: ad-copy
    name_fr: Textes publicitaires
    description_fr: Annonces Facebook, Google, Instagram. Variations A/B, accroches, appels à l'action multiples.
    typical_frequency: par-campagne
    typical_time_saved_per_campaign_hours: 2-5
  - id: visual-content
    name_fr: Visuels pour le web et réseaux sociaux
    description_fr: Images pour posts, bannières, miniatures vidéo, infographies simples via Canva Magic, DALL-E, Midjourney.
    typical_frequency: avec-chaque-post
    typical_time_saved_per_visual_hours: 0.5-1
  - id: video-scripts
    name_fr: Scripts vidéo courts
    description_fr: Scripts pour Reels, TikTok, YouTube Shorts, vidéos explicatives de 30 sec à 3 min.
    typical_frequency: 1-3-par-semaine
    typical_time_saved_per_script_hours: 0.5-1
  - id: customer_communications
    name_fr: Réponses clients et communications
    description_fr: Réponses aux avis Google/Facebook, gestion de commentaires, réponses courriels récurrentes.
    typical_frequency: continue
    typical_time_saved_per_week_hours: 2-4
implementation_paths:
  - id: self-serve
    name_fr: Voie A — Self-serve (autonomie)
    ideal_profile_fr: |
      Solopreneur ou micro-entreprise qui veut commencer à utiliser l'IA
      pour son marketing sans budget. Confortable avec la technologie,
      prêt à apprendre à "parler" à une IA, veut garder le contrôle créatif.
    description_fr: |
      Le client s'inscrit à ChatGPT (plan gratuit ou Plus à 20 $/mois) ou
      Claude (plan gratuit ou Pro à 20 $/mois) et Canva (plan gratuit ou
      Pro à 12,99 $/mois). 5PennyAi fournit un audit payant qui inclut :
      10-15 prompts personnalisés pour les besoins du client (posts sociaux,
      articles de blog, infolettres, descriptions produits), un guide
      "voix de marque" rédigé pour le client, et un plan de workflow
      hebdomadaire. Le client est autonome après.
    setup_duration: quelques-heures
    client_time_required_hours:
      min: 3
      max: 6
    total_cost_cad:
      setup_range:
        min: 0
        max: 200
      monthly_min: 0
      monthly_max: 60
      first_year: 0 à 920 $
    recommended_tools_priority:
      - tool_id: claude-ai
        reason_fr: Meilleure qualité d'écriture naturelle, moins de révision nécessaire
      - tool_id: chatgpt
        reason_fr: Plus populaire, plus de tutoriels et communauté, polyvalent
      - tool_id: canva
        reason_fr: Visuels rapides et professionnels, plan gratuit très utilisable
    fivepennyai_service_fr: |
      Audit payant (99-299 $) incluant un "Marketing AI Starter Kit" :
      guide voix de marque + 10-15 prompts personnalisés + plan de
      workflow hebdomadaire + recommandations d'outils.
    fivepennyai_revenue_potential: faible-par-client-mais-volume-tres-eleve
  - id: accompanied
    name_fr: Voie B — Accompagnement hybride (setup + formation)
    ideal_profile_fr: |
      PME ou solopreneur qui veut des résultats professionnels rapidement,
      pas juste des prompts basiques. Prêt à investir dans une configuration
      solide : voix de marque affinée, templates de contenu, intégration
      aux outils existants (Canva Pro, Mailchimp, réseaux sociaux), formation
      de l'équipe.
    description_fr: |
      5PennyAi configure l'ensemble du workflow marketing IA : (1) création
      d'une "bibliothèque de prompts" personnalisée selon les types de
      contenu du client, (2) entraînement de Claude/ChatGPT Custom GPT sur
      la voix de marque et le contenu existant, (3) mise en place de
      templates Canva au branding du client, (4) formation de 2-4 heures
      sur l'utilisation quotidienne, (5) workflow hebdomadaire documenté,
      (6) support 30 jours. Pour clients plus avancés : intégration Make
      ou Zapier pour automatiser la publication.
    setup_duration: 1-3-jours
    client_time_required_hours:
      min: 4
      max: 10
    total_cost_cad:
      setup_range:
        min: 1000
        max: 3000
      monthly_tool_range:
        min: 30
        max: 100
      first_year: 1 360 à 4 200 $
    recommended_tools_priority:
      - tool_id: claude-ai
        reason_fr: Pour la qualité de l'écriture et les Projects (base de connaissance)
      - tool_id: chatgpt
        reason_fr: Pour les Custom GPTs entraînés sur la marque
      - tool_id: canva
        reason_fr: Plan Pro pour Magic Resize et Brand Kit
      - tool_id: jasper
        reason_fr: Si le client veut un outil spécialisé marketing avec Brand Voice intégré
    fivepennyai_service_fr: |
      Forfait "Marketing AI Clé en Main" : audit + bibliothèque de prompts +
      Custom GPT/Claude Project + templates Canva + formation 2-4h +
      workflow documenté + 30 jours support. Option : rétention mensuelle
      pour ajustements continus et nouveau contenu.
    fivepennyai_revenue_potential: moyen-par-client
  - id: custom
    name_fr: Voie C — Développement sur mesure
    ideal_profile_fr: |
      PME avec volume de contenu élevé ou besoins très spécifiques :
      génération automatique de descriptions produits à l'échelle (1000+
      produits), newsletter personnalisée par segment de clients, analyse
      de performance avec ajustement IA du contenu, intégration profonde
      avec CMS ou plateforme e-commerce.
    description_fr: |
      5PennyAi développe une solution custom avec Anthropic API ou OpenAI
      API directement intégrée aux systèmes du client. Exemples : pipeline
      qui prend un nouveau produit dans Shopify et génère automatiquement
      sa description SEO + un post Instagram + une description Amazon +
      un courriel aux abonnés, tout en une fois. Ou : outil qui analyse
      les posts qui ont le mieux marché et génère des variantes similaires.
      C'est de ce type de projet que PennySEO est un exemple concret.
    setup_duration: 2-6-semaines
    client_time_required_hours:
      min: 10
      max: 30
    total_cost_cad:
      setup_range:
        min: 5000
        max: 20000
      monthly_hosting_range:
        min: 50
        max: 500
      first_year: 5 600 à 26 000 $
    recommended_tools_priority:
      - tool_id: anthropic-api
        reason_fr: Claude Sonnet 4 pour la rédaction de qualité à l'échelle (stack que 5PennyAi maîtrise)
      - tool_id: openai-api
        reason_fr: GPT-5 pour cas où les intégrations tierces sont plus matures
      - tool_id: make-zapier
        reason_fr: Orchestration des workflows sans code serveur additionnel
    fivepennyai_service_fr: |
      AI Sprint 2-6 semaines : développement, déploiement, formation.
      PennySEO est un exemple concret de ce qu'on peut livrer (pipeline
      multi-modèles IA pour génération de fiches SEO Etsy).
    fivepennyai_revenue_potential: eleve-par-client-mais-volume-faible
