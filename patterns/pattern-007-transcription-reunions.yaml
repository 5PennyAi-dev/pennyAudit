# ───── PROBLÈME (voix du client pour narratif) ─────

pain_point_fr: |
  Je suis consultante. Je fais entre 15 et 20 appels client par semaine.
  Pendant l'appel, je gribouille des notes sur mon iPad en essayant
  d'écouter en même temps. Après chaque appel, je passe 20-30 minutes
  à mettre mes notes au propre, à extraire les décisions, à envoyer
  un courriel de suivi avec les prochaines étapes. Quand un client me
  rappelle deux mois plus tard pour reprendre un dossier, je suis
  obligée de fouiller dans des notes manuscrites pour me rappeler ce
  qu'on s'était dit. Si une décision a été prise et que je ne l'ai pas
  notée, c'est ma parole contre la sienne. Pour mes appels confidentiels
  (clients en détresse, dossiers sensibles), je ne peux pas juste
  utiliser n'importe quel outil — la confidentialité, c'est non
  négociable.

problem_facts:
  - claim_fr: "Le professionnel moyen passe environ 15 heures par semaine en réunion selon les données compilées par Taskade"
    source_id: taskade-meeting-summarizers
  - claim_fr: "Les tech managers consacrent typiquement plus de quatre heures par semaine à résumer leurs appels selon Index"
    source_id: index-otter-fireflies-fathom
  - claim_fr: "Selon Till Freitag, sur 31 heures mensuelles en réunion, environ 8 à 12 heures sont consacrées à la prise de notes et au suivi"
    source_id: till-freitag-comparison
  - claim_fr: "Otter atteint 70-75 % de précision en français vs 90-95 % pour des outils optimisés français selon AudiosTranscribe"
    source_id: audiostranscribe-comparison
  - claim_fr: "La majorité des décisions et actions issues d'une réunion s'évaporent dans les 24 heures qui suivent en l'absence de notes structurées"
    source_id: taskade-meeting-summarizers

# ───── SOLUTION (prose + structure) ─────

solution_summary_fr: |
  On déploie un outil de transcription/résumé adapté au profil et aux
  contraintes de confidentialité. Pour la majorité des PME, un outil
  cloud grand public (Fathom gratuit, Fireflies, tl;dv) couvre les
  besoins essentiels avec une qualité acceptable et des intégrations
  riches (Zoom, Teams, Meet, CRM). Pour les utilisateurs qui veulent
  éviter qu'un bot soit visible dans la liste des participants —
  notamment lors d'appels client B2B où l'optique compte — un outil
  local sans bot (Granola, Jamie, Meetily) capture l'audio directement
  depuis l'appareil. Pour les francophones exigeants ou les contextes
  multilingues, un outil optimisé français (Happy Scribe, Noota,
  AudiosTranscribe) produit des transcriptions sensiblement plus
  précises que les outils anglo-saxons. Pour les professions soumises
  au secret professionnel (avocats, notaires, comptables, médecins,
  psychothérapeutes), la conformité Loi 25 impose des choix spécifiques :
  outil européen RGPD (Noota, Dicte.AI), traitement local (Meetily
  open source), ou voie custom avec hébergement Canada.

deployment_modes:
  - id: bot-cloud
    name_fr: Bot IA qui rejoint la réunion
    description_fr: |
      Fathom, Fireflies, Otter, tl;dv. Un participant nommé « Notetaker »
      ou similaire rejoint la réunion via le calendrier (Zoom, Teams,
      Meet) et capture l'audio. Setup le plus simple. Le bot étant
      visible, à proscrire pour appels confidentiels ou contextes où
      l'optique compte.

  - id: bot-free-local
    name_fr: Capture locale sans bot
    description_fr: |
      Granola, Jamie, Meetily. L'application capte l'audio directement
      depuis l'appareil (microphone et son système). Aucun participant
      additionnel dans la réunion. Idéal pour appels client, contextes
      B2B exigeants, et professions sensibles.

  - id: native-platform
    name_fr: IA native de la plateforme
    description_fr: |
      Zoom AI Companion, Microsoft Copilot dans Teams, Google Meet
      Gemini. Inclus dans l'abonnement de la plateforme (selon plan).
      Pas d'outil tiers à installer. Qualité progressivement comparable
      aux solutions dédiées en 2026.

  - id: hardware-portable
    name_fr: Dispositif d'enregistrement portable
    description_fr: |
      Plaud NotePin, Limitless AI Pendant. Petit dispositif porté ou
      posé qui enregistre les conversations en personne (réunions
      physiques, déplacements, terrain). Pour professionnels qui ont
      autant de réunions hors écran qu'à l'écran.

  - id: rgpd-eu-tools
    name_fr: Outils européens conformes RGPD
    description_fr: |
      Happy Scribe (Barcelone), Noota (France), Dicte.AI (France),
      Tixeo (France). Conformité RGPD native, hébergement UE, parfois
      certification SOC 2 et ISO 27001. Pertinent pour cibles québécoises
      sensibles à la Loi 25.

  - id: self-hosted-open-source
    name_fr: Auto-hébergé / open source
    description_fr: |
      Meetily, Whisper d'OpenAI déployé en local. Traitement 100 %
      local sur l'ordinateur du client. Aucune donnée ne quitte
      l'appareil. Pour cabinets professionnels avec exigences extrêmes
      ou clients qui veulent zéro dépendance cloud.

  - id: custom-agent
    name_fr: Agent IA custom pour transcription
    description_fr: |
      Pipeline custom Whisper + Claude API + stockage Canada. Pour
      cabinets ayant besoin de logique métier spécifique : extraction
      automatique de termes juridiques vers un dossier, intégration
      à un dossier patient électronique, génération de notes cliniques
      structurées, conformité ordre professionnel.

typical_capabilities:
  - Transcription verbatim avec horodatage par phrase
  - Identification automatique des différents locuteurs
  - Résumé structuré (décisions, actions à suivre, sujets abordés)
  - Extraction des points clés et des questions soulevées
  - Recherche en langage naturel dans toutes les réunions passées
  - Export vers CRM, gestionnaire de projet, prise de notes (Notion, Slack)
  - Traduction du résumé entre français et anglais
  - Création de clips vidéo de moments clés à partager
  - Support des réunions en personne via micro local
  - Coaching de communication (tl;dv, Avoma) pour équipes vente
  - Posage automatique des actions dans Asana, ClickUp, Jira
  - Génération de courriels de suivi à partir des décisions

# ───── VOIES D'IMPLÉMENTATION (core du pattern) ─────

implementation_paths:

  - id: self-serve
    name_fr: Voie A — Self-serve (autonomie)
    ideal_profile_fr: |
      Solopreneur ou micro-équipe (1-5 personnes), 5 à 20 réunions par
      semaine, budget minimal. Anglais ou bilingue. Confidentialité
      standard (pas de secret professionnel). Veut tester avant
      d'investir. Souvent : consultants, freelances, équipes vente B2B
      petite échelle, dirigeants PME modernes.
    description_fr: |
      Le client active Fathom (gratuit, illimité pour individus) ou
      Fireflies (plan gratuit 800 minutes/mois) sur son calendrier.
      Configuration prend 30 minutes : connexion calendrier, choix
      des réunions à transcrire automatiquement, configuration des
      résumés à envoyer. 5PennyAi fournit un audit qui recommande
      l'outil selon le profil, les bons paramètres de confidentialité,
      les modèles de prompts pour personnaliser les résumés (par
      exemple : « pour mes appels de coaching, focus sur les blocages
      identifiés et les engagements pris »), et la routine de revue
      hebdomadaire.
    setup_duration: 1-3-heures
    client_time_required_hours:
      min: 1
      max: 3
    total_cost_cad:
      setup_range:
        min: 0
        max: 200
      monthly_min: 0
      monthly_max: 50
      first_year: "0 à 800 $"
    recommended_tools_priority:
      - tool_id: fathom
        reason_fr: Plan gratuit illimité pour individus, summaries en 30 secondes, qualité reconnue
      - tool_id: fireflies
        reason_fr: 800 min gratuites/mois, plus d'intégrations CRM et automatisations
      - tool_id: granola
        reason_fr: Bot-free pour utilisateurs Mac qui veulent éviter le bot dans réunions client
      - tool_id: zoom-ai-companion
        reason_fr: Inclus si client a déjà Zoom Pro+, pas d'outil additionnel à gérer
    fivepennyai_service_fr: |
      Audit payant (99-199 $) : analyse du profil de réunions, choix
      d'outil, configuration, modèles de prompts personnalisés selon le
      métier, intégrations basiques (calendrier, courriel), routine de
      revue. Pour francophones purs, ajustement vers Happy Scribe ou
      Noota recommandé.
    fivepennyai_revenue_potential: faible-par-client-mais-volume-eleve

  - id: accompanied
    name_fr: Voie B — Accompagnement hybride (setup + formation)
    ideal_profile_fr: |
      PME 5-50 employés, ou cabinet professionnel (avocat, comptable,
      consultant) avec contraintes de confidentialité réelles, ou
      équipe vente B2B avec besoin de coaching et CRM sync. Volume
      souvent 30+ réunions/semaine cumulés sur l'équipe. Souvent
      francophones exigeants, ou multilingues (FR/EN/ES).
    description_fr: |
      5PennyAi configure une plateforme adaptée : Fireflies Business
      ou tl;dv pour équipes B2B avec CRM sync, Granola pour cabinets
      sensibles à la confidentialité, Happy Scribe ou Noota pour
      francophones exigeants ou cabinets professionnels. Inclut :
      audit des contraintes de confidentialité, configuration multi-
      utilisateurs avec contrôles d'accès, modèles de comptes rendus
      par type de réunion (1:1, vente, RH, brief client), intégration
      CRM (Salesforce, HubSpot, Pipedrive) et gestionnaire de projet
      (Asana, ClickUp), formation 2-3 heures (incluant éthique du
      consentement), document de politique interne sur l'usage de la
      transcription IA, support 30 jours.
    setup_duration: 3-7-jours
    client_time_required_hours:
      min: 6
      max: 15
    total_cost_cad:
      setup_range:
        min: 1500
        max: 4500
      monthly_tool_range:
        min: 50
        max: 500
      first_year: "2 100 à 10 500 $"
    recommended_tools_priority:
      - tool_id: fireflies
        reason_fr: Meilleure intégration CRM (Salesforce, HubSpot, 40+ apps)
      - tool_id: tldv
        reason_fr: Conforme RGPD (Allemagne), partenariat Anthropic, 30+ langues
      - tool_id: granola
        reason_fr: Sans bot, qualité de notes premium, cabinets professionnels
      - tool_id: happy-scribe
        reason_fr: 150+ langues à 95 %+, transcription de fichiers, hébergé Barcelone
      - tool_id: noota
        reason_fr: Français de qualité, EU data centers, RGPD/SOC2/ISO 27001, support entrevues recrutement
      - tool_id: avoma
        reason_fr: Pour équipes vente avec besoins de coaching et analyse de deals
    fivepennyai_service_fr: |
      Forfait « Réunions IA Clé en Main » : audit confidentialité +
      configuration outil + 3 à 5 modèles de comptes rendus + intégration
      CRM/calendrier + formation équipe + politique interne d'usage +
      30 jours support. Option rétention mensuelle pour ajustement
      continu des prompts et modèles.
    fivepennyai_revenue_potential: moyen-par-client

  - id: custom
    name_fr: Voie C — Solution sur mesure / souveraine
    ideal_profile_fr: |
      Cabinet d'avocats, étude de notaires, cabinet comptable, clinique
      ou pratique professionnelle avec exigences extrêmes : secret
      professionnel strict, hébergement Canada obligatoire, intégration
      à un système métier propriétaire (dossier patient électronique,
      gestionnaire de dossiers juridiques). Ou organisme avec données
      classifiées et politique de souveraineté forte.
    description_fr: |
      5PennyAi déploie une solution custom : pipeline Whisper (auto-
      hébergé ou OpenAI Whisper API zone canadienne) + Claude API
      pour résumés + stockage chiffré sur AWS Canada Central ou
      Supabase région Canada. Alternative auto-hébergée : Meetily
      open source déployé sur poste de travail ou serveur interne, ce
      qui fait que les données ne quittent jamais l'organisation.
      Inclut : intégration au système métier client, modèles de notes
      structurées par type de dossier, conformité documentée pour
      l'ordre professionnel applicable, formation, gestion du
      consentement client (générateur de clauses), audit annuel de
      conformité.
    setup_duration: 4-10-semaines
    client_time_required_hours:
      min: 25
      max: 60
    total_cost_cad:
      setup_range:
        min: 12000
        max: 35000
      monthly_hosting_range:
        min: 100
        max: 800
      first_year: "13 200 à 44 600 $"
    recommended_tools_priority:
      - tool_id: anthropic-api
        reason_fr: Claude pour qualité française et raisonnement sur contenu sensible
      - tool_id: whisper-api
        reason_fr: Transcription Whisper d'OpenAI ou Deepgram (zone canadienne possible)
      - tool_id: meetily
        reason_fr: Si client veut zéro dépendance cloud — open source, 100 % local
      - tool_id: tixeo
        reason_fr: Pour secteurs critiques avec exigences souverainetée stricte
    fivepennyai_service_fr: |
      AI Sprint 6-10 semaines : audit conformité (Loi 25, ordre
      professionnel), conception architecture, développement, intégration
      système métier, déploiement, formation, documentation conformité.
      Idéal pour cabinets professionnels québécois qui veulent l'IA
      mais ne peuvent pas, légalement ou éthiquement, utiliser un SaaS
      cloud américain.
    fivepennyai_revenue_potential: tres-eleve-par-client-mais-volume-faible
    honest_note_fr: |
      La voie custom est rarement nécessaire pour la majorité des
      clients. À réserver aux cabinets professionnels avec contraintes
      réelles de secret professionnel, organismes avec données
      classifiées, ou cas où l'ordre professionnel a explicitement
      restreint l'usage du cloud américain. Pour 80 % des clients
      sensibles, un outil européen RGPD-compliant (Noota, Happy Scribe)
      en voie B couvre les besoins à un coût bien moindre.

# ───── OUTILS DU MARCHÉ (HIÉRARCHISÉS) ─────

tools:

  # ── TIER 1 : Outils tout-en-un grand public ──

  - id: fathom
    tier: 1
    name: Fathom
    origin: USA
    url: https://fathom.video
    interface_fr: limitee
    starting_price_monthly: 0
    currency: USD
    target_segment_fr: Solopreneurs, freelances, équipes individuelles avec budget limité
    strength_fr: |
      Plan gratuit illimité pour individus (transcription, résumés,
      action items, pas de limite de temps). Cote G2 5,0/5 sur 6 000+
      avis. Summaries en 30 secondes après la fin de l'appel.
      Compatible Zoom, Google Meet, Microsoft Teams. Pas d'attrape :
      l'équipe veut faire connaître l'outil et offre un free tier
      vraiment généreux.
    plans:
      - name: Free
        price_usd: 0
        note_fr: Illimité pour individus (transcription, summaries, action items)
      - name: Team Edition
        price_usd: 15
        per_unit: "utilisateur/mois (annuel)"
        note_fr: Coaching d'équipe, partage avancé
      - name: Premium
        price_usd: 29
        per_unit: "utilisateur/mois"
        note_fr: Toutes les fonctions avancées
    weakness_fr: |
      Précision moins bonne en français qu'en anglais. Bot visible
      dans la réunion (option bot-free en bêta). Intégrations moins
      profondes que Fireflies pour CRM.
    affiliate_potential: a-verifier
    source_id: zapier-best-meeting-assistants
    used_in_paths: [self-serve, accompanied]
    recommended_priority: 1
    note_fr: |
      Premier choix pour solopreneurs anglophones ou bilingues qui
      veulent commencer gratuitement. Pour francophones purs, considérer
      Happy Scribe ou Noota.

  - id: fireflies
    tier: 1
    name: Fireflies.ai
    origin: USA
    url: https://fireflies.ai
    interface_fr: oui
    starting_price_usd_monthly: 0
    currency: USD
    target_segment_fr: Équipes vente B2B et consultants avec besoins CRM et automatisations multiples
    strength_fr: |
      Champion des intégrations : 40+ applications dont Salesforce,
      HubSpot, Pipedrive, Asana, ClickUp, Notion. Plan gratuit avec
      transcription illimitée (800 min de stockage). Précision tri
      d'appels, sentiment analysis, AskFred (recherche conversationnelle
      dans toutes les réunions). Multilangue : 100+ langues supportées
      (atout pour FR/EN au Québec).
    plans:
      - name: Free
        price_usd: 0
        note_fr: 800 min stockage, transcription illimitée
      - name: Pro
        price_usd: 10
        per_unit: "utilisateur/mois (annuel)"
        note_fr: Stockage illimité, intégrations CRM
      - name: Business
        price_usd: 19
        per_unit: "utilisateur/mois"
        note_fr: Analytics avancé, sécurité enterprise
    weakness_fr: |
      Bot visible dans la réunion. Délai de 10-15 minutes parfois pour
      générer la transcription (vs 30 sec pour Fathom). Mauvaise
      gestion des accents qui se chevauchent.
    affiliate_potential: a-verifier
    source_id: index-otter-fireflies-fathom
    used_in_paths: [self-serve, accompanied]
    recommended_priority: 2
    note_fr: |
      Choix par défaut pour équipes vente B2B au Québec : meilleur
      français que beaucoup d'outils anglo-saxons, intégrations
      profondes, prix raisonnable. AskFred est un atout réel pour la
      recherche dans les meetings passés.

  - id: otter
    tier: 1
    name: Otter.ai
    origin: USA
    url: https://otter.ai
    interface_fr: limitee
    starting_price_monthly: 0
    currency: USD
    target_segment_fr: Anglophones qui valorisent transcription en temps réel et collaboration live sur les notes
    strength_fr: |
      Pionnier de la transcription IA. Excelle en transcription temps
      réel collaborative (utile pour équipes prenant des notes ensemble
      pendant l'appel). OtterPilot rejoint automatiquement les réunions
      du calendrier. Cote précision réputée meilleure en anglais.
    plans:
      - name: Free
        price_usd: 0
        note_fr: 300 min/mois, 30 min par appel
      - name: Pro
        price_usd: 16.99
        per_unit: "mois"
        note_fr: 1 200 min/mois, fonctions avancées
      - name: Business
        price_usd: 30
        per_unit: "utilisateur/mois"
        note_fr: 6 000 min/mois, contrôles admin
    weakness_fr: |
      Précision en français limitée à 70-75 % selon AudiosTranscribe
      (vs 90-95 % anglais). Pour le marché québécois francophone,
      c'est un frein important. Plan gratuit limité (300 min/mois).
      Notes silotées dans Otter.
    affiliate_potential: a-verifier
    source_id: audiostranscribe-comparison
    used_in_paths: [self-serve, accompanied]
    recommended_priority: 3
    note_fr: |
      À recommander seulement aux clients anglophones ou très majoritairement
      en anglais. Pour francophones, Fireflies, tl;dv, Happy Scribe ou
      Noota donnent de meilleurs résultats.

  - id: tldv
    tier: 1
    name: tl;dv
    origin: Allemagne
    url: https://tldv.io
    interface_fr: oui
    starting_price_monthly: 0
    currency: USD
    target_segment_fr: Équipes vente et consulting bilingues, cibles européennes RGPD-sensibles
    strength_fr: |
      Plan gratuit avec enregistrements illimités. Conforme RGPD
      (basé en Allemagne), SOC 2 certifié, partenariat Anthropic
      pour Claude. Promesse explicite de ne pas entraîner les modèles
      sur les données client. Plus de 30 langues supportées avec
      traduction de la transcription. Stockage en centres de données
      ISO 27001 avec chiffrement AES-256.
    plans:
      - name: Free
        price_usd: 0
        note_fr: Enregistrements illimités, fonctions de base
      - name: Pro
        price_usd: 18
