strategic_note_fr: |
  La transcription/résumé de réunions est un pattern à fort impact
  émotionnel : les utilisateurs qui ont essayé une fois ne reviennent
  jamais en arrière. Différenciation 5PennyAi : (1) audit qui ne pousse
  pas systématiquement le bot Fathom/Otter par défaut, mais évalue
  vraiment le contexte (confidentialité, langue, écosystème, profession),
  (2) compétence sur la qualité française — un client québécois qui
  essaye Otter et obtient 70 % en français pense que « l'IA ne marche
  pas en français » alors qu'avec Happy Scribe ou Noota il aurait 90 %+,
  (3) angle Loi 25 + secret professionnel pour cabinets pros
  (avocats, notaires, comptables, médecins) — angle quasi inexploité
  par les concurrents québécois qui n'ont pas pris la mesure des risques
  juridiques discutés par Duane Morris LLP et autres cabinets nord-américains.

