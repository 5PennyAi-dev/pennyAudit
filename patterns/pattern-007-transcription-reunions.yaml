# ═══════════════════════════════════════════════════════════════
# Pattern 007 — Transcription et résumé automatisés de réunions
# Format hybride : structure machine + prose humaine
# Trois voies d'implémentation (self-serve, accompagné, custom)
# ═══════════════════════════════════════════════════════════════

id: ai-meeting-transcription-summary
title_fr: Transcription et résumé automatisés de réunions par IA
category: productivite-collaboration
version: 1.0
last_updated: 2026-04-26
language: fr

# ───── RÉSUMÉS (prose narrative pour livrable client) ─────

summary_short_fr: >
  Utilisation d'outils IA qui rejoignent les réunions Zoom, Teams ou
  Google Meet, transcrivent automatiquement, identifient les locuteurs,
  produisent un résumé structuré avec décisions et actions, et permettent
  de chercher dans toutes les discussions passées comme dans un moteur
  de recherche.

summary_long_fr: |
  La transcription et le résumé automatisés de réunions couvrent quatre
  fonctions principales : (1) capturer la voix de tous les participants
  d'une réunion virtuelle ou en personne, (2) la convertir en texte avec
  identification des locuteurs (généralement 90 à 98 % de précision en
  anglais, 90 à 95 % en français avec un outil optimisé), (3) produire
  un résumé structuré (décisions, actions à suivre, points clés, sujets
  abordés) en quelques secondes, (4) rendre l'ensemble cherchable et
  partageable. Le professionnel moyen passe environ 15 heures par
  semaine en réunion selon les données compilées par Taskade, dont
  quatre à huit heures consacrées à la prise de notes manuelle ; les
  outils IA matures éliminent quasi totalement cette charge. Pour le
  Québec, deux particularités sont déterminantes : la qualité de la
  transcription en français (Otter atteint seulement 70-75 % en
  français selon AudiosTranscribe, vs 90-95 % pour des outils optimisés
  français), et la conformité Loi 25 — surtout critique pour les
  professions assujetties au secret professionnel (avocats, notaires,
  comptables, médecins, psychothérapeutes).

# ───── COMPLÉMENTARITÉ AVEC AUTRES PATTERNS ─────

complementary_patterns:
  - pattern_id: ai-email-management
    relation_fr: |
      Le résumé d'une réunion alimente naturellement le suivi par
      courriel : envoi automatique du compte rendu et des actions à
      tous les participants, brouillon d'un courriel de suivi pour
      relancer un point. Les deux patterns s'enchaînent dans la
      gestion administrative quotidienne.

  - pattern_id: ai-appointment-scheduling
    relation_fr: |
      La prise de RDV automatisée alimente le calendrier de réunions;
      ce pattern documente ce qui s'y dit. Pour les consultants,
      coachs et professionnels qui vivent de leurs appels client, les
      deux patterns forment un duo naturel.

  - pattern_id: ai-quote-invoice-automation
    relation_fr: |
      Les actions discutées en réunion (changement de scope, nouveaux
      livrables) doivent souvent se traduire en avenants au devis ou
      en facturation supplémentaire. Le résumé structuré facilite ce
      passage de la discussion au document commercial.

