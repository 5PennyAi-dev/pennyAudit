# ───── NOTES HONNÊTES (usage interne uniquement) ─────

internal_notes_fr: |
  FORCE DE CE PATTERN :
  Pattern à très fort impact émotionnel — les utilisateurs qui ont
  goûté à la transcription IA ne reviennent jamais en arrière. ROI
  immédiat et facile à mesurer (heures de réunion × % notes manuelles
  évitées). Excellente porte d'entrée commerciale pour 5PennyAi car
  les consultants, coachs et dirigeants comprennent immédiatement la
  valeur.

  ANGLE DIFFÉRENCIATEUR PRINCIPAL : QUALITÉ FRANÇAISE
  Beaucoup de Québécois ont essayé Otter et conclu que « l'IA ne
  marche pas en français » — c'est faux. Le problème n'est pas l'IA,
  c'est qu'Otter (et Fathom dans une moindre mesure) sont optimisés
  pour l'anglais. Happy Scribe, Noota, AudiosTranscribe, tl;dv donnent
  des résultats nettement meilleurs. 5PennyAi peut casser ce mythe et
  positionner son audit comme « celui qui choisit l'outil qui marche
  vraiment dans la langue qu'on parle ».

  ANGLE DIFFÉRENCIATEUR SECONDAIRE : LOI 25 + SECRET PROFESSIONNEL
  Les cabinets d'avocats, notaires, comptables et médecins québécois
  sont submergés par leur propre administration ET assujettis à des
  obligations de confidentialité strictes. Aucun concurrent québécois
  ne traite spécifiquement la question « comment utiliser l'IA de
  transcription sans violer le secret professionnel ». 5PennyAi peut
  se positionner comme le consultant qui maîtrise cette question avec
  des solutions concrètes (Meetily local, voie custom Canada, outils
  RGPD européens validés).

  POSITIONNEMENT 5PENNYAI :
  - Voie A : audit + setup outil simple (99-199 $)
  - Voie B : forfait clé en main avec gestion confidentialité, 2 000-3 500 $
  - Voie C : réservée aux cabinets pros avec exigences strictes,
    8 000-30 000 $

  CROSS-SELL :
  Client qui adopte la voie B sur transcription = excellent prospect pour :
  - Pattern 005 (gestion courriels) → automatisation des suivis post-réunion
  - Pattern 003 (prise de RDV) → alimente le calendrier qui sera transcrit
  - Pattern 002 (chatbot) → pour les leads qui mèneront à des réunions
  Le pattern 007 est central dans la chaîne de productivité d'un
  professionnel — il est rarement adopté seul à long terme.

  PIÈGES À ÉVITER :
  - Ne PAS proposer Otter par défaut à un client francophone — risque
    de créer de la déception et de discréditer l'IA en général.
  - Ne PAS proposer un bot cloud (Fathom, Otter) à un avocat ou notaire
    sans avoir validé le contexte spécifique. Le risque réputationnel
    pour 5PennyAi serait majeur en cas de fuite.
  - Ne PAS oublier la dimension consentement — c'est facile à régler
    (ajout de clause dans calendrier) mais critique légalement.

  CHIFFRES À NUANCER :
  - Le « 15,5 h/sem en réunion » de Taskade est une moyenne agrégée
    — la dispersion est énorme (un développeur fait peut-être 5 h, un
    consultant en fait 25 h).
  - La précision « 90-95 % en français avec outils optimisés » vient
    de comparatifs vendeurs (AudiosTranscribe), à présenter avec
    honnêteté comme « ordre de grandeur observé ».

  TENDANCE 2026 À SURVEILLER :
  L'IA native des plateformes (Zoom AI Companion, Microsoft Copilot,
  Google Meet Gemini) progresse vite. À moyen terme (2-3 ans),
  beaucoup d'outils dédiés grand public (Otter, Fathom) seront
  challengés par le « assez bon et inclus » des plateformes. Les
  outils qui survivront sont ceux qui ont un vrai différenciateur :
  qualité française (Happy Scribe), bot-free (Granola), conformité
  RGPD (Noota, Dicte.AI), open source local (Meetily).

