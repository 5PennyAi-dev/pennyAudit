# ───── RISQUES ─────

risks:
  - type: reglementaire-qc
    title_fr: Loi 25 et secret professionnel — MAJEUR pour cabinets pros
    severity: important
    description_fr: |
      Pour les avocats, notaires, comptables (CPA), médecins,
      psychothérapeutes, dentistes et autres professions assujetties au
      secret professionnel québécois, l'usage d'un SaaS de transcription
      cloud américain peut constituer une violation des obligations de
      confidentialité. Selon Duane Morris LLP, l'enregistrement
      automatique de réunions où des stratégies juridiques sensibles
      sont discutées risque l'exposition à des fournisseurs tiers, ce
      qui peut faire « tomber » le privilège avocat-client.
    mitigation_fr: |
      Pour ces professions : (1) ne PAS utiliser Otter, Fathom, Fireflies
      cloud par défaut, (2) privilégier les outils RGPD européens
      (Happy Scribe, Noota) après validation auprès de l'ordre
      professionnel, OU (3) déployer Meetily open source en local, OU
      (4) voie custom avec hébergement Canada. Toujours obtenir le
      consentement explicite du client AVANT d'enregistrer. Mettre les
      bots IA OFF par défaut sur les plateformes de visioconférence.

  - type: reglementaire-general
    title_fr: Consentement des participants
    severity: important
    description_fr: |
      Au Québec et au Canada, l'enregistrement d'une conversation
      nécessite le consentement explicite ou implicite d'au moins un
      participant. Mais l'éthique professionnelle et la Loi 25 imposent
      souvent un consentement plus large. Plusieurs juridictions
      américaines (Californie, Floride, Illinois, Maryland, Pennsylvanie)
      exigent le consentement de TOUS les participants.
    mitigation_fr: |
      Toujours informer les participants en début de réunion qu'un outil
      de transcription IA est actif. Configurer une mention automatique
      dans les invitations de calendrier. Pour clients hors Québec,
      validation juridique au cas par cas.

  - type: technique
    title_fr: Précision insuffisante en français avec outils anglophones
    severity: moyen
    description_fr: |
      Otter atteint seulement 70-75 % de précision en français selon
      AudiosTranscribe. Sur une heure de réunion, c'est environ 15 à
      18 minutes de contenu mal transcrit, ce qui rend le résumé peu
      fiable. Risque de perpétuer le mythe « l'IA ne marche pas en
      français ».
    mitigation_fr: |
      Pour clients francophones, choisir un outil optimisé français :
      Happy Scribe, Noota, AudiosTranscribe, ou tl;dv. Tester sur un
      échantillon de réunions réelles avant déploiement. Documenter la
      précision constatée pour ajuster les attentes.

  - type: technique
    title_fr: Hallucinations dans les résumés
    severity: moyen
    description_fr: |
      L'IA peut inventer des détails dans le résumé : décisions qui
      n'ont pas été prises, action items attribués à la mauvaise
      personne, montants incorrects. Selon Duane Morris LLP, c'est un
      vrai risque de responsabilité professionnelle pour avocats.
    mitigation_fr: |
      Toujours réviser le résumé avant de le partager. Ne jamais
      l'envoyer automatiquement aux participants sans validation. Pour
      cabinets pros : règle absolue de relecture par un humain avant
      tout usage. Conserver la transcription verbatim comme référence
      en cas de doute.

  - type: business
    title_fr: Optique du bot dans la liste des participants
    severity: moyen
    description_fr: |
      Un bot nommé « Fathom Notetaker » ou « Fireflies » dans la liste
      des participants peut mettre certains clients mal à l'aise,
      surtout en B2B haut de gamme ou en contexte juridique sensible.
      Certains adoptent un comportement « as-if-on-camera » et la
      conversation devient moins authentique.
    mitigation_fr: |
      Pour appels client B2B exigeants : privilégier outils sans bot
      (Granola, Jamie, Meetily). Sinon, prévenir explicitement le client
      en début d'appel et offrir l'option de désactiver. Ne jamais
      laisser le bot rejoindre une réunion à l'insu des participants.

  - type: business
    title_fr: Fatigue réunion et déresponsabilisation
    severity: faible-a-moyen
    description_fr: |
      Quand tout est transcrit et résumé, certains participants
      « décrochent » mentalement en se disant qu'ils pourront relire
      après. La qualité de présence et d'écoute peut baisser.
    mitigation_fr: |
      Établir une politique d'usage interne : la transcription est un
      filet de sécurité, pas une excuse pour ne pas écouter. Encourager
      la prise de notes manuelle complémentaire (Granola le facilite
      bien : on note ses propres réflexions et l'IA enrichit).

  - type: business
    title_fr: Dépendance et vendor lock-in
    severity: faible-a-moyen
    description_fr: |
      Une fois des centaines d'heures de réunions stockées chez un
      fournisseur, en sortir devient pénible : exports limités, formats
      propriétaires, perte de la recherche cross-meetings.
    mitigation_fr: |
      Privilégier outils avec exports complets (Fathom, tl;dv, Happy
      Scribe permettent d'exporter transcriptions et résumés). Faire
      des sauvegardes périodiques des données sensibles dans un
      stockage contrôlé par le client.

# ───── PRÉREQUIS ─────

prerequisites:
  - Plateforme de visioconférence existante (Zoom, Teams, Google Meet) ou réunions en personne avec micro
  - Calendrier connectable (Google Calendar, Outlook) pour auto-join des bots
  - Politique de confidentialité interne mise à jour mentionnant l'usage de transcription IA
  - Pour voie B/C : modèle de clause de consentement à inclure dans les invitations
  - Pour professions assujetties au secret professionnel : validation de l'ordre professionnel applicable (Barreau, Chambre des notaires, OPCQ, CMQ, OPQ, OPSP, etc.)
  - Pour entreprises avec données confidentielles : revue de la politique de confidentialité fournisseur (utilisation des données pour entraîner l'IA notamment)
  - Connaissance basique de l'usage de calendriers et invitations de réunion

