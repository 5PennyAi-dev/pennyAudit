    url: null
    positioning_fr: Conseil BI haut de gamme, projets 50K-500K$
    note_fr: |
      Concurrents indirects : ils ciblent moyennes/grandes entreprises
      avec gros budgets. 5PennyAi se positionne sur le segment PME
      qu'ils ne servent pas. Approche complémentaire.

  - name: Intégrateurs Power BI / Tableau au Québec
    url: null
    positioning_fr: Intégration outils enterprise, projets 30K-100K$
    note_fr: |
      Concurrents directs sur la voie C custom. Différenciation
      5PennyAi : on offre la voie A et B accessibles que les cabinets
      ignorent (audit léger, Looker Studio gratuit, Zoho).

  - name: FloatAI, Gestisoft, EvoluAI, autres intégrateurs IA québécois
    url: null
    positioning_fr: IA généraliste pour PME, peut inclure analyse de données
    note_fr: |
      Concurrents indirects. Aucun ne semble structurer son offre
      autour d'un audit BI accessible avec phasage progressif.

strategic_note_fr: |
  L'analyse de données est un domaine où le marché PME québécois est
  mal servi par deux types d'acteurs : (1) les cabinets BI traditionnels
  qui poussent Power BI/Tableau à 30K-100K$ projets (trop cher),
  (2) les éditeurs comme Zoho ou Drivn qui n'ont pas de présence locale.
  Différenciation 5PennyAi possible : (a) audit indépendant qui
  recommande l'outil le plus adapté (pas vendor-locked sur Power BI),
  (b) approche progressive (commencer par Claude/ChatGPT + Looker
  Studio gratuit avant de monter à plateforme payante), (c) gouvernance
  Loi 25 incluse (rare dans les offres BI traditionnelles), (d) pour
  cabinets comptables québécois : positionnement comme partenaire
  pour offrir des services BI à leurs clients, en utilisant Drivn
  ou Zoho.

