# ───── RISQUES ─────

risks:
  - type: gouvernance-donnees
    title_fr: Qualité et gouvernance des données — le grand non-dit
    severity: important
    description_fr: |
      Selon Webintelligence 2026, seulement 32 % des organisations ont
      une vraie gouvernance des données. « Garbage in, garbage out » :
      le meilleur outil BI produit des analyses fausses si les données
      sources sont incohérentes (doublons, formats variables, définitions
      ambiguës). Pour une PME, le travail de gouvernance peut représenter
      40-60 % du projet BI total, et il est rarement budgété.
    mitigation_fr: |
      (1) Audit initial des sources de données et de leur qualité avant
      de toucher à un outil. (2) Définition claire et documentée des
      KPIs prioritaires (formule, source, périodicité). (3) Désignation
      d'un responsable de la qualité par source. (4) Acceptation honnête
      qu'un projet BI n'est jamais « terminé » — la gouvernance est
      continue.

  - type: reglementaire-qc
    title_fr: Loi 25 — agrégation de données clients et consentement
    severity: important
    description_fr: |
      Quand une PME analyse ses données clients (achats, comportements,
      interactions), elle traite des renseignements personnels au sens
      de la Loi 25. Si l'analyse est faite via un LLM public (ChatGPT,
      Claude version web) sans politique d'utilisation des données
      claire, ou via une plateforme BI hébergée hors Canada, des
      questions de conformité émergent. Aussi : profilage automatisé
      (segmenter clients) tombe sous les obligations de transparence
      de la section 12.1.
    mitigation_fr: |
      (1) Anonymiser les données clients avant analyse dans un LLM
      public (remplacer noms, courriels, par identifiants). (2) Pour
      analyses sensibles, utiliser API Anthropic ou OpenAI avec
      politique de non-rétention (Anthropic Workspaces ou OpenAI
      Enterprise avec Zero Data Retention). (3) Pour conformité stricte,
      hébergement Canada via AWS Bedrock (Claude) ou solution custom.
      (4) Documenter les profilages automatisés et offrir mécanisme
      de révision selon section 12.1 Loi 25.

  - type: technique
    title_fr: Hallucinations IA dans analyses
    severity: moyen
    description_fr: |
      Les LLMs et les copilotes BI peuvent halluciner : générer des
      chiffres qui semblent plausibles mais sont incorrects, inventer
      des relations entre données qui n'existent pas, mal interpréter
      les colonnes. Power BI Copilot peut générer du DAX incorrect
      sur modèles ambigus selon NeuralFlow 2026. ChatGPT peut produire
      des analyses fausses sur fichiers complexes selon DataStudios.
    mitigation_fr: |
      (1) Toujours valider les chiffres clés issus d'IA contre une
      source de vérité (Excel, comptabilité). (2) Demander à l'IA
      d'expliquer son raisonnement (« montre-moi le calcul »). (3)
      Pour décisions importantes, double-check par humain. (4)
      Privilégier les outils avec semantic layer (Looker, Holistics)
      ou pricing transparent (Zoho Zia avec règles métier configurées)
      vs text-to-SQL pure qui infère le schéma.

  - type: economique
    title_fr: Coûts cachés Power BI Copilot et licences viewers
    severity: moyen
    description_fr: |
      Power BI Pro à 14 $ USD est trompeur : pour activer Copilot, il
      faut Fabric F2 (263 $/mois USD minimum) ou Premium. Tableau
      facture 15 $/utilisateur/mois pour viewers (peut représenter
      des dizaines de milliers de dollars à grande échelle).
      L'augmentation Microsoft de 40 % en avril 2025 a pris beaucoup
      de PME par surprise.
    mitigation_fr: |
      (1) Calculer le coût total sur 3 ans avec scénarios de croissance
      d'utilisateurs avant de signer. (2) Évaluer Drivn comme alternative
      si beaucoup d'utilisateurs (économie 92 % vs Power BI Pro
      multi-utilisateurs documentée). (3) Évaluer Looker Studio gratuit
      pour cas simples avant de payer. (4) Considérer Metabase open
      source pour clients budget-conscients.

  - type: technique
    title_fr: Faible adoption Copilot Microsoft 365 documentée
    severity: faible-a-moyen
    description_fr: |
      Selon Gartner novembre 2024, seulement 4 % des clients Copilot
      M365 décrivent leurs déploiements comme générant une « valeur
      significative et large ». Causes : manque de personnalisation,
      qualité inconsistante entre apps, ROI difficile à mesurer.
    mitigation_fr: |
      (1) Ne pas vendre Copilot M365 comme solution miracle. (2) Pour
      analyse de données spécifiquement, Claude Pro ou ChatGPT Plus
      à 20 $/mois fait souvent mieux que Copilot Excel à 30 $/mois.
      (3) Valider avec un pilote 30 jours avant de déployer
      organisation-large.

  - type: business
    title_fr: Dépendance écosystème (vendor lock-in)
    severity: moyen
    description_fr: |
      Choisir Power BI engage à long terme dans Microsoft. Looker
      attache à Google Cloud / BigQuery. Tableau lie à Salesforce.
      Changer de plateforme BI 5 ans plus tard est un projet majeur
      (recréer dashboards, retravailler modèles).
    mitigation_fr: |
      (1) Évaluer où le client est déjà ancré (Microsoft, Google,
      indépendant). (2) Privilégier les outils avec exports faciles
      des modèles et dashboards. (3) Pour clients voulant indépendance,
      Metabase open source ou approche custom avec PostgreSQL.

  - type: organisationnel
    title_fr: Personne pour maintenir
    severity: moyen
    description_fr: |
      Selon Drivn 2026, dans les PME, souvent personne n'est responsable
      de maintenir les tableaux de bord quand une source change ou
      qu'un nouveau besoin émerge. Résultat : les dashboards deviennent
      obsolètes en 6-12 mois et personne ne les utilise.
    mitigation_fr: |
      (1) Désigner un responsable BI interne (souvent contrôleur ou
      directeur opérations). (2) Pour clients sans capacité interne,
      proposer un forfait maintenance mensuel 5PennyAi (ou via Drivn
      qui maintient lui-même les dashboards). (3) Démarrer petit
      (3-5 dashboards) plutôt que viser exhaustivité.

# ───── PRÉREQUIS ─────

prerequisites:
  - Données numérisées dans au moins un système structuré (comptabilité, CRM, ERP, ou Excel maintenu)
  - Volume de données minimum justifiant l'investissement (ventes mensuelles 30 k$+ pour e-commerce, 50 k$+ pour B2B)
  - Identification d'un responsable BI interne (contrôleur, directeur opérations, ou propriétaire)
  - Définitions claires des KPIs prioritaires avant de toucher à un outil
  - Politique de protection des renseignements personnels à jour pour analyses de données clients
  - Pour Voie B : engagement de l'équipe à utiliser les dashboards (sans utilisation, ROI nul)
  - Pour Voie C : volume de données justifiant entrepôt dédié (>1 million de lignes typique)
  - Compréhension que la BI est un projet continu, pas un livrable ponctuel

