# ───── MÉTADONNÉES INTERNES ─────

confidence_level: high
source_diversity: vendor-officials + comparison-articles + research-publications

adaptation_needed_for_qc:
  - Privilégier les outils accessibles (Looker Studio gratuit, Zoho Analytics) avant Power BI/Tableau
  - Pour clients sur logiciels comptables québécois (Acomba, Kiwili, Bilano, Momenteo) : valider si Drivn ou Zoho ont des connecteurs natifs avant de recommander
  - Toujours inclure le volet Loi 25 dans le protocole de gouvernance pour analyses de données clients
  - Pour cabinets comptables québécois : explorer Drivn comme outil pour offrir BI à leurs clients PME
  - Mentionner explicitement : pas de plateforme BI native québécoise identifiée — opportunité de marché potentielle
  - Pour OBNL et coopératives : modèles de tableaux de bord adaptés aux rapports aux bailleurs de fonds (subventions, gouvernance, impact)
  - Pour clients en construction (CCQ) : intégrer données SST CNESST et heures CCQ dans les dashboards

# ───── NOTES HONNÊTES (usage interne uniquement) ─────

internal_notes_fr: |
  ANGLE DIFFÉRENCIATEUR PRINCIPAL : APPROCHE PROGRESSIVE
  La plupart des cabinets BI vendent Power BI ou Tableau d'emblée
  (30K-100K $ projets). 5PennyAi peut se positionner comme l'auditeur
  qui dit honnêtement « commencez par Claude/ChatGPT + Looker Studio
  gratuit, montez à Zoho ou Power BI seulement si nécessaire ». Cette
  approche progressive est rare et précieuse.

  ANGLE COMPLÉMENTAIRE : DRIVN POUR CABINETS COMPTABLES
  Drivn est très intéressant pour les cabinets comptables québécois :
  modèle Power BI Embedded à coût fixe, connecteurs nombreux. Si
  validation des connecteurs québécois (Acomba notamment) est positive,
  Drivn peut devenir un outil clé pour le segment B2B cabinets
  comptables — qui peuvent ensuite revendre la BI à leurs clients PME.
  À explorer comme partenariat possible.

  ANGLE LOI 25 SUR DONNÉES CLIENTS
  Beaucoup d'analyses BI consomment des données clients. Loi 25 +
  section 12.1 (profilage automatisé) s'applique. Les cabinets BI
  traditionnels ignorent largement cet angle. Pour cabinets dentaires,
  cliniques, e-commerce : expliquer comment structurer la gouvernance
  pour rester conforme tout en exploitant les données.

  PIÈGES À ÉVITER :
  - Ne PAS pousser Power BI Premium ou Fabric d'emblée. Pour 80 %
    des PME, Looker Studio gratuit + Zoho Analytics (115 $/mois 15
    users) couvre amplement.
  - Ne PAS sous-estimer l'effort de gouvernance. Promettre « tableaux
    de bord en 2 semaines » sans avoir nettoyé les données est un
    piège classique qui mène à des projets qui échouent.
  - Ne PAS recommander Tableau aux PME standard. Trop cher, trop
    complexe pour le besoin.
  - Ne PAS déployer Microsoft 365 Copilot juste pour analyse de données.
    Selon Gartner, seulement 4 % rapportent valeur significative.
    Claude/ChatGPT à 20 $/mois fait mieux pour ce cas spécifique.

  CHIFFRES À NUANCER :
  - « 60 % des PME françaises sans BI structurée » est une stat France,
    pas Québec — à valider ou à présenter comme indication.
  - Les chiffres « 2x plus vite » et « +19 % revenue growth » viennent
    d'études vendeur (Dresner, Tableau). Présenter avec recul.
  - « Microsoft 365 E5 inclut Power BI Pro » : E5 coûte 57 $/user/mois,
    donc Pro est inclus mais le E5 lui-même est cher.

  CIBLE PRIORITAIRE COMMERCIALE :
  - Cabinets comptables québécois (gros marché B2B, peuvent revendre)
  - PME multi-sites (restaurants, retail, services) avec 50K+ revenu
    mensuel
  - E-commerce avec 30K+/mois
  - Manufacturiers et distributeurs avec ERP

  TENDANCES À SURVEILLER :
  - Q&A natural language Power BI sera déprécié décembre 2026 —
    impact sur clients qui en dépendent.
  - Microsoft +40 % prix Power BI avril 2025 — ouvre une fenêtre
    pour Drivn et Zoho de gagner des parts.
  - Hausse continue de l'open source (Metabase) — alternative crédible
    pour clients budget-conscients.

  CROSS-SELL :
  Client qui adopte la voie B sur analyse de données = excellent
  prospect pour :
  - Pattern 006 (devis/factures) → automatiser la source des données
    financières
  - Pattern 005 (courriels) → analyser les flux de communication
  - Pattern 008 (RH) → analyser les KPIs RH
  Pattern 009 est central dans la « stack pilotage » d'une PME en
  croissance.

