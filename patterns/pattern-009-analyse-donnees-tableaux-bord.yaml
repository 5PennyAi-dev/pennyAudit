# ═══════════════════════════════════════════════════════════════
# Pattern 009 — Analyse de données et tableaux de bord par IA
# Format hybride : structure machine + prose humaine
# Trois voies d'implémentation (self-serve, accompagné, custom)
# ═══════════════════════════════════════════════════════════════

id: ai-data-dashboards
title_fr: Analyse de données et tableaux de bord assistés par IA
category: analyse-decisionnelle
version: 1.0
last_updated: 2026-04-26
language: fr

# ───── RÉSUMÉS (prose narrative pour livrable client) ─────

summary_short_fr: >
  Transformation de données dispersées (Excel, ERP, CRM, comptabilité)
  en tableaux de bord visuels et insights actionnables, avec assistance
  IA pour poser des questions en langage naturel et obtenir des analyses
  sans expertise technique avancée.

summary_long_fr: |
  L'analyse de données par IA couvre quatre fonctions principales :
  (1) connecter et consolider des données de sources multiples (logiciels
  comptables, CRM, e-commerce, outils opérationnels), (2) générer des
  tableaux de bord visuels qui se mettent à jour automatiquement,
  (3) interroger les données en langage naturel français (« quel
  produit a le plus contribué à la marge le trimestre dernier ? »)
  plutôt qu'en SQL ou DAX, (4) détecter automatiquement des anomalies
  ou des tendances qui méritent attention. Selon Apogea 2026, 60 %
  des PME françaises naviguent encore à vue sans solution décisionnelle
  structurée, alors que les entreprises dotées d'une plateforme
  d'analyse prennent leurs décisions deux fois plus vite selon Dresner
  Advisory. McKinsey 2024 rapporte que 72 % des organisations adoptent
  l'IA, mais seulement 26 % la scalent au-delà des pilotes. La valeur
  réelle pour une PME québécoise n'est pas le « Big BI » d'entreprise
  (Power BI Premium + Fabric à 263 $ USD/mois et plus), mais plutôt
  un mix bien dosé : un LLM (Claude, ChatGPT) comme analyste d'Excel
  au quotidien, un Looker Studio gratuit pour les dashboards récurrents,
  et possiblement Zoho Analytics ou Drivn pour aller plus loin. Le
  vrai blocage rarement adressé : seulement 32 % des organisations
  ont une vraie gouvernance des données (qualité, définitions, droits
  d'accès). Sans gouvernance, le meilleur outil produit des analyses
  fausses avec assurance.

# ───── COMPLÉMENTARITÉ AVEC AUTRES PATTERNS ─────

complementary_patterns:
  - pattern_id: ai-quote-invoice-automation
    relation_fr: |
      Les données de facturation (pattern 006) sont une des sources
      les plus précieuses pour les tableaux de bord. Quand on automatise
      la facturation, on génère automatiquement les données structurées
      qui alimentent les tableaux de bord financiers. Les deux patterns
      se renforcent.

  - pattern_id: ai-email-management
    relation_fr: |
      L'analyse du flux courriel (volume, temps de réponse, sujets
      récurrents) est un cas typique de tableau de bord opérationnel.
      Pattern 005 produit la donnée, pattern 009 la visualise.

  - pattern_id: ai-marketing-content-creation
    relation_fr: |
      Les analyses de performance de campagnes marketing (clics, taux
      de conversion, ROAS) reposent sur des dashboards. Pattern 004
      produit le contenu, pattern 009 mesure son impact.

