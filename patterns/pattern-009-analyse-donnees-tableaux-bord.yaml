# ───── SOLUTION (prose + structure) ─────

solution_summary_fr: |
  L'approche dépend du profil. Pour la majorité des PME québécoises,
  le « Big BI » d'entreprise (Power BI Premium + Microsoft Fabric)
  est massivement surdimensionné et hors budget. Trois voies
  pragmatiques émergent. (1) Auto-service léger : un dirigeant utilise
  Claude ou ChatGPT comme analyste d'Excel quotidien (poser des
  questions en français à ses fichiers, générer graphiques, identifier
  tendances), et déploie Looker Studio gratuit pour quelques tableaux
  de bord récurrents connectés à Google Sheets ou Google Analytics.
  Coût : 0 à 50 $/mois. (2) Solution structurée : Zoho Analytics
  (excellent rapport qualité-prix, IA Zia incluse dès 48 $/mois pour
  5 utilisateurs) OU Drivn (français, basé sur Power BI Embedded,
  connectivité native Pennylane/Sage/Cegid, économie de 92 % sur les
  licences) OU Power BI Pro classique si le client est déjà dans
  l'écosystème Microsoft. Coût : 200-1 500 $/mois. (3) Solution
  custom pour cas complexes : entrepôt de données + IA générative
  via API + dashboards sur mesure. Coût : 18 000-50 000 $ initial.
  Dans tous les cas, le travail invisible mais critique est la
  gouvernance : définir clairement les KPIs, leurs sources, leur
  fréquence de rafraîchissement, qui peut voir quoi, et comment
  gérer les données client en respectant la Loi 25.

deployment_modes:
  - id: llm-comme-analyste
    name_fr: LLM comme analyste de données ad hoc
    description_fr: |
      Claude (Pro/Max), ChatGPT (Plus/Team), Gemini Advanced. Le
      dirigeant ou contrôleur uploade un Excel ou CSV et pose des
      questions en français : tendances, outliers, comparaisons,
      visualisations. Pas un dashboard récurrent, mais un assistant
      analytique au quotidien. Coût quasi nul.

  - id: dashboards-gratuits
    name_fr: Dashboards gratuits avec IA
    description_fr: |
      Looker Studio (gratuit, intègre Gemini AI), Power BI version
      gratuite avec limites, Zoho Analytics free tier. Permet de
      créer des tableaux de bord visuels connectés à Google Sheets,
      Google Analytics, fichiers Excel/CSV, sans coût de licence.

  - id: bi-pme-tout-en-un
    name_fr: Plateforme BI tout-en-un pour PME
    description_fr: |
      Zoho Analytics, MyReport (France), Drivn (France, white-label
      Power BI). Inclut connecteurs nombreux, modèles préfabriqués,
      IA conversationnelle, multi-utilisateurs. Idéal PME 10-100
      employés.

  - id: ecosysteme-microsoft
    name_fr: Power BI dans écosystème Microsoft
    description_fr: |
      Power BI Pro (14 $ USD/utilisateur/mois) avec ou sans Copilot
      (Fabric F2 à partir de 263 $/mois). Idéal si client déjà sur
      Microsoft 365 E3/E5 (où Pro est inclus). Attention : Copilot
      réservé aux capacités Premium ou Fabric, ce qui multiplie le coût.

  - id: ecosysteme-google
    name_fr: Looker + Gemini dans écosystème Google
    description_fr: |
      Looker Studio gratuit ou Looker (Google Cloud) avec Gemini
      intégré. Idéal si client déjà sur Google Workspace et BigQuery.
      Modélisation LookML pour cas avancés.

  - id: ai-natives
    name_fr: Plateformes IA-natives autonomes
    description_fr: |
      Anomaly AI, ThoughtSpot Spotter, Julius AI, Holistics AI. Plutôt
      orientées entreprises moyennes, prix variables. Promesse :
      analyse autonome end-to-end sans modélisation préalable.

  - id: custom-agent-data
    name_fr: Agent IA custom + entrepôt de données
    description_fr: |
      Pipeline custom : entrepôt de données (PostgreSQL ou BigQuery)
      + Claude API ou OpenAI API pour analyses + dashboards sur mesure
      (Streamlit, Plotly Dash, Metabase). Pour cas avec logique métier
      vraiment unique ou conformité Loi 25 stricte.

typical_capabilities:
  - Connexion à sources multiples (Excel, comptabilité, CRM, e-commerce, ERP)
  - Consolidation automatique de données dispersées
  - Tableaux de bord visuels avec mise à jour automatique
  - Questions en langage naturel français (« quel produit a le plus contribué à la marge ? »)
  - Génération automatique de visualisations pertinentes
  - Détection d'anomalies et alertes proactives
  - Prévisions de séries temporelles (ventes, trésorerie, inventaire)
  - Narrations générées (« explique ce graphique »)
  - Export PDF/Excel pour rapports périodiques
  - Partage sécurisé avec parties prenantes (équipe, comptable, conseil)
  - Drill-down (zoomer sur un mois, un produit, un client)
  - Comparaison période vs période, segment vs segment
  - Modèles préfabriqués sectoriels (financier, ventes, opérations, RH)

# ───── VOIES D'IMPLÉMENTATION (core du pattern) ─────

implementation_paths:

  - id: self-serve
    name_fr: Voie A — Auto-service léger (Excel + LLM + Looker Studio gratuit)
    ideal_profile_fr: |
      PME 5-30 employés, dirigeant ou contrôleur seul gère les données,
      pas de département IT, données déjà majoritairement dans Excel
      ou Google Sheets. Souvent : commerces de détail indépendants,
      restaurants single-site, cabinets professionnels en croissance,
      OBNL avec rapports trimestriels. Veut « voir clair » sans
      investissement majeur.
    description_fr: |
      Le client utilise Claude Pro (20 $/mois) ou ChatGPT Plus
      (20 $/mois) comme analyste de données au quotidien : il uploade
      ses fichiers Excel ou CSV de comptabilité, ventes, production,
      et pose des questions en français. Pour les tableaux de bord
      récurrents, il déploie Looker Studio (gratuit, Google) connecté
      à Google Sheets ou directement à ses sources (Google Analytics,
      Shopify, Stripe). 5PennyAi fournit l'audit qui définit les KPIs
      clés, les sources de données à connecter, les modèles de prompts
      utiles (« analyse mes ventes mensuelles et identifie les
      tendances »), et un guide de gouvernance simple (à ne pas envoyer
      les données client sensibles dans un LLM public sans précaution).
    setup_duration: 4-12-heures
    client_time_required_hours:
      min: 4
      max: 15
    total_cost_cad:
      setup_range:
        min: 0
        max: 500
      monthly_min: 0
      monthly_max: 80
      first_year: "0 à 1 460 $"
    recommended_tools_priority:
      - tool_id: claude-ai
        reason_fr: Excellence en français pour analyses ad hoc d'Excel et CSV
      - tool_id: chatgpt
        reason_fr: Alternative avec Advanced Data Analysis Python plus profond
      - tool_id: looker-studio
        reason_fr: Dashboards gratuits avec connexion native Google Analytics, Sheets
      - tool_id: power-bi-pro
        reason_fr: Si client déjà sur Microsoft 365 (souvent inclus E3/E5)
    fivepennyai_service_fr: |
      Audit payant (199-499 $) : identification des KPIs prioritaires
      selon le secteur, audit des sources de données existantes, choix
      d'outil(s), modèles de prompts pour LLM analyste, configuration
      de 1-3 tableaux de bord Looker Studio simples, formation 2 h,
      protocole de gouvernance simple (1 page).
    fivepennyai_revenue_potential: faible-a-moyen-par-client

  - id: accompanied
    name_fr: Voie B — Plateforme BI pour PME (Zoho/Drivn/Power BI)
    ideal_profile_fr: |
      PME 30-100 employés avec sources multiples (CRM, ERP, e-commerce,
      comptabilité), équipe finance ou opérations qui consomme des
      rapports, données qui justifient un outil dédié multi-utilisateurs.
      Souvent : distributeurs B2B, manufacturiers, e-commerce 30 k$+/mois,
      restaurants 3+ locations, agences marketing avec multiples clients,
      cabinets comptables voulant offrir BI à leurs clients.
    description_fr: |
      5PennyAi configure une plateforme BI adaptée au profil. Trois
      options principales : (a) Zoho Analytics si le client veut un
      excellent rapport qualité-prix avec IA Zia incluse et écosystème
      cohérent (CRM, finance, RH chez Zoho), (b) Drivn si le client
      utilise Pennylane, Sage, Cegid ou autre logiciel comptable
      français/européen — avantage : licences illimitées à coût fixe
      (économie de 92 % vs Power BI Pro multi-utilisateurs), (c) Power
      BI Pro avec ou sans Copilot si le client est déjà fortement
      Microsoft. Inclut : (1) audit complet des sources de données,
      (2) configuration des connecteurs et nettoyage initial,
      (3) modélisation de données (relations, mesures, hiérarchies),
      (4) 5-10 tableaux de bord adaptés au métier, (5) configuration
      multi-utilisateurs avec droits d'accès, (6) intégration de l'IA
      conversationnelle (Zia, Copilot, Gemini selon outil), (7) protocole
      de gouvernance complet (Loi 25, qualité données, qui maintient),
      (8) formation équipe 4-6 h, (9) support 30-60 jours.
    setup_duration: 2-6-semaines
    client_time_required_hours:
      min: 15
      max: 40
    total_cost_cad:
      setup_range:
        min: 3000
        max: 8000
      monthly_tool_range:
        min: 100
        max: 1500
      first_year: "4 200 à 26 000 $"
    recommended_tools_priority:
      - tool_id: zoho-analytics
        reason_fr: Meilleur rapport qualité-prix pour PME, IA Zia incluse, multi-canal
      - tool_id: drivn
        reason_fr: Si client utilise Pennylane/Sage/Cegid, économie majeure sur licences
      - tool_id: power-bi-pro
        reason_fr: Si client déjà fortement Microsoft, Copilot via Fabric si volume justifie
      - tool_id: looker-google
        reason_fr: Si client est sur Google Cloud / BigQuery
      - tool_id: tableau
        reason_fr: Pour besoins de visualisation très avancés (rare en PME)
    fivepennyai_service_fr: |
      Forfait « Tableau de bord PME » : audit + setup plateforme +
      modélisation + 5-10 dashboards + IA conversationnelle + formation
      + protocole de gouvernance + support 30-60 jours. Différenciation
      5PennyAi : on n'impose pas Power BI par défaut. On évalue selon
      le profil (Zoho pour rapport qualité-prix, Drivn pour PME
      françaises, Power BI pour Microsoft-natifs) — vs cabinets BI
      traditionnels qui poussent toujours Power BI ou Tableau.
    fivepennyai_revenue_potential: moyen-a-eleve-par-client

  - id: custom
    name_fr: Voie C — Solution sur mesure / souveraine
    ideal_profile_fr: |
      PME 100+ employés ou entreprise moyenne avec exigences spécifiques :
      logique métier propre (calculs sectoriels uniques), volumes de
      données importants (millions de lignes), besoin d'analyses
      prédictives sophistiquées, intégration profonde à un système
      métier propriétaire, ou exigences Loi 25 strictes nécessitant
      hébergement Canada et explicabilité documentée.
    description_fr: |
      5PennyAi déploie une solution custom : entrepôt de données
      (PostgreSQL ou BigQuery sur AWS Canada Central), pipelines ETL
      automatisés (Make/n8n ou Airbyte), couche IA via API Anthropic
      ou OpenAI pour analyses conversationnelles, dashboards sur mesure
      (Streamlit, Plotly Dash, ou Metabase open source). Inclut
      modèles prédictifs (séries temporelles avec Prophet, classification
      avec scikit-learn) si pertinent, documentation de gouvernance
      complète Loi 25, droits d'accès granulaires.
    setup_duration: 8-16-semaines
    client_time_required_hours:
      min: 40
      max: 100
    total_cost_cad:
      setup_range:
        min: 18000
        max: 60000
      monthly_hosting_range:
        min: 200
        max: 2000
      first_year: "20 400 à 84 000 $"
    recommended_tools_priority:
      - tool_id: anthropic-api
        reason_fr: Claude pour analyses conversationnelles en français de qualité
      - tool_id: bigquery-postgresql
        reason_fr: Entrepôt de données scalable et conforme
      - tool_id: streamlit-metabase
        reason_fr: Dashboards customs ou open source pour éviter licences enterprise
    fivepennyai_service_fr: |
      AI Sprint 8-16 semaines : audit, conception architecture, ETL,
      modélisation, dashboards, IA conversationnelle, déploiement,
      formation, documentation Loi 25.
    fivepennyai_revenue_potential: tres-eleve-par-client-mais-volume-faible
    honest_note_fr: |
      Voie réservée à <5 % des clients. Pour la majorité, la voie B
      avec Zoho ou Drivn couvre amplement. La voie C se justifie
      quand : (a) volume de données >10 millions de lignes, (b) logique
      métier vraiment unique non couverte par les outils du marché,
      (c) exigences Loi 25 strictes (hébergement Canada, explicabilité
      auditée), (d) besoin de modèles prédictifs sectoriels propres.

# ───── OUTILS DU MARCHÉ (HIÉRARCHISÉS) ─────

tools:

  # ── TIER 1 : Plateformes BI accessibles PME (cœur de la recommandation) ──

  - id: zoho-analytics
    tier: 1
    name: Zoho Analytics
    origin: Inde / USA
    url: https://www.zoho.com/analytics/
    interface_fr: oui
    starting_price_usd_monthly: 48
    currency: USD
    target_segment_fr: PME voulant BI tout-en-un avec IA incluse et bon rapport qualité-prix
    strength_fr: |
      Plateforme BI hybride entre datavisualisation et BI légère.
      Connecte 500+ sources. IA Zia incluse dans tous les plans payants
      (analyses en langage naturel, suggestions de visualisations,
      détection d'anomalies, prévisions). Modèles préfabriqués pour
      ventes, marketing, finance. Intégration profonde avec écosystème
      Zoho (CRM, Books, People). Selon AI Agent Brief 2026, Zoho est
      « l'exception notable » dans le marché en incluant l'IA dans
      tous les plans payants.
    plans:
      - name: Standard
        price_usd: 48
        per_unit: "mois (5 utilisateurs)"
      - name: Premium
        price_usd: 115
        per_unit: "mois (15 utilisateurs)"
    weakness_fr: |
      Moins puissant que Power BI ou Tableau pour visualisations
      très avancées. Interface moins polie que Tableau. Écosystème
      Zoho fort, mais moins ouvert que Microsoft ou Google.
    affiliate_potential: a-verifier
    source_id: ai-agent-brief-pricing
    used_in_paths: [accompanied]
    recommended_priority: 1
    note_fr: |
      Premier choix par défaut pour PME québécoise voulant une
      plateforme BI structurée à coût raisonnable. Zia est suffisamment
      bonne pour la majorité des cas. À privilégier si client n'est
      pas déjà profondément Microsoft ou Google.

  - id: drivn
    tier: 1
    name: Drivn
    origin: France (Bordeaux)
    url: https://drivn.fr
    interface_fr: oui
    starting_price_monthly: null
    currency: EUR
    target_segment_fr: PME et cabinets comptables utilisant Pennylane, Sage, Cegid ou logiciels français
    strength_fr: |
      SaaS français basé sur Power BI Embedded (technologie Microsoft
      pour intégrer dashboards sans licence par utilisateur). Modèle
      différenciant : licences illimitées à coût fixe, économie de
      92 % sur les licences vs Power BI Pro multi-utilisateurs.
      Connecteurs natifs : Pennylane, Tiime, ACD, Sage, Cegid Quadra,
      MyUnisoft, Silae, et 30+ autres logiciels français/européens.
      Modèles de tableaux de bord financiers et de pilotage construits
      pour PME : trésorerie, marge, DG, reporting expert-comptable.
      Tableaux de bord maintenus par Drivn, pas par le client.
    pricing_note_fr: "Tarification fixe mensuelle, contact ventes pour devis (non publié)"
    weakness_fr: |
      Connecteurs québécois non documentés (Acomba, Kiwili, Bilano,
      Momenteo) — à valider avant recommandation. Présence canadienne
      à confirmer. Outil français : peut nécessiter adaptation pour
      contexte fiscal canadien (TPS/TVQ vs TVA française).
    affiliate_potential: a-verifier
    source_id: drivn-pme-france
    used_in_paths: [accompanied]
    recommended_priority: 2
    note_fr: |
      Alternative très intéressante à Power BI Pro pour PME québécoises
      qui ont beaucoup d'utilisateurs (10+) ou qui utilisent des
      logiciels comptables français/européens. À tester sur un cas
      réel pour valider connecteurs québécois. Si confirmé, peut devenir
      premier choix pour le segment cabinets comptables.

  - id: power-bi-pro
    tier: 1
    name: Microsoft Power BI Pro (avec ou sans Copilot)
    origin: USA
    url: https://www.microsoft.com/power-bi
    interface_fr: oui
    starting_price_usd_monthly: 14
    currency: USD
    target_segment_fr: PME déjà sur Microsoft 365, organisations Microsoft-natives
    strength_fr: |
      Référence du marché BI selon Gartner Magic Quadrant 2024 et 2025.
      Power BI Pro à 14 $ USD/utilisateur/mois est le prix d'entrée.
      Pro est inclus gratuitement dans Microsoft 365 E5 (57 $ USD/user/
      mois) — pour clients déjà E5, Power BI Pro est essentiellement
      gratuit. Connecteurs nombreux, écosystème mature, communauté
      énorme, formations abondantes. Copilot (génération de DAX en
      langage naturel, narratives automatiques, création de pages de
      rapport par prompt) bien noté pour cas standards.
    plans:
      - name: Pro
        price_usd: 14
        per_unit: "utilisateur/mois"
      - name: Premium Per User
        price_usd: 24
        per_unit: "utilisateur/mois"
      - name: Fabric F2 (capacité, pour Copilot)
        price_usd: 263
        per_unit: "mois minimum"
        note_fr: Requis pour activer Copilot dans Power BI
    weakness_fr: |
      Microsoft a augmenté les prix de 40 % en avril 2025. Q&A en
      langage naturel sera déprécié en décembre 2026. Copilot exige
      Premium ou Fabric (263 $+/mois USD), ce qui multiplie le coût
      pour PME. Copilot peut générer du DAX incorrect ou halluciner
      sur modèles de données ambigus selon NeuralFlow 2026. Selon
      Gartner novembre 2024, seulement 4 % des clients Copilot M365
      décrivent leurs déploiements comme générant une « valeur
      significative et large ».
    affiliate_potential: a-verifier
    source_id: ai-agent-brief-pricing
    used_in_paths: [accompanied]
    recommended_priority: 3
    note_fr: |
      À recommander quand le client est déjà sur Microsoft 365 E5
      ou prévoit de l'adopter. Pour PME pure-Google ou utilisant
      logiciels québécois (Acomba, Kiwili), Zoho Analytics est plus
      cohérent. Avant de pousser Copilot, valider que le client a
      vraiment le volume justifiant Fabric F2 à 263 $/mois.

