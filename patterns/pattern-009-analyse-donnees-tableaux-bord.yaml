# ───── PROBLÈME (voix du client pour narratif) ─────

pain_point_fr: |
  Je dirige une PME en distribution. J'ai un ERP, un CRM HubSpot,
  Acomba pour la compta, et plusieurs fichiers Excel que mes
  contrôleurs maintiennent à la main. Chaque mois, on prend trois
  jours à monter le rapport de gestion : exports, copier-coller,
  formules Excel, et au final personne n'est sûr que les chiffres
  réconcilient entre les systèmes. Je sens qu'il y a des informations
  importantes cachées dans nos données — quels clients sont les plus
  rentables, quels produits sont en perte de vitesse — mais je n'ai
  pas la visibilité. J'ai entendu parler de Power BI, mais quand
  j'ai demandé à un consultant un devis, ça frôlait les 30 000 $
  juste pour le setup, et après il faut une licence pour chaque
  utilisateur. Il doit exister quelque chose entre Excel et un projet
  enterprise à 30 000 $.

