  - Spécifier "français québécois" dans les prompts
  - Conformité Loi 25 pour données personnelles dans les prompts

# ───── NOTES HONNÊTES (usage interne uniquement) ─────

internal_notes_fr: |
  FORCE ET DIFFICULTÉ DE CE PATTERN :
  C'est le pattern le plus demandé et le plus universel, MAIS c'est aussi
  celui avec la plus grosse concurrence et la plus grosse commodité. Tout
  le monde vend des services de contenu IA. Différencier = qualité de la
  voix de marque, pas volume de contenu.

  RECOMMANDATION STRATÉGIQUE POUR 5PENNYAI :
  - Pour voie A : audit + "Starter Kit" = bon volume, bon revenu récurrent
    si on automatise la production de kits personnalisés
  - Pour voie B : le sweet spot est "voix de marque IA professionnelle"
    où on investit 2-3 jours à configurer et former pour 1500-3000 $
  - Pour voie C : réserver à des cas concrets comme PennySEO (génération
    de fiches produits à l'échelle) ou similaire

  CHOIX DES OUTILS À RECOMMANDER :
  - Claude en n°1 : qualité français naturel, fenêtre de contexte large
    pour Projects. Simple. Pas de majoration.
  - ChatGPT en n°2 : pour clients qui connaissent déjà, ou pour Custom GPTs
  - Canva incontournable pour visuels
  - Mailchimp ou Brevo pour email (Brevo = alternative française pour QC)
  - Éviter de recommander Jasper/Copy.ai aux micro-entreprises : coût
    élevé pour bénéfice marginal vs ChatGPT/Claude. Réserver à PME avec
    équipe marketing dédiée qui valorise les templates.

  POTENTIEL AFFILIATION :
  Canva, Jasper, Mailchimp, Brevo, Make, Zapier ont des programmes
  d'affiliation confirmés. Claude et ChatGPT n'ont pas de programme
  classique mais l'usage via API génère des revenus pour les projets
  voie C.

  ATTENTION SUR LES MÉTRIQUES :
  Les "+32 % de taux de clic" et "50-80 % gain de temps" sont des chiffres
  de fournisseurs (HubSpot, Jasper). À présenter comme "selon [source]"
  dans les livrables. Pour métriques locales : pas encore de données
  québécoises précises ; FloatAI et autres intégrateurs donnent des
  fourchettes agrégées.

  COMPLÉMENTARITÉ AVEC PENNYSEO :
  PennySEO est littéralement un exemple de voie C pour ce pattern. À
  utiliser comme référence puissante : "Voici ce qu'on peut livrer en
  custom, voir pennyseo.ai". Gros atout de crédibilité.


