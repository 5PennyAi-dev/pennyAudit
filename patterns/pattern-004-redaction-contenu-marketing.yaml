# ═══════════════════════════════════════════════════════════════
# Pattern 004 — Rédaction de contenu marketing automatisée par IA
# Format hybride : structure machine + prose humaine
# Trois voies d'implémentation (self-serve, accompagné, custom)
# ═══════════════════════════════════════════════════════════════

id: ai-marketing-content-creation
title_fr: Rédaction de contenu marketing assistée par IA
category: marketing-communication
version: 1.0
last_updated: 2026-04-22
language: fr

# ───── RÉSUMÉS (prose narrative pour livrable client) ─────

summary_short_fr: >
  Utilisation d'outils IA (ChatGPT, Claude, Canva) pour créer rapidement
  des posts sociaux, articles de blog, newsletters, descriptions produits
  et visuels marketing, avec le ton de la marque.

summary_long_fr: |
  La création de contenu marketing est le cas d'usage IA le plus universel
  pour les micro-entreprises. Grâce à des outils comme ChatGPT, Claude,
  Canva Magic et d'autres, un solopreneur peut produire en quelques
  minutes ce qui prenait des heures : posts Instagram et Facebook,
  légendes percutantes, articles de blog optimisés SEO, infolettres,
  descriptions de produits, scripts vidéo, courriels de relance, idées
  de publications. Avec un peu de configuration (donner à l'IA la "voix"
  de la marque), le contenu devient rapidement cohérent et professionnel.
  Ce pattern couvre les différents types de contenu marketing et les
  outils les plus pertinents selon le profil et le budget du client.

