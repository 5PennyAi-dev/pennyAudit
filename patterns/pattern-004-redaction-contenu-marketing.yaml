    # ╚═════════════════════════════════════════════════════════╝
    voie_b_accompagnee:

      includes_voie_a_fr: |
        L'accompagnement 5PennyAi inclut tout le travail décrit en voie A,
        exécuté pour vous, plus la dimension stratégique (segmentation,
        séquences automatisées, conformité) qui demande une vue
        d'ensemble difficile à transmettre par écrit.

      what_we_do_for_you_fr:
        title_fr: Ce que nous faisons à votre place
        items_fr:
          - service: Audit de votre base de contacts et stratégie de
              segmentation
            details_fr: |
              Analyse de votre base actuelle (clients passés, prospects,
              tièdes, froids), proposition d'une segmentation concrète
