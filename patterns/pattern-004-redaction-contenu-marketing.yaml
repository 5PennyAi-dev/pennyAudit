            estimated_value_hours: 2-3
          - service: Configuration de la plateforme courriel (Brevo
              ou Mailchimp)
            details_fr: |
              Création des listes segmentées, des gabarits visuels aux
              couleurs de marque, des automatisations de base (welcome,
              relance, anniversaire). Configuration des pieds d'email
              conformes Loi 25 / CASL.
            estimated_value_hours: 3-4
          - service: Production de la première newsletter et 1
              séquence de nurturing
            details_fr: |
              Newsletter mensuelle complète prête à envoyer. Séquence
              de nurturing à 3 emails sur le segment prioritaire,
              programmée et testée.
            estimated_value_hours: 2-3
          - service: Construction du calendrier éditorial annuel
            details_fr: |
              Atelier d'1h30 pour identifier vos rendez-vous incontournables,
              événements, lancements. Rédaction du calendrier 12 mois
              avec angles suggérés par envoi.
            estimated_value_hours: 2
          - service: Séance de calibrage à 30 jours
            details_fr: |
              Appel d'1 heure pour analyser les premiers envois, taux
              d'ouverture, clics, réponses, ajuster les Project
              Instructions et la stratégie de segmentation.
            estimated_value_hours: 1
          - service: Support courriel pendant 30 jours
            details_fr: |
              Questions sur cas particuliers, ajustements rapides,
              dépannage. Réponses dans les 24-48h ouvrables.

      what_we_bring_that_text_cannot_fr:
        title_fr: Ce qui ne se transmet pas par écrit
        items_fr:
          - element: La stratégie de segmentation pertinente pour
              votre cas
            why_fr: |
              Comment découper sa base ? Par récence ? Par valeur ?
              Par comportement ? La bonne segmentation dépend de votre
              modèle d'affaires, votre cycle de vente, votre taille
              de base. Un client autonome segmente souvent trop ou
              trop peu.
          - element: La conformité Loi 25 / CASL appliquée à votre
              cas réel
            why_fr: |
              Les principes sont publics, mais leur application au cas
              spécifique (consentement implicite vs explicite, opt-in
              double, gestion des données sensibles) demande de
              l'expérience pour ne pas tomber dans un piège
              réglementaire.
          - element: Le calibrage du rythme et de la pression
              commerciale
            why_fr: |
              Combien d'emails par mois ? Quand glisser un appel à
              l'action commercial vs rester sur le contenu de valeur ?
              Ce dosage demande une vue sur ce qui marche dans des
              secteurs comparables.
          - element: La détection des signaux faibles dans les métriques
            why_fr: |
              Un taux d'ouverture qui baisse de 2 points chaque mois
              sans raison apparente est un signal. Détecter cette
              dérive précoce et identifier la cause (fatigue, mauvais
              segment, ton qui ne ressemble plus) demande l'œil d'un
              accompagnateur.

      total_investment_fr:
        accompaniment_cad: 1 800 - 3 800 $
        ongoing_monthly_cad: 20-40 (Claude Pro 20 $ USD + Brevo gratuit ou 9 $/mois selon volume)
        client_time_required_hours: 5-7 (vs 18-25 en voie A pure)
        time_to_operational_weeks: 3-4 (vs 5-7 en voie A pure)

      deliverables_fr:
        title_fr: Livrables tangibles que vous recevez
        items_fr:
          - Document « Stratégie de segmentation et séquences » avec
            cartographie de votre base et plan d'activation
          - Claude Project « Communication courriel — [votre marque] »
            configuré et opérationnel
          - Plateforme courriel (Brevo ou Mailchimp) configurée avec
            listes segmentées, gabarits visuels et automatisations de base
          - Première newsletter envoyée avec rapport de performance
          - Première séquence de nurturing déployée et mesurée
          - Calendrier éditorial annuel personnalisé (12 mois)
          - Document de conformité Loi 25 / CASL appliqué à votre cas
          - Notes de la séance de calibrage 30 jours
          - Procédure de maintenance trimestrielle documentée


    # Notes internes sur ce sous-template (non rendu au client)
    internal_notes_fr: |
      CHOIX SPÉCIFIQUES À CE SOUS-TEMPLATE

      Cohabitation avec le pattern 005 (gestion courriels) : il y a un
      recouvrement. Le pattern 005 traite la gestion d'inbox réactive,
      ce sous-template traite la communication sortante proactive. Pas
      de doublon, mais à clarifier dans le rapport si les deux patterns
      sont matchés pour le même client.

      Densité comparable à Centris : la dimension réglementaire (Loi 25,
      CASL) ramène une richesse de règles équivalente, même si les
      contraintes ne sont pas aussi pointues que pour OACIQ.

      Volet plateforme (Brevo / Mailchimp) inclus : impossible de séparer
      la production du contenu de l'outil d'envoi. Sans Brevo configuré,
      le client a un beau texte qui n'arrive nulle part. Le template
      intègre donc cette dimension complète.

      Volet segmentation : c'est probablement le plus gros apport de
      l'accompagnement vs voie A. Un client autonome envoie souvent à
      toute sa base, ce qui réduit l'efficacité.

      HARMONISATION AVEC LES DEUX AUTRES SOUS-TEMPLATES DU 004

      Structure parfaitement alignée : overview, stack, configuration,
      workflow, validation_method, pitfalls, success_criteria,
      when_accompaniment_makes_sense, voie B avec ses 4 sous-sections.
      Le format passe le test de généralisation sur 3 cas très différents
      (réglementé Centris, créatif sociaux, hybride newsletter).

      POINT DE VIGILANCE

      Pour Marie-Pier (immobilier), ce sous-template serait celui injecté
      pour l'opportunité « Réveil du Excel de 200+ leads tièdes » de la
      feuille de route. À vérifier : est-ce que le Skill 5 saurait
      sélectionner CE sous-template plutôt que celui de Centris pour
      cette opportunité spécifique ? Probablement oui via les keywords
      (« nurturing », « leads tièdes ») mais à valider en re-test.

      CE QUI RESTE HORS TEMPLATE (gardé en accompagnement)

      - L'analyse spécifique de la base de contacts du client
      - La stratégie de segmentation calibrée à son modèle d'affaires
      - L'appréciation du dosage rythme / pression commerciale pour SON
        audience
      - La conformité Loi 25 / CASL appliquée à ses cas particuliers
        (transferts internationaux, données sensibles, etc.)
# ───── NOTES INTERNES SUR LES SOUS-TEMPLATES ─────

implementation_templates_notes_fr: |
  STRUCTURE COMMUNE AUX 3 SOUS-TEMPLATES

  Chaque sous-template suit le même schéma :
  - id : identifiant unique du sous-template
  - use_case_fr : description du cas d'usage couvert
  - triggers_when : critères pour le Skill 5 (industries cibles,
    keywords automation_wish, outils recommandés)
  - voie_a_self_serve : configuration et workflow pour client autonome
  - voie_b_accompagnee : ce que 5PennyAi fait en plus + ce qui ne se
    transmet pas par écrit + livrables tangibles

  STRATÉGIE DE SÉLECTION PAR LE SKILL 5

  Le Skill 5 reçoit ce pattern complet avec ses 3 sous-templates et
  sélectionne celui dont les triggers_when correspondent le mieux au
  contexte client. Logique de sélection :
  1. Si industry du client matche une industry_in d'un sous-template,
     ce sous-template est candidat.
  2. Si automation_wish du client contient des keywords d'un
     sous-template, ce sous-template est candidat.
  3. Si plusieurs sous-templates sont candidats, prendre celui avec
     le plus de matches.
  4. Si aucun sous-template ne match, fallback sur le premier
     (fiches-centris-immobilier) avec un avertissement dans les
     reviewer_notes.

  EXEMPLE — MARIE-PIER LAVIGNE (COURTIÈRE IMMOBILIÈRE)

  Pour son opportunité "Production de fiches Centris en 10 minutes",
  le Skill 5 doit sélectionner fiches-centris-immobilier (industry
  immobilier + keyword "centris" + tool claude-pro).

  Pour son opportunité "Réveil du Excel de 200+ leads tièdes" (si
  le pattern 004 est matché pour cette opportunité), le Skill 5 doit
  sélectionner newsletters-nurturing (industry immobilier + keywords
  "nurturing", "leads tièdes").
