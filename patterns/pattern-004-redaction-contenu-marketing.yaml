      Écriture nettement plus naturelle que ChatGPT par défaut, moins de
      temps de révision. Excellent en français (européen et québécois avec
      bon prompt). Fenêtre de contexte large (idéal pour donner beaucoup
      de contexte de marque). Feature "Projects" permet de garder un
      contexte persistant entre conversations.
    plans:
      - name: Free
        price_usd: 0
