      - name: Pro
        price_usd: 20
        note_fr: Usage 5× plus que gratuit, Projects, extended thinking
      - name: Max
        price_usd: 100
        note_fr: 5× le Pro, pour utilisateurs intensifs
      - name: Team
        price_usd: 25
        per_unit: "utilisateur/mois"
        note_fr: Espace de travail sécurisé, 2 sièges minimum
