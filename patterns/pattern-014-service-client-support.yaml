  - Toujours auditer la qualité de la base de connaissances en français comme livrable central
  - Pour outils SaaS hors Canada : vérifier DPA et conformité Loi 25 explicite
  - Mentionner Gestisoft comme concurrent direct sur clients Microsoft Dynamics
  - Pour OBNL et coopératives : adapter la base de connaissances aux besoins de leurs membres
