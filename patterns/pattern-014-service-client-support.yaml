# ═══════════════════════════════════════════════════════════════
# Pattern 014 — Service client et support après-vente assisté par IA
# Format hybride : structure machine + prose humaine
# Trois voies d'implémentation (self-serve, accompagné, custom)
# ═══════════════════════════════════════════════════════════════

id: ai-customer-support-helpdesk
title_fr: Service client et support après-vente assistés par IA (helpdesk, base de connaissances, résolution autonome)
category: relation-client-support
version: 1.0
last_updated: 2026-04-26
language: fr

# ───── RÉSUMÉS (prose narrative pour livrable client) ─────

summary_short_fr: >
  Système de gestion des demandes clients après-vente avec ticketing
  centralisé, base de connaissances intelligente et agent IA qui peut
  résoudre 30 à 70 % des questions courantes de manière autonome,
  laissant les agents humains se concentrer sur les cas complexes.

summary_long_fr: |
  Le service client par IA dépasse largement le simple chatbot du
  pattern 002 : il s'agit d'orchestrer un système complet où chaque
  demande client (courriel, chat, formulaire, parfois téléphone)
  devient un ticket trackable, où une base de connaissances bien
  alimentée permet aux clients de s'auto-servir, et où un agent IA
  bien entraîné peut résoudre les questions récurrentes (statut de
  commande, retours, mots de passe, FAQ produits) de bout en bout
  sans intervention humaine. L'objectif réaliste pour 2026 : 60-80 %
  de résolution autonome sur les questions de niveau 1, libérant les
  agents humains pour le traitement complex et empathique. Selon
  Twig, le marché distingue désormais clairement les « agents IA »
  qui résolvent des cas (Twig, Intercom Fin, Zendesk AI Advanced)
  des simples « chatbots » qui répondent. Les modèles de tarification
  sont volatils : facturation par résolution (Intercom Fin à 0,99 $
  USD/résolution), à l'agent ($29-115/mois USD), ou hybride. Pour
  une PME québécoise typique, le coeur stratégique reste : (1) bien
  choisir l'outil selon le volume de tickets et le profil, (2)
  investir dans la qualité de la base de connaissances en français
  (le facteur #1 de succès), (3) maintenir un humain dans la boucle
  pour les cas sensibles, (4) respecter Loi 25 sur les données
  client.

# ───── COMPLÉMENTARITÉ AVEC AUTRES PATTERNS ─────

complementary_patterns:
  - pattern_id: ai-text-chatbot-multichannel
    relation_fr: |
      Le pattern 002 traite la qualification de prospects en première
      ligne (visiteur web qui pose une question). Le pattern 014 va
      plus loin : ticketing structuré, base de connaissances, résolution
      autonome de problèmes après-vente. Les deux peuvent se chevaucher
      dans certains outils (Tidio Lyro, Crisp), mais le pattern 014
      cible spécifiquement le client existant qui a un problème, pas
      le prospect qui s'informe.

  - pattern_id: ai-email-management
    relation_fr: |
      Beaucoup de demandes clients arrivent par courriel. Le pattern
      005 traite la gestion globale d'inbox; le pattern 014 prend le
      relais quand un courriel devient un ticket de support qui doit
      être tracké, archivé, et résolu avec SLA.

  - pattern_id: ai-voice-receptionist
    relation_fr: |
      Pour les clients préférant le téléphone, le pattern 001 capte
      l'appel et peut générer un ticket dans le système du pattern
      014. Les deux patterns orchestrés couvrent l'ensemble des canaux.

  - pattern_id: ai-data-dashboards
    relation_fr: |
      Les KPIs de service client (volume, temps de résolution, CSAT,
      sujets récurrents) sont des données précieuses pour le pattern
      009. Un bon helpdesk alimente automatiquement les tableaux de bord.

