# ───── RISQUES ─────

risks:
  - type: contenu
    title_fr: Qualité de la base de connaissances en français — facteur #1
    severity: critique
    description_fr: |
      Selon Hiver et Groove, l'IA ne peut résoudre que ce qui est
      bien documenté. Une base de connaissances mal structurée, ou
      uniquement en anglais alors que les clients sont francophones,
      condamne l'IA à halluciner ou à escalader systématiquement.
      C'est le facteur de succès #1, et le plus souvent négligé.
    mitigation_fr: |
      (1) Audit initial des FAQ existantes, courriels passés, scripts
      d'agents pour extraire les questions récurrentes. (2) Création
      structurée de 30-100 articles en français de qualité dans la
      première phase. (3) Knowledge Gap Finder (Groove) ou équivalent
      pour identifier les trous. (4) Mise à jour mensuelle des
      articles selon les tickets non résolus. (5) Désigner un
      responsable de la KB.

  - type: reglementaire-qc
    title_fr: Loi 25 — données client dans les tickets
    severity: important
    description_fr: |
      Les tickets de support contiennent souvent des renseignements
      personnels (nom, courriel, adresse, parfois numéro de carte
      tronqué, historique d'achats). Si traité par un LLM hébergé
      hors Canada (cas de la majorité des outils), questions de
      conformité émergent. Aussi : profilage automatisé (priorisation
      des tickets selon valeur client) tombe sous section 12.1.
    mitigation_fr: |
      (1) Pour outils SaaS hors Canada, vérifier les contrats
      data processing addendums (DPA) et la conformité Loi 25.
      (2) Anonymiser les données quand possible (masquer numéros
      de cartes, par exemple). (3) Pour conformité stricte,
      hébergement Canada via API custom ou outils canadiens.
      (4) Documenter les profilages automatisés et offrir
      mécanisme de révision section 12.1.

  - type: technique
    title_fr: Hallucinations IA dans réponses client
    severity: important
    description_fr: |
      Une IA qui invente une politique de retour, un délai de
      livraison, ou une garantie peut créer des engagements légalement
      contraignants pour l'entreprise. Risque réputationnel et légal
      réel. Selon Fini, les plateformes « retrieval-only » sont
      particulièrement à risque.
    mitigation_fr: |
      (1) Restreindre l'IA à répondre UNIQUEMENT sur la base de
      la KB validée (pas de réponses « créatives »). (2) Configurer
      des seuils de confiance — si l'IA n'est pas certaine, escalader
      à un humain. (3) Pour cas sensibles (engagement financier,
      légal), forcer l'escalade systématique. (4) Audit régulier
      des conversations IA pour détecter les hallucinations.

  - type: pricing
    title_fr: Coûts pricing imprévisibles (per-resolution, per-session)
    severity: moyen
    description_fr: |
      Intercom Fin à 0,99 $/résolution semble raisonnable mais peut
      coûter 30 000 $/mois à grand volume (cas documenté Minami).
      Freshdesk Freddy facturée par session sur certains plans.
      Zendesk Advanced AI à 50 $/agent en plus. Selon MyAskAI,
      « billing shot up » est plainte fréquente.
    mitigation_fr: |
      (1) Calculer le coût total sur 12-24 mois avec scénarios
      pessimistes (volume +50 %). (2) Privilégier modèles à forfait
      fixe (Groove, Crisp, Help Scout) si volume élevé. (3) Mettre
      en place des plafonds et des alertes de dépassement.

  - type: organisationnel
    title_fr: Acceptation de l'équipe et qualité de l'implémentation
    severity: important
    description_fr: |
      Selon Groove, 70 % des professionnels ont regretté un achat
      tech dans les 18 derniers mois — principalement parce que l'outil
      était trop complexe pour leur workflow. Une équipe support qui
      perçoit l'IA comme une menace ou une complication ne s'en sert
      pas.
    mitigation_fr: |
      (1) Impliquer l'équipe dans le choix d'outil et la conception
      de la KB. (2) Positionner l'IA comme un assistant qui libère
      du temps pour les cas complexes. (3) Phasage progressif :
      commencer avec suggestions de réponses (copilot) avant de
      passer à résolution autonome (agent). (4) Mesurer KPIs et
      partager avec l'équipe.

  - type: stratégique
    title_fr: Dépendance vendor et migration coûteuse
    severity: moyen
    description_fr: |
      Choisir Zendesk, Intercom ou Salesforce engage à long terme.
      Migrer vers un autre outil 3-5 ans plus tard est complexe :
      réimporter tickets, recréer KB, retravailler workflows.
      Selon Twig, « tool-stack migrations tank most AI deployments ».
    mitigation_fr: |
      (1) Privilégier outils avec exports faciles (Crisp, Groove,
      Help Scout sont relativement ouverts). (2) Pour entreprises
      en croissance rapide, anticiper le besoin de scaling avant
      le choix d'outil. (3) Pour clients voulant indépendance,
      considérer agent custom avec helpdesk open-source (Chatwoot,
      Zammad).

  - type: qualite
    title_fr: Détérioration silencieuse de la qualité IA
    severity: moyen
    description_fr: |
      Sans monitoring actif, la qualité des réponses IA peut se
      détériorer (KB obsolète, nouveaux types de questions, drift
      du modèle). Le client peut s'apercevoir 6 mois plus tard que
      la résolution rate a chuté de 65 % à 45 %.
    mitigation_fr: |
      (1) Tableaux de bord de qualité (resolution rate, CSAT,
      sujets non résolus). (2) Revues hebdomadaires de l'équipe
      (modèle RecruitCRM : passé de 35 % à 68 % grâce aux QA
      reviews). (3) Maintenance mensuelle de la KB. (4) Alertes
      automatiques sur baisses de KPIs.

# ───── PRÉREQUIS ─────

prerequisites:
  - Volume minimum justifiant l'investissement (50+ tickets/mois pour voie A, 300+ pour voie B)
  - Base de clients existante avec historique de questions récurrentes
  - Identification d'un responsable interne pour la base de connaissances
  - FAQ ou documentation existante (au moins partielle) en français
  - Politique de protection des renseignements personnels à jour pour Loi 25
  - Pour Voie B : engagement de l'équipe support à utiliser l'outil (sans adoption, ROI nul)
  - Pour Voie C : volume très élevé (>1 000 tickets/mois) ou exigences réglementaires strictes
  - Compréhension que l'IA est un copilote qui complète l'humain, pas un remplacement
  - Pour outils SaaS hors Canada : vérification des DPA et conformité Loi 25

