  - Mentionner que le marché québécois est sous-pénétré sur les helpdesks AI (vs USA)
  - Pour clients construction/manufacturier : prévoir les pics saisonniers dans le dimensionnement
  - Attention courtiers immobiliers : leurs « clients » sont des transactionnels, pas un cas-fit standard helpdesk — voir profil sectoriel courtage immobilier

# ───── NOTES HONNÊTES (usage interne uniquement) ─────

internal_notes_fr: |
  ANGLE DIFFÉRENCIATEUR PRINCIPAL : QUALITÉ DE LA BASE DE CONNAISSANCES
  Les cabinets traditionnels et intégrateurs québécois (Gestisoft,
  CyberPerformance) se concentrent sur la techno (déploiement Zendesk,
  Microsoft Dynamics). 5PennyAi peut se positionner comme « l'auditeur
  qui priorise la KB en français » — facteur de succès #1 selon Hiver
  et Groove. Une KB de 50 articles structurés en français est plus
  précieuse qu'un Zendesk Enterprise mal alimenté.

  ANGLE COMPLÉMENTAIRE : APPROCHE PROGRESSIVE ANTI-ZENDESK
  Beaucoup de PME se font vendre Zendesk Enterprise à 115 $/agent +
  AI 50 $ + 8 000 $ implementation. C'est massivement surdimensionné
  pour 90 % des cas. 5PennyAi peut honnêtement recommander Crisp
  (25 €/mois) ou Groove (29 $/siège avec AI inclus). Différenciation
  forte vs cabinets vendant des projets à 30K-100K$.

  PIÈGES À ÉVITER :
  - Ne PAS pousser Intercom Fin sans calculer le coût total à 12-24
    mois avec scénarios pessimistes — facturation par résolution
    peut exploser à grand volume.
  - Ne PAS sous-estimer la KB. Promettre « AI agent en 2 semaines »
    sans avoir nettoyé/structuré 50+ articles en FR est un piège
    classique qui mène à des projets qui échouent.
  - Ne PAS recommander Zendesk Enterprise à PME 25-100 emp. Trop
    cher, trop complexe. Groove ou Freshdesk font mieux.
  - Ne PAS oublier le DPA pour outils SaaS hors Canada — Loi 25.

  CHIFFRES À NUANCER :
  - « 67 % résolution rate Intercom Fin » est un AVERAGE — meilleurs
    clients à 80 %+, pires à 30 %. Dépend qualité KB.
  - « 30-60 % réduction temps résolution » conditionnel à KB de
    qualité (Groove cite explicitement cette condition).
  - « 4,7K $ cost per hire » du pattern 008 ne s'applique pas ici —
    différent contexte.

  CIBLE PRIORITAIRE COMMERCIALE :
  - E-commerce 30K $+ revenu mensuel avec 100+ tickets/mois (Gorgias,
    Tidio, Crisp)
  - SaaS B2B/B2C avec base utilisateurs active (Intercom Fin si
    conversationnel, Groove si plus traditionnel)
  - Manufacturiers et distributeurs B2B avec service après-vente
    (Freshdesk, Zoho Desk)
  - OBNL et coopératives avec membres (Crisp, Help Scout, Zoho Desk
    free tier)

  CROSS-SELL :
  Client qui adopte la voie B sur service client = excellent prospect
  pour :
  - Pattern 002 (chatbot) pour première ligne sur le site web
  - Pattern 005 (gestion courriels) pour les autres communications
  - Pattern 009 (BI) pour analyser les KPIs support (volume, CSAT,
    sujets récurrents)
  - Futur pattern 015 (vente B2B) pour upsell avec données support
  - Futur pattern 017 (e-commerce) pour intégration Shopify/WooCommerce
    si applicable

  TENDANCES À SURVEILLER :
  - Modèle per-resolution (Intercom Fin, Twig) gagne du terrain
    mais coûts imprévisibles. Surveiller plafonnement.
  - Outils canadiens/québécois en service client AI rares — opportunité
    de marché potentielle pour 5PennyAi à long terme.
  - Audit IA et explicabilité deviendront obligatoires (AIDA fédéral
    en cours). Préparer dès maintenant.

