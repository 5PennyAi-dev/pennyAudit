# ───── PROBLÈME (voix du client pour narratif) ─────

pain_point_fr: |
  Je gère une boutique en ligne. Mon adjointe et moi recevons une
  centaine de courriels par jour : « où est ma commande », « comment
  je retourne », « est-ce que ce produit existe en bleu », et des
  variations infinies des mêmes 20 questions. On répond en mode
  pompier, on copie-colle des réponses depuis un Word qui n'est jamais
  à jour, et on oublie systématiquement de répondre à 5-10 % des
  courriels qui se perdent dans la masse. Les clients se plaignent
  des délais. Quand ma collègue est en vacances, c'est l'enfer. J'ai
  entendu parler de helpdesks comme Zendesk, mais quand j'ai regardé
  le prix, c'était 115 $ par agent par mois plus 50 $ pour l'IA, plus
  un projet d'implantation à 8 000 $. Pour ma taille d'entreprise,
  c'est complètement disproportionné.

problem_facts:
  - claim_fr: "Le coût moyen d'une interaction de service client par humain est de 6,00 $ USD vs 0,50 $ USD pour un chatbot selon Fin.ai"
    source_id: fin-ai-pricing-comparison
  - claim_fr: "Selon Twig, l'objectif réaliste pour les outils de support IA en 2026 est 60-80 % de résolution autonome sur les questions de niveau 1"
    source_id: twig-ai-customer-support
  - claim_fr: "Selon Hiver, les helpdesks AI réduisent les temps de résolution de 30 à 60 %, mais seulement quand l'IA s'entraîne sur la base de connaissances réelle de l'entreprise"
    source_id: groove-helpdesk-smb
  - claim_fr: "Selon Fin.ai, le marché de l'AI customer service devrait atteindre 15,12 milliards USD en 2026"
    source_id: fin-ai-pricing-comparison
  - claim_fr: "Intercom rapporte que Fin AI résout en moyenne 67 % des conversations à travers ses 7 000+ clients, avec une amélioration d'environ 1 % par mois"
    source_id: fin-ai-pricing-comparison
  - claim_fr: "Selon Pylon, les meilleures plateformes IA cuvent les temps de résolution jusqu'à 50 %"
    source_id: pylon-ai-ticketing
  - claim_fr: "Selon Groove, 70 % des professionnels d'affaires ont regretté un achat technologique dans les 18 derniers mois, généralement parce que l'outil était trop complexe pour leur workflow réel"
    source_id: groove-helpdesk-smb

# ───── SOLUTION (prose + structure) ─────

solution_summary_fr: |
  L'approche dépend du volume de tickets et de l'écosystème déjà en
  place. Pour une micro ou petite PME (moins de 100 tickets/mois),
  trois options réalistes : (a) Crisp ou Tidio Lyro qui combinent
  chatbot et helpdesk léger en français pour 25-60 $ CAD/mois, (b)
  Help Scout pour les boîtes courriel partagées avec base de
  connaissances simple à 25 $ USD/utilisateur/mois, (c) Zoho Desk
  qui offre un plan gratuit pour 3 agents et inclut Zia AI dès les
  plans payants. Pour une moyenne PME (100-1 000 tickets/mois),
  trois directions principales : (a) Freshdesk avec Freddy AI
  (excellent compromis fonctionnalités-prix), (b) Groove (AI-native,
  très bien noté pour les PME en croissance, 29 $/siège/mois USD avec
  AI inclus), (c) Intercom + Fin AI si la stratégie est conversationnelle
  et orientée produit (modèle hybride siège + 0,99 $/résolution).
  Pour les e-commerce sur Shopify avec gros volume, Gorgias (10 $/mois
  starter) est purpose-built pour le secteur. La pièce critique : la
  qualité de la base de connaissances en français. Sans elle, l'IA
  ne peut rien résoudre de manière autonome.

deployment_modes:
  - id: helpdesk-leger-pme
    name_fr: Helpdesk léger pour PME (volume modéré)
    description_fr: |
      Crisp, Tidio Lyro, Help Scout, Zoho Desk plan gratuit. Pour
      micro-entreprises et petites PME avec moins de 100 tickets/mois.
      Inclut ticketing simple, FAQ ou base de connaissances de base,
      réponses suggérées par IA, parfois chatbot intégré.

  - id: helpdesk-complet-pme
    name_fr: Helpdesk complet PME avec IA native
    description_fr: |
      Groove, Freshdesk avec Freddy AI, Zoho Desk plans payants. Pour
      PME 25-100 employés avec 100-1 000 tickets/mois. Inclut
      multi-canaux, automatisation des règles, base de connaissances
      avancée, AI agent qui résout en autonomie, rapports et SLAs.

  - id: helpdesk-conversationnel
    name_fr: Helpdesk conversationnel (Intercom Fin)
    description_fr: |
      Intercom + Fin AI Agent. Pour SaaS, produits numériques, services
      avec relation client conversationnelle. Modèle hybride :
      29-139 $/siège/mois USD + 0,99 $/résolution USD. AI Fin résoudrait
      en moyenne 67 % des conversations selon Intercom.

  - id: helpdesk-ecommerce
    name_fr: Helpdesk spécialisé e-commerce
    description_fr: |
      Gorgias, Shopify Inbox AI. Pour boutiques en ligne avec gros
      volume de questions WISMO (Where Is My Order), retours, tracking.
      Intégration native Shopify, WooCommerce. Actions directes sur
      les commandes (remboursement, modification d'adresse) depuis le
      ticket.

  - id: helpdesk-enterprise
    name_fr: Helpdesk enterprise (Zendesk, Salesforce Service Cloud)
    description_fr: |
      Zendesk AI, Salesforce Service Cloud Einstein. Pour moyennes
      entreprises 100+ employés ou volumes >1 000 tickets/mois. Très
      personnalisable, mais coûteux et complexe à déployer (1-3 mois
      d'implantation, 8 000 $+ de setup).

  - id: ai-agent-standalone
    name_fr: Agent IA autonome ajouté à un helpdesk existant
    description_fr: |
      Twig, Decagon, Sierra, Ada, Forethought, Maven AGI. Le client
      garde son helpdesk actuel; l'agent IA se connecte par API et
      résout les tickets de manière autonome. Modèle 0,99-5 $/résolution
      ou contrats enterprise (95 000 $+ USD/an pour Decagon, 150 000 $+
      pour Sierra).

  - id: custom-agent
    name_fr: Agent IA custom
    description_fr: |
      Pipeline custom : Claude API ou OpenAI API + base de connaissances
      vectorielle (Pinecone, Supabase pgvector) + intégration helpdesk
      via webhooks. Pour cas avec exigences Loi 25 strictes (hébergement
      Canada), logique métier propre, ou volume justifiant l'investissement.

typical_capabilities:
  - Ticketing centralisé multi-canaux (courriel, chat, formulaire, téléphone)
  - Routage automatique des tickets selon catégorie et priorité
  - Réponses suggérées par IA pour les agents (copilote)
  - Résolution autonome de bout en bout pour cas standards
  - Base de connaissances avec recherche sémantique
  - Self-service portal pour clients (FAQ, articles, statut commandes)
  - Analyses de sentiment et détection d'urgence
  - Escalade vers humain avec contexte préservé
  - SLA tracking et alertes proactives
  - Intégration CRM, e-commerce, ERP
  - Rapports et tableaux de bord (volume, CSAT, résolution rate, sujets)
  - Détection automatique des trous dans la base de connaissances
  - Génération automatique d'articles à partir de tickets résolus
  - Multilingue (français/anglais notamment)
  - Conformité Loi 25 (anonymisation, droits d'accès, archivage)

# ───── VOIES D'IMPLÉMENTATION (core du pattern) ─────

implementation_paths:

  - id: self-serve
    name_fr: Voie A — Self-serve (helpdesk léger avec IA)
    ideal_profile_fr: |
      Micro ou petite PME avec moins de 100 tickets/mois, pas
      d'équipe support dédiée, souvent le propriétaire ou 1-2 adjoints
      qui gèrent. Souvent : boutique en ligne en croissance, SaaS
      tôt, OBNL avec membres, association, distributeur B2B avec
      petite clientèle. Veut sortir de la boîte courriel partagée
      sans projet lourd.
    description_fr: |
      Le client active un helpdesk léger : Crisp (à partir de 0 €/
      mois plan gratuit, jusqu'à 95 €/mois en Plus) si l'interface
      française et bilingue est priorité, Tidio Lyro (29 $/mois USD
      pour 100 conversations IA) si focus e-commerce, ou Zoho Desk
      gratuit pour 3 agents si déjà dans l'écosystème Zoho. 5PennyAi
      fournit l'audit qui (1) recommande l'outil selon le profil,
      (2) configure les canaux d'entrée (courriel, formulaire, chat),
      (3) crée 10-20 articles de base de connaissances à partir des
      questions les plus fréquentes du client, (4) configure les
      règles d'autoassignation et de catégorisation, (5) propose un
      protocole de gouvernance simple Loi 25.
    setup_duration: 4-12-heures
    client_time_required_hours:
      min: 6
      max: 15
    total_cost_cad:
      setup_range:
        min: 0
        max: 600
      monthly_min: 0
      monthly_max: 200
      first_year: "0 à 3 000 $"
    recommended_tools_priority:
      - tool_id: crisp
        reason_fr: Première recommandation pour clientèle francophone — interface FR de qualité
      - tool_id: tidio-lyro
        reason_fr: Si focus e-commerce avec boutique Shopify ou WooCommerce
      - tool_id: zoho-desk
        reason_fr: Si client déjà dans Zoho ou veut un plan gratuit 3 agents
      - tool_id: help-scout
        reason_fr: Si focus boîte courriel partagée propre et simple
    fivepennyai_service_fr: |
      Audit payant (199-499 $) : choix d'outil, configuration de base,
      création des 10-20 premiers articles de base de connaissances,
      automatisations simples, formation 1-2 h, protocole de gouvernance
      simple Loi 25.
    fivepennyai_revenue_potential: faible-a-moyen-par-client

  - id: accompanied
    name_fr: Voie B — Accompagnement (helpdesk complet avec IA agent)
    ideal_profile_fr: |
      PME 25-100 employés, 100-1 000 tickets/mois, équipe support
      de 2-8 agents. Souvent : e-commerce établi avec multi-canaux,
      SaaS B2B/B2C, manufacturier avec service après-vente,
      distributeur B2B avec clients professionnels, OBNL avec
      multiples programmes membres. Volume qui justifie un AI agent
      qui résout en autonomie.
    description_fr: |
      5PennyAi configure une stack complète. Trois directions selon
      le profil. (a) Groove (29-99 $/siège/mois USD, AI inclus, AI-native)
      pour PME en croissance qui veulent simplicité et puissance.
      (b) Freshdesk (15-79 $/agent/mois USD) avec Freddy AI pour
      compromis fonctionnalités-prix éprouvé, écosystème Freshworks
      cohérent. (c) Intercom + Fin AI pour SaaS et produits numériques
      avec stratégie conversationnelle (29-139 $/siège/mois USD +
      0,99 $/résolution USD). Inclut : (1) audit complet du processus
      de support actuel, (2) configuration multi-canaux (courriel,
      chat, formulaire, parfois téléphone), (3) création d'une base
      de connaissances structurée en français de 30-100 articles à
      partir des tickets historiques, (4) configuration de l'AI agent
      avec règles métier et garde-fous, (5) automatisations avancées
      (routage, escalade, SLA), (6) intégration CRM et e-commerce
      (Shopify, HubSpot, Salesforce, etc.), (7) tableaux de bord et
      KPIs, (8) protocole de gouvernance Loi 25 complet, (9) formation
      équipe 4-6 h, (10) support 30-60 jours pour ajustement.
    setup_duration: 2-6-semaines
    client_time_required_hours:
      min: 20
      max: 50
    total_cost_cad:
      setup_range:
        min: 3500
        max: 9000
      monthly_tool_range:
        min: 200
        max: 2500
      first_year: "5 900 à 39 000 $"
    recommended_tools_priority:
      - tool_id: groove
        reason_fr: Premier choix pour PME 25-100 emp en croissance, AI native, simplicité
      - tool_id: freshdesk
        reason_fr: Compromis éprouvé, écosystème Freshworks, plan gratuit pour démarrer
      - tool_id: intercom-fin
        reason_fr: Si SaaS conversationnel avec base utilisateurs active
      - tool_id: gorgias
        reason_fr: Si e-commerce Shopify/WooCommerce avec >300 tickets/mois
      - tool_id: zoho-desk
        reason_fr: Si déjà dans écosystème Zoho avec CRM
    fivepennyai_service_fr: |
      Forfait « Service client IA » : audit + setup helpdesk + base
      de connaissances + AI agent configuré + automatisations +
      intégrations + formation + protocole Loi 25 + support 30-60
      jours. Différenciation 5PennyAi : on PRIORISE la base de
      connaissances en français comme livrable central, vs cabinets
      qui se concentrent sur la techno et négligent le contenu —
      c'est pourtant le facteur de succès #1 selon Hiver et Groove.
    fivepennyai_revenue_potential: moyen-a-eleve-par-client

  - id: custom
    name_fr: Voie C — Solution sur mesure / souveraine
    ideal_profile_fr: |
      Moyennes entreprises 100+ employés ou >1 000 tickets/mois,
      cas avec exigences spécifiques : intégration ERP propriétaire,
      logique métier complexe (ex: assurance avec réglementation,
      finance avec compliance), exigence Loi 25 stricte avec
      hébergement Canada, ou besoin d'agent IA très spécialisé
      (ex: support technique pointu) avec audit de qualité.
    description_fr: |
      5PennyAi déploie une solution custom : pipeline Claude API +
      base de connaissances vectorielle (Supabase pgvector ou
      Pinecone) + intégration helpdesk existant via webhooks +
      éventuellement orchestration Make/n8n. Inclut documentation
      Loi 25 complète, audit explicabilité (pour expliquer chaque
      décision IA), tests de bias, hébergement AWS Canada Central.
      Alternative : agent IA standalone (Twig, Forethought) qui se
      connecte au helpdesk existant.
    setup_duration: 8-16-semaines
    client_time_required_hours:
      min: 40
      max: 100
    total_cost_cad:
      setup_range:
        min: 18000
        max: 60000
      monthly_hosting_range:
        min: 200
        max: 2000
      first_year: "20 400 à 84 000 $"
    recommended_tools_priority:
      - tool_id: anthropic-api
        reason_fr: Claude pour qualité française et raisonnement explicable
      - tool_id: twig
        reason_fr: Agent IA standalone à 3-5 $/résolution, alternative à Decagon
      - tool_id: forethought
        reason_fr: Agent IA standalone enterprise pour cas complexes
    fivepennyai_service_fr: |
      AI Sprint 8-16 semaines : audit, conception, développement,
      intégrations, déploiement, formation, documentation Loi 25.
    fivepennyai_revenue_potential: tres-eleve-par-client-mais-volume-faible
    honest_note_fr: |
      Voie réservée aux 5-10 % des clients : volume très élevé,
      logique métier vraiment unique, ou exigences réglementaires
      strictes. Pour 90 % des PME, la voie B avec Groove ou Freshdesk
      couvre amplement. Soyons honnêtes : Zendesk Enterprise à
      115 $/agent + 50 $ AI add-on + 8 000 $ implementation est
      souvent surdimensionné — Groove à 29 $/siège avec AI inclus
      fait souvent mieux pour les PME.

# ───── OUTILS DU MARCHÉ (HIÉRARCHISÉS) ─────

tools:

  # ── TIER 1 : PME francophones et bilingues ──

  - id: crisp
    tier: 1
    name: Crisp
    origin: France
    url: https://crisp.chat
    interface_fr: oui
    starting_price_eur_monthly: 0
    currency: EUR
    target_segment_fr: PME francophones avec petit-moyen volume de tickets, multi-canal
    strength_fr: |
      Solution française reconnue, interface FR de qualité, support
      en français. Combine chatbot, helpdesk léger, knowledge base,
      shared inbox, CRM léger. Mature, déployée chez nombreuses PME
      françaises et québécoises. Bot Builder pour automatisations
      simples. Plan gratuit pour démarrage, plans payants raisonnables.
    plans:
      - name: Free
        price_eur: 0
        per_unit: forever
        note_fr: 2 utilisateurs, fonctions de base
      - name: Mini
        price_eur: 25
        per_unit: workspace/mois
      - name: Essentials
        price_eur: 95
        per_unit: workspace/mois
        note_fr: Inclut chatbot avancé, knowledge base
      - name: Plus
        price_eur: 295
        per_unit: workspace/mois
    weakness_fr: |
      AI Agent moins sophistiqué que Fin ou Twig (pas de résolution
      autonome end-to-end). Limites de stockage des messages sur les
      plans bas.
    affiliate_potential: a-verifier
    source_id: impli-ticketing-2026
    used_in_paths: [self-serve, accompanied]
    recommended_priority: 1
    note_fr: |
      Premier choix pour PME québécoise francophone qui veut sortir
      du chaos courriel sans projet lourd. À pousser systématiquement
      comme alternative aux outils anglo-saxons sur ce profil.

  - id: tidio-lyro
    tier: 1
    name: Tidio (avec Lyro AI)
    origin: Pologne (mais marché global)
    url: https://www.tidio.com
    interface_fr: oui
