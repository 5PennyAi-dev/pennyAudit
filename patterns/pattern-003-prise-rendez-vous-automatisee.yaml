# ───── PROBLÈME (voix du client pour narratif) ─────

pain_point_fr: |
  Je passe des heures par semaine à jouer au ping-pong courriel avec mes
  clients pour fixer des rendez-vous. "Quelles sont vos disponibilités?"
  "Pouvez-vous plutôt le mardi?" "Finalement, jeudi serait mieux...".
  Et malgré tout ça, j'ai encore des no-shows qui me coûtent de l'argent
  et me laissent avec des plages vides impossibles à remplir à la dernière
  minute. Il doit bien y avoir une meilleure façon.

problem_facts:
  - claim_fr: "Les logiciels de prise de rendez-vous en ligne réduisent significativement le temps administratif et les absences non justifiées grâce aux rappels automatiques"
    source_id: hubspot-scheduling-guide
  - claim_fr: "Selon FloatAI, l'automatisation de la planification et du suivi client donne des gains d'efficacité de 32 % à 38 % chez leurs clients québécois (Protech Peinture, Mic Métal Inc.)"
    source_id: floatai-pme-quebec
  - claim_fr: "Une réceptionniste IA ou un chatbot peut prendre des rendez-vous automatiquement, mais s'appuie typiquement sur un outil de scheduling comme Cal.com ou Calendly en arrière-plan"
    source_id: cal-com-pricing

# ───── SOLUTION (prose + structure) ─────

solution_summary_fr: |
  On déploie un outil de prise de rendez-vous en ligne (Cal.com, Calendly,
  GOrendezvous ou équivalent) qui publie les disponibilités de l'entreprise
  sur une page de réservation web. Le client choisit un créneau, remplit
  un formulaire court (nom, téléphone, motif), et le rendez-vous apparaît
  automatiquement dans l'agenda de l'entreprise (Google Calendar, Outlook,
  ou calendrier intégré). Des rappels SMS et courriel sont envoyés
  automatiquement. L'IA peut être ajoutée en surcouche pour : qualifier
  la demande avant réservation, router vers le bon intervenant selon le
  type de service, composer des rappels personnalisés basés sur l'historique
  du client, ou relancer intelligemment les clients qui ont annulé.

deployment_modes:
  - id: basic-booking-page
    name_fr: Page de réservation simple
    description_fr: Un lien unique (ex. cal.com/monentreprise) que le client visite pour réserver. Le cœur de l'offre.

  - id: embedded-website
    name_fr: Widget intégré au site web
    description_fr: Un widget de réservation intégré directement au site de l'entreprise (WordPress, Shopify, etc.).

  - id: multi-service-routing
    name_fr: Routage intelligent par type de service
    description_fr: L'IA pose quelques questions au client et le dirige vers le bon intervenant ou le bon type de rendez-vous.

  - id: payment-required
    name_fr: Paiement ou dépôt obligatoire
    description_fr: Carte requise pour confirmer; réduit drastiquement les no-shows. Intégration Stripe, Square, PayPal.

  - id: smart-reminders
    name_fr: Rappels intelligents
    description_fr: Rappels SMS et courriel automatiques, personnalisables par type de rendez-vous et par client.

  - id: no-show-recovery
    name_fr: Récupération de no-shows par IA
    description_fr: Relance automatique des clients qui ont manqué leur RDV, avec proposition de réservation alternative.

typical_capabilities:
  - Page de réservation personnalisée avec les couleurs et le logo de l'entreprise
  - Synchronisation bidirectionnelle avec Google Calendar, Outlook, Apple Calendar
  - Rappels automatiques par SMS et courriel (personnalisables)
  - Formulaires d'accueil (intake) personnalisés par type de rendez-vous
  - Paiement ou dépôt obligatoire via Stripe, Square ou PayPal
  - Gestion de plusieurs intervenants et de leurs disponibilités
  - Types de rendez-vous multiples (durées, tarifs, lieux différents)
  - Intégration CRM (HubSpot, Salesforce, Zoho, Pipedrive)
  - Analytics (taux de remplissage, taux de no-show, source des réservations)
  - Multilangue (français et anglais)
  - Confirmation automatique ou manuelle selon la politique de l'entreprise

# ───── VOIES D'IMPLÉMENTATION (core du pattern) ─────

implementation_paths:

  - id: self-serve
    name_fr: Voie A — Self-serve (autonomie)
    ideal_profile_fr: |
      Solopreneur ou micro-entreprise avec besoin simple : un seul
      intervenant, quelques types de rendez-vous, budget minimal. À l'aise
      à suivre un tutoriel de configuration.
    description_fr: |
      Le client s'inscrit sur Cal.com (gratuit), Calendly (gratuit) ou
      GOrendezvous (essai gratuit puis ~45 $/mois pour un seul praticien).
      Il configure ses disponibilités, crée 1-3 types de rendez-vous, connecte
      son agenda Google ou Outlook, et partage son lien de réservation.
      5PennyAi intervient uniquement pour l'audit et la recommandation.
    setup_duration: 2-4-heures
    client_time_required_hours:
      min: 2
      max: 4
    total_cost_cad:
      setup_range:
        min: 0
        max: 300
      monthly_min: 0
      monthly_max: 60
      first_year: "0 à 1 020 $"
    recommended_tools_priority:
      - tool_id: cal-com
        reason_fr: Plan gratuit illimité pour solo, open source, très populaire
      - tool_id: calendly
        reason_fr: Plan gratuit basique, plus populaire internationalement, intégrations vastes
      - tool_id: gorendezvous
        reason_fr: Pour professionnels de santé/bien-être au Québec exclusivement
    fivepennyai_service_fr: |
      Audit payant (99-299 $) qui identifie le bon outil pour le contexte
      du client, liste les types de rendez-vous à configurer, fournit un
      guide de setup pas-à-pas.
    fivepennyai_revenue_potential: faible-par-client-mais-volume-tres-eleve

  - id: accompanied
    name_fr: Voie B — Accompagnement hybride (prêt-à-l'emploi)
    ideal_profile_fr: |
      PME avec plusieurs intervenants, types de rendez-vous variés, besoin
      d'intégration avec CRM ou site web existant, volonté que "ça marche
      bien dès le départ" sans y perdre des soirées.
    description_fr: |
      5PennyAi configure l'outil de A à Z : création du compte, paramétrage
      des disponibilités multi-intervenants, création des types de rendez-vous
      avec durées et tarifs, personnalisation de la page de réservation au
      branding du client, intégration au site web via widget, configuration
      des rappels SMS personnalisés, intégration au CRM, tests réels, formation
      du client (1 h), puis support ponctuel 30 jours. Peut inclure
      l'intégration avec un chatbot ou une réceptionniste IA existante.
    setup_duration: 1-2-jours
    client_time_required_hours:
      min: 2
      max: 5
    total_cost_cad:
      setup_range:
        min: 600
        max: 1800
      monthly_tool_range:
        min: 20
        max: 120
      first_year: "840 à 3 240 $"
    recommended_tools_priority:
      - tool_id: cal-com
        reason_fr: Rapport qualité/prix imbattable pour PME, flexible
      - tool_id: hubspot-scheduling
        reason_fr: Si le client utilise HubSpot CRM, intégration native
      - tool_id: gorendezvous
        reason_fr: Pour cliniques santé/bien-être au Québec, tout-en-un
      - tool_id: calendly
        reason_fr: Si le client préfère une interface polie et éprouvée
    fivepennyai_service_fr: |
      Forfait "Prise de rendez-vous clé en main" : audit + configuration
      complète + intégrations + formation + 30 jours support. Option :
      maintenance mensuelle (ajustements, nouveaux types de RDV, etc.).
    fivepennyai_revenue_potential: moyen-par-client

  - id: custom
    name_fr: Voie C — Développement sur mesure avec surcouche IA
    ideal_profile_fr: |
      PME avec logique complexe qu'aucun SaaS standard ne couvre :
      multi-locations avec règles d'allocation spécifiques, qualification
      poussée avant réservation, workflows de relance personnalisés basés
      sur l'historique client, intégration profonde avec logiciel métier
      (Jobber, ServiceTitan, Acomba, DEP, logiciel dentaire, etc.).
    description_fr: |
      5PennyAi développe une surcouche IA sur un outil de scheduling
      existant (via API) ou construit une solution custom avec Anthropic
      API + base de données. L'IA peut : qualifier les demandes avant
      réservation, composer des confirmations et rappels personnalisés,
      détecter les clients à risque de no-show et les contacter
      différemment, router intelligemment les demandes, analyser les
      patterns de réservation et optimiser les plages horaires.
    setup_duration: 3-6-semaines
    client_time_required_hours:
      min: 10
      max: 30
    total_cost_cad:
      setup_range:
        min: 6000
        max: 18000
      monthly_hosting_range:
        min: 50
        max: 400
      first_year: "6 600 à 22 800 $"
    recommended_tools_priority:
      - tool_id: cal-com
        reason_fr: API très flexible, open source permet customisation profonde
      - tool_id: anthropic-api
        reason_fr: Claude Sonnet 4 pour les compositions et l'analyse IA
      - tool_id: make-zapier
        reason_fr: Pour orchestrer les workflows sans code serveur
    fivepennyai_service_fr: |
      AI Sprint 3-6 semaines : développement surcouche IA, déploiement,
      formation, maintenance continue optionnelle (mensuelle).
    fivepennyai_revenue_potential: eleve-par-client-mais-volume-faible
    honest_note_fr: |
      La voie custom est rarement nécessaire pour de la pure prise de RDV.
      La plupart des besoins sont couverts par la voie B avec un bon outil
      SaaS. Réserver la voie C aux cas où l'intégration avec un système
      métier spécifique (ex. logiciel dentaire propriétaire, ERP sur mesure)
      rend les SaaS standards inadéquats.

