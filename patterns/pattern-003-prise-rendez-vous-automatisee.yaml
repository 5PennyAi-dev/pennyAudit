# ───── RISQUES ─────

risks:
  - type: technique
    title_fr: Adoption par la clientèle
    severity: moyen
    description_fr: |
      Certains clients (souvent plus âgés) préfèrent téléphoner pour
      prendre rendez-vous plutôt que d'utiliser un formulaire web.
    mitigation_fr: |
      Garder une alternative téléphone (réceptionniste humaine ou IA).
      Promouvoir la réservation en ligne sans l'imposer. Offrir le lien
      de réservation comme commodité, pas comme seul canal.

  - type: technique
    title_fr: Synchronisation calendrier
    severity: faible
    description_fr: |
      Les conflits d'agenda peuvent se produire si le calendrier maître
      n'est pas bien synchronisé, ou si l'entreprise utilise plusieurs
      agendas non connectés.
    mitigation_fr: |
      Vérifier la synchronisation bidirectionnelle lors du setup. Tester
      avec des scénarios réels (RDV manuel vs en ligne). Un seul agenda
      source de vérité.

  - type: technique
    title_fr: Dépendance à la stabilité du calendrier connecté
    severity: faible
    description_fr: |
      Si Google Calendar ou Outlook est temporairement indisponible,
      les réservations peuvent échouer ou créer des doublons.
    mitigation_fr: |
      Incidents rares mais possibles. Avoir une procédure de vérification
      quotidienne des RDV.

  - type: business
    title_fr: Sur-réservation par le client (no-shows)
    severity: moyen
    description_fr: |
      Les clients réservent plus facilement quand c'est en ligne, mais
      oublient aussi plus facilement quand il n'y a pas eu de contact humain.
    mitigation_fr: |
      Rappels SMS 24 h et 2 h avant. Exiger un dépôt ou carte de crédit
      pour certains types de RDV. Configurer la politique d'annulation
      (délai minimum).

  - type: business
    title_fr: Configuration initiale mal faite
    severity: moyen
    description_fr: |
      Un mauvais paramétrage des disponibilités (plages horaires, buffers
      entre RDV, jours fériés) cause des problèmes récurrents.
    mitigation_fr: |
      Prendre le temps de configurer correctement la première fois.
      Tester en réservant soi-même un RDV test. Prévoir buffers entre
      RDV (15-30 min selon le métier).

  - type: business
    title_fr: Image de marque (page de réservation générique)
    severity: faible
    description_fr: |
      Les plans gratuits affichent souvent le logo de l'outil (Cal.com,
      Calendly) sur la page de réservation.
    mitigation_fr: |
      Pour une image professionnelle, passer au plan payant qui permet
      de retirer le branding et d'ajouter son propre logo.

  - type: reglementaire-qc
    title_fr: Loi 25 (protection des renseignements personnels)
    severity: important
    description_fr: |
      Les informations collectées lors de la réservation (nom, téléphone,
      courriel, motif du RDV, parfois données médicales) doivent respecter
      les obligations de consentement et de sécurité.
    mitigation_fr: |
      Politique de confidentialité visible sur la page de réservation.
      Pour cliniques : vérifier que l'outil est conforme (Cal.com offre
      HIPAA en plan Organizations; GOrendezvous est conforme aux normes
      québécoises pour la santé). Limiter la collecte au strict nécessaire.

  - type: reglementaire-qc
    title_fr: Données de santé (cliniques)
    severity: important
    description_fr: |
      Un outil qui collecte le motif d'un rendez-vous médical manipule
      des données de santé protégées.
    mitigation_fr: |
      Privilégier GOrendezvous (conçu pour santé québécoise) ou Cal.com
      plan Organizations (HIPAA). Éviter de demander le motif détaillé
      à la réservation (juste une catégorie générale : suivi, nouvelle
      consultation, urgence).

# ───── PRÉREQUIS ─────

prerequisites:
  - Un calendrier numérique principal (Google Calendar, Outlook, Apple Calendar)
  - Une liste claire des types de rendez-vous offerts avec durées
  - Une politique d'annulation (délai minimum, frais si applicable)
  - Une adresse courriel professionnelle pour recevoir les notifications
  - Optionnel mais recommandé : un site web pour y intégrer le widget
  - Pour cliniques santé : vérification de conformité de l'outil

