# ═══════════════════════════════════════════════════════════════
# Pattern 003 — Prise de rendez-vous automatisée et augmentée par IA
# Format hybride : structure machine + prose humaine
# Trois voies d'implémentation (self-serve, accompagné, custom)
# ═══════════════════════════════════════════════════════════════

id: ai-appointment-scheduling
title_fr: Prise de rendez-vous en ligne automatisée et augmentée par IA
category: productivite-gestion-agenda
version: 1.0
last_updated: 2026-04-22
language: fr

# ───── RÉSUMÉS (prose narrative pour livrable client) ─────

summary_short_fr: >
  Système de réservation en ligne où les clients réservent eux-mêmes sur
  l'agenda de l'entreprise, avec rappels automatiques, confirmation IA,
  et relances intelligentes des no-shows.

summary_long_fr: |
  Un système de prise de rendez-vous automatisé permet aux clients de
  réserver leurs propres rendez-vous 24 h/24 sur un calendrier partagé
  en ligne, sans appel téléphonique ni va-et-vient de courriels. Couplé
  à l'IA, il peut qualifier les demandes (urgence, type de service, budget),
  envoyer des rappels personnalisés par SMS ou courriel, relancer les
  no-shows, collecter un paiement ou un dépôt avant confirmation, et
  s'intégrer au CRM existant. Distinct d'une réceptionniste IA (vocale)
  et d'un chatbot textuel : ici le client interagit directement avec un
  calendrier plutôt qu'avec une conversation, ce qui est souvent plus
  rapide et moins ambigü pour les réservations simples.

# ───── COMPLÉMENTARITÉ AVEC AUTRES PATTERNS ─────

complementary_patterns:
  - pattern_id: ai-voice-receptionist
    relation_fr: |
      La réceptionniste IA vocale PEUT prendre un rendez-vous, mais elle
      le fait généralement via une intégration avec un outil de ce pattern
      (Cal.com, Calendly, GOrendezvous). Les deux sont souvent combinés :
      le vocal gère l'appel et utilise l'outil de scheduling pour réserver.

  - pattern_id: ai-text-chatbot-multichannel
    relation_fr: |
      Même relation que le vocal. Le chatbot peut intégrer directement
      un outil de scheduling dans sa conversation. Les trois patterns
      ensemble forment une solution complète de gestion de demandes entrantes.

