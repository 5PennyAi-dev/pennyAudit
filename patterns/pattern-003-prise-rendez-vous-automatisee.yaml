# ───── NOTES HONNÊTES (usage interne uniquement) ─────

internal_notes_fr: |
  FORCE DE CE PATTERN :
  La prise de RDV automatisée est le pattern le plus universellement
  applicable de la librairie. Presque toute micro-entreprise qui prend
  des rendez-vous en bénéficie. C'est aussi le pattern avec le coût
  d'entrée le plus bas (plan gratuit Cal.com ou Calendly). Excellent
  point d'entrée pour un client qui veut "tester l'IA sans se ruiner".

  COMPLÉMENTARITÉ AVEC AUTRES PATTERNS :
  Les trois premiers patterns (vocal, chat, scheduling) forment un
  trio qui couvre les demandes entrantes complètement. Dans un audit,
  on peut recommander un seul de ces patterns ou les trois selon le
  contexte du client.

  POSITIONNEMENT GO-RENDEZVOUS :
  Outil québécois important qu'on découvre. Très bien positionné pour
  santé/bien-être. Son avantage vs Cal.com : tout-en-un avec dossiers
  clients et facturation, ce qui simplifie la vie d'un solopreneur en
  santé. À mettre en avant pour ce segment spécifique.

  ATTENTION SUR LES MÉTRIQUES :
  Les 32-38 % d'efficacité de FloatAI sont des métriques agrégées par
  un intégrateur, pas des études indépendantes. À présenter comme
  "selon FloatAI" dans les livrables, pas comme des faits établis.
  Pour des chiffres plus solides, on a documentation HubSpot sur la
  réduction des no-shows et les témoignages Capterra.

  POTENTIEL AFFILIATION :
  Calendly et HubSpot ont des programmes d'affiliation confirmés.
  Cal.com et GOrendezvous à vérifier. Make et Zapier ont des programmes
  d'affiliation. Pattern avec gros potentiel de revenus passifs parce
  qu'énormément de clients vont en avoir besoin.

  OBSERVATION STRATÉGIQUE :
  FloatAI mentionne explicitement la prise de rendez-vous dans son offre
  ET donne ses tarifs : agent vocal 1000 $ unique ou 100 $/mois.
  C'est un benchmark précieux pour la tarification de la voie B de 5PennyAi.

