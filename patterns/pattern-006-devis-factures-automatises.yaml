# ───── RISQUES ─────

risks:
  - type: reglementaire-qc
    title_fr: Loi 25 et hébergement des données financières
    severity: moyen
    description_fr: |
      Plusieurs outils populaires (QuickBooks Online USA, Jobber Canada,
      ServiceM8 Australie, Dext Royaume-Uni) hébergent les données dans
      différentes juridictions. Les données financières contiennent des
      renseignements personnels (noms, adresses, montants) qui tombent
      sous la Loi 25.
    mitigation_fr: |
      Pour PME standards : QuickBooks et Jobber sont conformes RGPD/Loi
      25 selon leurs politiques publiques (à valider au cas par cas).
      Pour clients sensibles (cabinets professionnels, données médicales) :
      privilégier Bilano ou Acomba (hébergés Canada) ou voie custom avec
      hébergement AWS Canada Central.

  - type: technique
    title_fr: Erreurs de catégorisation IA
    severity: moyen
    description_fr: |
      L'IA peut mal catégoriser une dépense (ex : un repas client classé
      comme « épicerie personnelle »), ce qui fausse les états financiers
      et peut créer des problèmes fiscaux.
    mitigation_fr: |
      Configuration soignée des règles de catégorisation au setup. Revue
      mensuelle des catégorisations IA les premières 2-3 mois pour
      corriger les patterns récurrents. Le client garde toujours le
      contrôle final avant export au comptable.

  - type: technique
    title_fr: Hallucinations dans génération de devis
    severity: moyen
    description_fr: |
      Si on utilise un assistant IA (Jobber Copilot, Claude API) pour
      rédiger un devis, l'IA peut inventer des spécifications, des prix
      ou des conditions qui ne correspondent pas à la réalité de
      l'entreprise.
    mitigation_fr: |
      Toujours réviser le devis IA avant envoi au client. Configurer
      des modèles de référence pour que l'IA reste dans les limites des
      services réellement offerts. Ne jamais activer envoi automatique
      sans révision humaine.

  - type: business
    title_fr: Migration coûteuse entre logiciels comptables
    severity: important
    description_fr: |
      Migrer d'un logiciel comptable à un autre est complexe et coûteux
      (transfert plan comptable, historique, clients, contacts). Choisir
      le mauvais outil au départ peut peser pendant des années.
    mitigation_fr: |
      Audit 5PennyAi inclut une analyse de fit logiciel ↔ profil client
      ↔ comptable existant pour minimiser les risques. Privilégier des
      outils avec export complet des données (Bilano, Kiwili, QuickBooks,
      Wave) pour préserver l'optionalité future.

  - type: business
    title_fr: Frais de transaction sur paiements en ligne
    severity: faible-a-moyen
    description_fr: |
      Les paiements en ligne via Jobber Payments, Square, Stripe coûtent
      typiquement 2,65 % à 2,9 % + 0,30 $ par transaction. Sur des
      factures importantes, cela peut représenter des milliers de dollars
      par an.
    mitigation_fr: |
      Calculer le coût réel des frais à l'audit. Pour grosses factures
      B2B, privilégier virement Interac ou ACH (1 % ou moins). Au-dessus
      de certains volumes, négocier des taux Stripe ou Moneris en direct.

  - type: business
    title_fr: Verrouillage avec un écosystème (lock-in)
    severity: faible-a-moyen
    description_fr: |
      Une fois la pile configurée (Jobber + Stripe + QuickBooks +
      Hubdoc + Mailchimp), changer un élément casse les intégrations.
      Le client devient prisonnier de son écosystème.
    mitigation_fr: |
      Documenter la configuration (5PennyAi livre un document « stack
      configurée » au client). Privilégier les outils avec API ouvertes
      et bons exports. Faire des sauvegardes mensuelles automatiques.

