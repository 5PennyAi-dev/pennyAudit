# ───── NOTES HONNÊTES (usage interne uniquement) ─────

internal_notes_fr: |
  FORCE DE CE PATTERN :
  Pattern à fort ROI immédiat et facile à vendre. Les gains sont
  visibles en 1-2 semaines : moins de temps perdu en saisie, paiements
  plus rapides, comptable content. Excellent point d'entrée commercial
  pour 5PennyAi : souvent moins intimidant que « assistant IA » ou
  « chatbot », c'est juste « moderniser ta facturation ».

  COUVERTURE QUÉBÉCOISE EXCEPTIONNELLE :
  Le marché québécois est richement servi par des outils locaux :
  Momenteo (pigistes), Kiwili (PME), Bilano (Sherbrooke), Acomba
  (référence), GEM-BOOKS, Mes Livres Comptables, Finance D, Libellum,
  SbdCloud. Cinq fournisseurs québécois crédibles permettent une
  recommandation 100 % locale pour à peu près n'importe quel profil
  client. Argument de vente fort.

  JOBBER EST CANADIEN — POINT IMPORTANT :
  Jobber est basé à Edmonton, Alberta. Pour les clients sensibles à la
  Loi 25 et au « tech canadien », c'est un argument à mettre en avant
  systématiquement. Les concurrents 5PennyAi qui poussent ServiceM8
  (australien) ou Housecall Pro (USA) ratent cet angle.

  ANGLE DIFFÉRENCIATEUR : NEUTRALITÉ DES RECOMMANDATIONS
  Les intégrateurs québécois sont souvent revendeurs d'un seul écosystème
  (Acomba, Microsoft, Sage). 5PennyAi peut se positionner comme
  « auditeur indépendant » qui recommande l'outil le mieux adapté, pas
  celui qui paie la meilleure commission. C'est un positionnement
  honnête et différenciant.

  ATTENTION AUX MÉTRIQUES :
  Les chiffres ROI les plus impressionnants (80 %, 99,9 % accuracy,
  économies 100K+) viennent de cas mid-market ou de vendeurs (Lleverage,
  Dext, Tofu). Pour les micro-entreprises, les gains sont réels mais
  plus modestes : typiquement 3-8 heures par semaine, ce qui reste
  excellent pour un solopreneur. Toujours présenter des fourchettes
  avec contexte.

  POSITIONNEMENT 5PENNYAI :
  - Voie A : audit + setup léger d'outil simple (99-299 $)
  - Voie B : forfait clé en main configuration + formation, 2 000-3 500 $
  - Voie C : réservée aux cas avec logique métier unique ou Loi 25 stricte

  CROSS-SELL :
  Client qui fait voie B sur facturation = excellent prospect pour :
  - Pattern 003 (RDV automatisés) → alimente le pipeline qui devient devis
  - Pattern 002 (chatbot textuel) → qualifie les leads avant devis
  - Pattern 005 (gestion courriels) → automatise les rappels et négociations
  Le pattern 006 est central dans la chaîne administrative — il est
  rarement adopté seul à long terme.

  PIÈGE À ÉVITER :
  Ne pas proposer Jobber/ServiceM8 à des solopreneurs en services
  intellectuels (consultants, designers) — ils n'ont pas besoin de
  planning de techniciens et trouveront ça lourd. Pour ce profil,
  Momenteo/Kiwili/Wave sont nettement supérieurs.

  CHIFFRE À VÉRIFIER :
  Le « 25 % → 8 % paiements en retard » du cas n8n est intéressant mais
  vient d'un seul cas vendeur. À présenter comme « cas documenté par
  n8n » et non comme moyenne.

