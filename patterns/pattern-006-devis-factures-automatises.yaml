# ───── PROBLÈME (voix du client pour narratif) ─────

pain_point_fr: |
  Je suis plombier. Quand je rentre d'une journée de chantier, je dois
  encore taper mes soumissions. Excel, copier-coller du contrat type,
  modifier les quantités, recalculer les taxes, exporter en PDF, envoyer
  par courriel. Une soumission me prend 30 à 45 minutes. Si le client
  accepte, je recommence pour produire la facture. Et après, c'est la
  course aux paiements en retard : je rappelle, j'envoie un courriel, je
  rappelle encore. Trois clients sur dix paient après la date d'échéance.
  Mes reçus de matériaux s'empilent dans le coffre du camion. Mon
  comptable me chicane à chaque fin de mois. Je sais que ça pourrait être
  plus simple, mais je n'ai pas le temps d'apprendre un nouveau logiciel.

problem_facts:
  - claim_fr: "Le traitement manuel d'une facture prend en moyenne 15 à 20 minutes vs 30 secondes avec capture IA, selon Lleverage"
    source_id: lleverage-roi-invoice
  - claim_fr: "Les études publiques compilées rapportent jusqu'à 80 % de réduction du temps de traitement manuel des factures"
    source_id: distrya-ai-roadmap
  - claim_fr: "Le taux d'erreur moyen en saisie manuelle de facture est de 1,6 %, et chaque erreur coûte jusqu'à 53 $ à corriger selon Lindy"
    source_id: lindy-invoice-processing
  - claim_fr: "Une agence de 6 personnes documentée par n8n est passée de 6 h/semaine à 25 min/semaine sur création et suivi de factures, et de 25 % à 8 % de paiements en retard"
    source_id: n8n-workflows-smb
  - claim_fr: "82 % des micro-entreprises (<5 employés) croient que l'IA ne s'applique pas à leur business, alors que la facturation en bénéficie directement"
    source_id: sba-ai-adoption-2025

# ───── SOLUTION (prose + structure) ─────

solution_summary_fr: |
  On déploie un outil de gestion intégré qui couvre, selon le profil :
  (1) un module de devis avec modèles réutilisables, conversion en un clic
  vers facture, signature électronique du client, (2) la facturation
  récurrente, les paiements en ligne intégrés et les rappels automatiques,
  (3) la capture des reçus fournisseurs par photo (OCR/IA) avec
  catégorisation automatique. Pour un contracteur ou un métier de service,
  on privilégie un outil tout-en-un sectoriel (Jobber, ServiceM8) qui
  combine planification, devis et facturation. Pour un solopreneur
  québécois en services intellectuels, un outil québécois léger (Momenteo,
  Kiwili) couvre l'essentiel avec TPS/TVQ native. Pour une PME avec
  comptable existant, on conserve le moteur comptable (QuickBooks, Sage,
  Acomba) et on ajoute une couche IA d'extraction (Hubdoc, Dext) sur les
  factures fournisseurs.

deployment_modes:
  - id: integrated-field-service
    name_fr: Plateforme de gestion de service tout-en-un
    description_fr: |
      Jobber, ServiceM8, Housecall Pro. Devis, planning, dispatch,
      facturation et paiement dans un seul outil. Optimisé pour les
      métiers où le devis se fait sur le terrain (contracteurs, plombiers,
      électriciens, paysagistes).

  - id: invoicing-saas-quebec
    name_fr: SaaS de facturation québécois pour solopreneurs
    description_fr: |
      Momenteo, Kiwili, Bilano, Libellum. Outils légers et abordables
      conçus pour le marché québécois (TPS/TVQ native, normes locales).
      Pour travailleurs autonomes et petites équipes en services
      intellectuels.

  - id: full-accounting-platform
    name_fr: Plateforme comptable complète
    description_fr: |
      QuickBooks Online, Sage 50, Acomba, Xero. Le devis et la facture
      ne sont qu'un module parmi d'autres (paie, inventaire, états
      financiers). Privilégié si la comptabilité est déjà en place.

  - id: ocr-receipt-layer
    name_fr: Couche IA d'extraction de factures fournisseurs
    description_fr: |
      Hubdoc, Dext, AutoEntry, Datamolino. S'ajoute par-dessus une plateforme
      comptable existante pour automatiser la saisie des reçus et factures
      fournisseurs (côté dépenses, pas du côté ventes).

  - id: ap-automation-platform
    name_fr: Plateforme AP (comptes fournisseurs) automatisée
    description_fr: |
      BILL, Tipalti, Ramp, Stampli. Pour PME avec volume important de
      factures fournisseurs : extraction IA, routage d'approbation,
      paiement programmé. Plus complet que les couches OCR mais plus
      coûteux.

  - id: custom-agent
    name_fr: Agent IA custom pour facturation
    description_fr: |
      Workflow custom (Make, n8n, ou Anthropic API) pour cas spécifiques :
      facturation déclenchée par événement (livraison, fin de chantier),
      extraction de données vers ERP custom, logique de pricing avancée.

typical_capabilities:
  - Création de devis à partir de modèles personnalisés réutilisables
  - Conversion automatique d'un devis accepté en facture
  - Signature électronique du devis par le client
  - Calcul automatique TPS/TVQ et autres taxes locales
  - Facturation récurrente (abonnements, contrats d'entretien)
  - Paiement en ligne intégré (carte de crédit, virement, Apple/Google Pay)
  - Rappels automatiques de paiement par courriel ou SMS
  - Capture de reçus fournisseurs par photo (mobile)
  - Extraction OCR/IA des données de factures fournisseurs (totaux, taxes, ligne par ligne)
  - Catégorisation automatique des dépenses
  - Synchronisation avec le logiciel comptable
  - Tableau de bord trésorerie en temps réel
  - Suggestions IA pour ajuster les prix ou détecter des opportunités d'upsell (Jobber Copilot)
  - Intégration au CRM et au calendrier

# ───── VOIES D'IMPLÉMENTATION (core du pattern) ─────

implementation_paths:

  - id: self-serve
    name_fr: Voie A — Self-serve (autonomie)
    ideal_profile_fr: |
      Solopreneur ou micro-entreprise (1-3 personnes), volume de 10 à 50
      factures par mois, budget serré, confort tech moyen. Veut migrer
      hors d'Excel/Word vers un outil moderne sans accompagnement.
      Souvent au Québec : travailleur autonome en services intellectuels
      ou entrepreneur en service à domicile débutant.
    description_fr: |
      Le client choisit lui-même un SaaS de facturation adapté à son
      profil : Wave (gratuit, 100 % en ligne) ou Momenteo (québécois,
      pour pigistes) pour services intellectuels; Square Invoices (gratuit
      avec frais de transaction) pour commerce et services à la pièce;
      Jobber Core ou ServiceM8 plan gratuit pour métiers de service à
      faible volume. 5PennyAi fournit un audit qui recommande le bon
      outil, identifie les modèles de devis à créer, et documente la
      routine quotidienne (où entrer les reçus, comment relancer les
      paiements, comment exporter pour le comptable).
    setup_duration: 4-8-heures
    client_time_required_hours:
      min: 4
      max: 12
    total_cost_cad:
      setup_range:
        min: 0
        max: 300
      monthly_min: 0
      monthly_max: 80
      first_year: "0 à 1 260 $"
    recommended_tools_priority:
      - tool_id: wave
        reason_fr: Gratuit, canadien (Toronto), parfait pour démarrer
      - tool_id: momenteo
        reason_fr: 100 % québécois, conçu pour travailleurs autonomes, TPS/TVQ native
      - tool_id: square-invoices
        reason_fr: Gratuit (frais à la transaction), idéal pour commerce et services à la pièce
      - tool_id: jobber
        reason_fr: Pour entrepreneurs en services à domicile à faible volume; plan Core 39 $ USD/mois
      - tool_id: servicem8
        reason_fr: Plan gratuit jusqu'à 30 jobs/mois, alternative légère à Jobber
    fivepennyai_service_fr: |
      Audit payant (99-299 $) : analyse du volume et du type de
      facturation, recommandation du bon outil, modèles de devis et de
      facture personnalisés, guide de la routine quotidienne, configuration
      des taxes québécoises, intégration courriel pour rappels automatiques.
    fivepennyai_revenue_potential: faible-par-client-mais-volume-eleve

  - id: accompanied
    name_fr: Voie B — Accompagnement hybride (setup + formation)
    ideal_profile_fr: |
      PME 5-25 employés, ou entrepreneur en services avec 2-5 techniciens
      sur la route. Volume de 50 à 300 factures par mois. Souvent encore
      sur Excel ou un outil mal configuré. Besoin d'aller au-delà du
      setup de base : intégrations multiples, automatisations, formation
      d'équipe.
    description_fr: |
      5PennyAi configure une plateforme adaptée au profil : Jobber Connect
      ou Grow pour métiers de service (avec Jobber Copilot IA, GPS,
      QuickBooks sync), QuickBooks Online + Hubdoc pour PME en services
      intellectuels, Acomba ou Kiwili pour PME québécoise voulant outil
      local. Inclut : import des clients existants, création des modèles
      de devis et de facture (3-5 templates), configuration des paiements
      en ligne (Stripe, Square, Moneris), automatisations de rappels,
      intégration avec courriel et calendrier, formation 2-3 heures de
      l'équipe, support 30 jours.
    setup_duration: 2-5-jours
    client_time_required_hours:
      min: 6
      max: 12
    total_cost_cad:
      setup_range:
        min: 1500
        max: 4000
      monthly_tool_range:
        min: 50
        max: 350
      first_year: "2 100 à 8 200 $"
    recommended_tools_priority:
      - tool_id: jobber
        reason_fr: Meilleur tout-en-un pour métiers de service, Jobber Copilot IA inclus
      - tool_id: quickbooks-online
        reason_fr: Standard nord-américain, Intuit Intelligence (IA), écosystème comptables
      - tool_id: kiwili
        reason_fr: 100 % québécois, ERP léger, support en français
      - tool_id: acomba
        reason_fr: Référence québécoise PME (40 000 utilisateurs), modulaire
      - tool_id: hubdoc
        reason_fr: Capture reçus fournisseurs, gratuit avec Xero, ajout naturel à QuickBooks
      - tool_id: dext
        reason_fr: Capture IA plus précise que Hubdoc, idéal si volume reçus élevé
    fivepennyai_service_fr: |
      Forfait "Devis & Facturation IA Clé en Main" : audit + configuration
      de la plateforme + import clients/produits + 3 à 5 modèles de devis
      personnalisés + paiement en ligne + automatisations rappels +
      capture reçus IA + formation 2-3 h + 30 jours support. Option
      rétention mensuelle pour ajustements continus.
    fivepennyai_revenue_potential: moyen-par-client

  - id: custom
    name_fr: Voie C — Développement sur mesure
    ideal_profile_fr: |
      PME avec logique métier complexe : pricing dynamique selon volume
      ou client, facturation déclenchée par événement (livraison, fin
      de chantier IoT, complétion de projet), extraction de données vers
      ERP propriétaire, ou exigence Loi 25 stricte avec hébergement
      canadien. Souvent : manufacturiers, distributeurs B2B, entreprises
      de services techniques avec volume élevé (300+ factures/mois).
    description_fr: |
      5PennyAi développe un agent IA custom avec Anthropic API + APIs
      du logiciel comptable existant + plateforme d'orchestration (Make,
      n8n, ou code custom). L'agent peut : générer des devis à partir
      de spécifications client en langage naturel, extraire les données
      des bons de commande PDF, déclencher la facturation automatique
      lors d'événements métier (livraison confirmée, projet livré),
      router les exceptions vers un humain, faire le rapprochement
      bancaire intelligent. Hébergement sur infrastructure contrôlée
      (Vercel, Supabase, AWS Canada) pour conformité Loi 25.
    setup_duration: 4-8-semaines
    client_time_required_hours:
      min: 20
      max: 50
    total_cost_cad:
      setup_range:
        min: 12000
        max: 30000
      monthly_hosting_range:
        min: 150
        max: 600
      first_year: "13 800 à 37 200 $"
    recommended_tools_priority:
      - tool_id: anthropic-api
        reason_fr: Claude pour extraction et raisonnement sur documents financiers
      - tool_id: make-zapier
        reason_fr: Orchestration des workflows multi-systèmes
      - tool_id: bill-tipalti
        reason_fr: Si AP automation complète requise (volume fournisseurs élevé)
    fivepennyai_service_fr: |
      AI Sprint 4-8 semaines : conception, développement, intégration
      ERP, déploiement, formation. Idéal pour PME québécoises voulant
      l'IA mais ayant besoin de logique métier que Jobber/QuickBooks
      ne couvrent pas, ou exigeant hébergement Canada strict.
    fivepennyai_revenue_potential: eleve-par-client-mais-volume-faible
    honest_note_fr: |
      La voie custom est rarement nécessaire pour les micro-entreprises et
      petites PME. À réserver aux cas avec volume élevé (300+ factures/mois),
      logique unique non couverte par les SaaS, ou contrainte Loi 25
      forte. Pour 80 % des clients, la voie B couvre amplement les besoins.

