# ═══════════════════════════════════════════════════════════════
# Pattern 006 — Génération et gestion automatisées de devis/factures
# Format hybride : structure machine + prose humaine
# Trois voies d'implémentation (self-serve, accompagné, custom)
# ═══════════════════════════════════════════════════════════════

id: ai-quote-invoice-automation
title_fr: Génération et gestion automatisées de devis et factures
category: gestion-financiere-administration
version: 1.0
last_updated: 2026-04-26
language: fr

# ───── RÉSUMÉS (prose narrative pour livrable client) ─────

summary_short_fr: >
  Utilisation d'outils intégrés et d'IA pour produire des devis professionnels
  en quelques minutes, convertir automatiquement les devis acceptés en
  factures, capturer les reçus fournisseurs sans saisie manuelle, et
  envoyer les rappels de paiement sans intervention.

summary_long_fr: |
  La génération et la gestion automatisées de devis/factures couvre quatre
  fonctions principales : (1) produire des devis professionnels rapidement
  à partir de modèles ou avec assistance IA pour la rédaction, (2) convertir
  un devis accepté en facture en un clic, (3) extraire automatiquement les
  données des reçus et factures fournisseurs (OCR/IA), (4) automatiser les
  rappels de paiement et les suivis. Les gains documentés sont substantiels :
  les études publiques recensées par Distrya rapportent jusqu'à 80 % de
  réduction du temps de traitement manuel des factures, et les cas n8n
  documentent des passages de 6 heures par semaine à 25 minutes pour la
  création et le suivi de factures dans une agence de 6 personnes. Pour
  les entrepreneurs en services (contracteurs, plombiers, électriciens,
  paysagistes, ménage), des outils spécialisés comme Jobber et ServiceM8
  combinent devis, planification et facturation. Pour les solopreneurs et
  travailleurs autonomes québécois, des outils locaux comme Momenteo,
  Kiwili ou Bilano gèrent la TPS/TVQ nativement et hébergent les données
  au Canada.

# ───── COMPLÉMENTARITÉ AVEC AUTRES PATTERNS ─────

complementary_patterns:
  - pattern_id: ai-appointment-scheduling
    relation_fr: |
      La prise de RDV automatisée alimente directement le pipeline des
      devis et factures : un RDV bien qualifié se transforme en visite,
      qui produit un devis, qui devient facture. L'enchaînement
      RDV → devis → facture forme la chaîne administrative complète d'une
      entreprise de services.

  - pattern_id: ai-text-chatbot-multichannel
    relation_fr: |
      Le chatbot textuel capte les demandes entrantes et qualifie les
      besoins; ce pattern transforme la qualification en proposition
      commerciale (devis) puis en revenu encaissé (facture). Lien
      naturel pour les commerces et les contracteurs.

  - pattern_id: ai-email-management
    relation_fr: |
      Les rappels de paiement et les négociations d'écarts de facturation
      passent souvent par courriel. Le pattern courriel et celui-ci
      sont fortement complémentaires pour la gestion administrative
      complète.

