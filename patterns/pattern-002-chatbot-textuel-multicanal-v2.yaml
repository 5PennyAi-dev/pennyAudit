    confidence: medium

# ───── RISQUES (inchangés de v1) ─────

risks:
  - type: technique
    title_fr: Hallucinations possibles
    severity: moyen
    description_fr: L'IA peut inventer des informations sur des produits ou politiques qu'elle n'a pas dans sa base
    mitigation_fr: Scope strict à la FAQ et au contenu vérifié, tester activement les premières semaines, utiliser un outil qui limite l'IA à la base de connaissances uploadée

  - type: technique
    title_fr: Qualité du français québécois
    severity: moyen
    description_fr: La plupart des outils internationaux sont entraînés sur français européen; certaines expressions peuvent sonner étrangères. Crisp (français natif) limite ce risque.
    mitigation_fr: Privilégier Crisp pour clientèle québécoise sensible au langage. Pour Tidio et autres, uploader des FAQ rédigées en québécois et tester.

  - type: technique
    title_fr: Limites du contenu uploadé
    severity: faible
    description_fr: Si le site web ou la FAQ est incomplet, l'IA aura des trous dans ses réponses
    mitigation_fr: Audit initial du contenu, enrichissement de la FAQ pour couvrir les questions les plus fréquentes

  - type: business
    title_fr: Attentes clients pour réponse humaine
    severity: faible
    description_fr: Certains clients veulent parler à un humain, surtout pour questions complexes
    mitigation_fr: Offrir option explicite "parler à un humain" en début de conversation; configurer transferts intelligents

  - type: business
    title_fr: Dépassement des quotas
    severity: faible
    description_fr: Pics de trafic imprévus peuvent faire exploser les conversations facturables
    mitigation_fr: Monitorer les premiers mois, choisir un plan avec marge, configurer des alertes de quota

  - type: business
    title_fr: Qualité de la voix de marque
    severity: moyen
    description_fr: Un chatbot mal configuré peut sonner robotique ou inapproprié pour la marque
    mitigation_fr: Configurer le ton (formel, amical, décontracté), relire les premières conversations, ajuster jusqu'à satisfaction

  - type: reglementaire-qc
    title_fr: Loi 25 (protection des renseignements personnels)
    severity: important
    description_fr: La collecte de données personnelles via le chatbot doit respecter les obligations de consentement, conservation, sécurité. Privilégier des fournisseurs hébergeant en Europe (Crisp) ou certifiés pour l'Amérique du Nord.
    mitigation_fr: Politique de confidentialité visible, consentement explicite avant collecte, vérifier localisation des données du fournisseur choisi

  - type: reglementaire-qc
    title_fr: Transparence sur l'utilisation de l'IA
    severity: moyen
    description_fr: Les règles évoluent sur l'obligation de divulguer qu'un client parle à une IA; au Québec, la tendance favorise la transparence
    mitigation_fr: Indiquer clairement que la conversation est gérée par un assistant IA; préciser la possibilité de parler à un humain

  - type: reglementaire-qc
    title_fr: Données de santé (cliniques, thérapeutes)
    severity: important
    description_fr: Un chatbot qui capte des informations de santé tombe sous obligations accrues
    mitigation_fr: Limiter les questions du chatbot à la prise de rendez-vous et informations publiques; éviter la collecte de symptômes détaillés

# ───── PRÉREQUIS (inchangés) ─────

prerequisites:
  - Site web de l'entreprise (WordPress, Shopify, Squarespace, Wix ou site personnalisé)
  - Ou présence active sur au moins un canal social (Facebook, Instagram, WhatsApp)
  - FAQ claire ou contenu du site à jour (alimentera l'IA)
  - Adresse courriel pour recevoir les notifications de leads
  - Politique de confidentialité à jour (obligation Loi 25)
  - Accès administrateur aux comptes sociaux pour intégration

