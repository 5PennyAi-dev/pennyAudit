# ───── NOTES HONNÊTES (usage interne uniquement) ─────

internal_notes_fr: |
  CHANGEMENTS v1 → v2 :
  - Trois voies d'implémentation explicites (self-serve / accompagné / custom)
  - Outils hiérarchisés en tiers avec Crisp promu n°1 pour clientèle francophone
  - Botpress ajouté comme plateforme de développement custom (Tier 3)
  - Intégrateurs québécois listés comme concurrence directe
  - Cas FloatAI ajouté pour benchmark local
  - Champ `relevance_for_micro` ajouté aux cas clients pour filtrer les
    cas d'entreprises trop grosses qu'on ne devrait pas citer à un plombier
  - Champ `affiliate_potential` ajouté à chaque outil

  PIÈGES À GARDER EN TÊTE :
  - Le "plan gratuit" de Tidio limite Lyro à 50 conversations à vie.
    Pour usage régulier, vrai coût 24-55 $/mois.
  - Botpress est une plateforme de DÉVELOPPEMENT, pas un SaaS clé en main.
    Ne pas recommander à un plombier self-serve. Réserver pour voie C.
  - Crisp tarifie en EUR; conversion approximative × 1,45 pour CAD.
  - Les cas eye-oo (entreprise moyenne), Procosmet (marque établie),
    Cove Smart (tech grand public) ne sont PAS transposables à un salon
    de coiffure solo. Privilégier NRVTA, Pearl Lemon, Pastreez, FloatAI.

  POSITIONNEMENT 5PENNYAI :
  - Voie A : revenu d'audit + potentiel affiliations
  - Voie B : forfait clé en main (800-2000 $), probablement le sweet spot
  - Voie C : AI Sprints (5000-15000 $), pour projets qualifiés

  CONCURRENCE QUÉBÉCOISE :
  CyberPerformance, Gestisoft, FloatAI, IT Cares, EvoluAI, Nexxo sont
  déjà positionnés. Différenciation de 5PennyAi = audit automatisé par
  IA (self-serve) que personne n'offre encore, + expertise technique
  démontrable via PennySEO.

