# ═══════════════════════════════════════════════════════════════
# Pattern 002 — Chatbot IA textuel multi-canal
# Version 2.0 : Trois voies d'implémentation (self-serve, accompagné, custom)
# Outils hiérarchisés : francophones/accessibles en priorité
# ═══════════════════════════════════════════════════════════════

id: ai-text-chatbot-multichannel
title_fr: Chatbot IA textuel multi-canal (site web, Messenger, WhatsApp)
category: service-client-messagerie
version: 2.0
last_updated: 2026-04-21
language: fr

# ───── RÉSUMÉS (prose narrative pour livrable client) ─────

summary_short_fr: >
  Agent IA qui répond aux messages écrits reçus sur le site web,
  Facebook Messenger, Instagram, WhatsApp et courriel. Résout les
  questions fréquentes, qualifie les leads et collecte les informations.

summary_long_fr: |
  Un agent IA textuel qui répond automatiquement aux messages écrits
  reçus sur tous les canaux numériques (site web via chat widget,
  Facebook Messenger, Instagram DM, WhatsApp, courriel). Il résout les
  questions fréquentes, qualifie les leads potentiels, collecte les
  informations de contact et transfère aux humains les conversations
  complexes. Idéal pour les entreprises dont les clients écrivent plus
  qu'ils n'appellent — commerce en ligne, services professionnels,
  entreprises avec forte présence sociale.

# ───── COMPLÉMENTARITÉ AVEC AUTRES PATTERNS ─────

complementary_patterns:
  - pattern_id: ai-voice-receptionist
    relation_fr: |
      Les deux patterns peuvent coexister. Le pattern vocal gère les appels
      téléphoniques (souvent pour l'urgence et les services à domicile);
      ce pattern gère les messages écrits (site web, réseaux sociaux).
      Une PME avec forte présence multicanal bénéficie souvent des deux.

