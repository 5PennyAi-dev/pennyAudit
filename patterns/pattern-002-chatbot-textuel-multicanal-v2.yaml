# ───── PROBLÈME (voix du client pour narratif) ─────

pain_point_fr: |
  Je reçois des tonnes de messages similaires : "Quels sont vos prix?",
  "Est-ce que vous livrez dans ma région?", "Avez-vous ce produit en
  stock?", "Quels sont vos horaires?". Je passe mes soirées à y répondre
  un par un au lieu de me concentrer sur mon vrai travail. Et quand je
  rate un message, le client trouve la réponse chez un concurrent.

problem_facts:
  - claim_fr: "Un chatbot IA bien configuré peut résoudre jusqu'à 67 % des questions clients automatiquement"
    source_id: tidio-ai-agent
  - claim_fr: "Les visiteurs s'attendent à une réponse en moins de 30 secondes"
    source_id: tidio-pricing
  - claim_fr: "82 % des micro-entreprises (<5 employés) croient que l'IA ne s'applique pas à leur business, malgré des cas d'usage simples comme les FAQ"
    source_id: sba-ai-adoption-2025
  - claim_fr: "D'ici 2027, Gartner prévoit que les chatbots deviendront le principal canal de service à la clientèle pour environ 25 % des organisations"
    source_id: cyberperformance-chatbot

# ───── SOLUTION (prose + structure) ─────

solution_summary_fr: |
  Un chatbot IA est installé sur le site web via un widget de chat et/ou
  connecté aux comptes Messenger, Instagram, WhatsApp de l'entreprise.
  L'IA est entraînée sur le contenu du site web ou sur un document de FAQ
  téléversé. Elle répond 24 h/24 dans le ton de l'entreprise, transfère
  aux humains quand nécessaire, et collecte les informations de contact
  pour le suivi commercial. Trois voies d'implémentation sont possibles
  selon le budget et le confort technique du client.

deployment_modes:
  - id: website-widget
    name_fr: Widget sur site web
    description_fr: Bulle de chat sur toutes les pages du site; l'IA répond aux visiteurs en direct
  - id: social-channels
    name_fr: Canaux sociaux
    description_fr: Intégration avec Facebook Messenger, Instagram DM, WhatsApp pour répondre aux messages privés
  - id: lead-capture
    name_fr: Capture de leads
    description_fr: Formulaire conversationnel qui remplace les formulaires statiques; l'IA pose les bonnes questions et enregistre les réponses
  - id: faq-automation
    name_fr: Automatisation FAQ
    description_fr: L'IA répond aux questions récurrentes (prix, horaires, livraison, disponibilité) sans intervention humaine

typical_capabilities:
  - Entraînement automatique sur le contenu du site web
  - Upload de documents FAQ personnalisés
  - Réponses en multilangue (français, anglais, 50+ langues)
  - Transfert vers agent humain en un clic
  - Qualification et collecte de leads avec questions personnalisées
  - Intégrations CRM (HubSpot, Salesforce, Zapier, Shopify)
  - Notifications par email ou Slack quand un lead est capté
  - Analytics de performance (taux de résolution, satisfaction, conversions)

# ───── VOIES D'IMPLÉMENTATION (core du pattern) ─────

implementation_paths:

  - id: self-serve
    name_fr: Voie A — Self-serve (autonomie)
    ideal_profile_fr: |
      Solopreneur ou micro-entreprise qui veut tester sans gros engagement.
      À l'aise avec la techno, accepte d'y passer quelques heures,
      budget limité, volume de messages modéré.
    description_fr: |
      Le client s'inscrit lui-même sur une plateforme SaaS, uploade sa FAQ
      ou laisse le scraper analyser son site, active le widget. 5PennyAi
      intervient uniquement pour l'audit et la recommandation du bon outil.
    setup_duration: quelques-heures
    client_time_required_hours:
      min: 2
      max: 8
    total_cost_cad:
      setup: 0
      monthly_min: 0
      monthly_max: 70
      first_year: "0 à 850 $"
    recommended_tools_priority:
      - tool_id: crisp
        reason_fr: Interface française, plan gratuit généreux, français natif
      - tool_id: tidio
        reason_fr: Meilleur IA (Lyro), plan gratuit, 300 000+ clients
      - tool_id: manychat
        reason_fr: Si focus Messenger/Instagram uniquement
    fivepennyai_service_fr: |
      Audit payant (99-299 $) qui identifie le bon outil pour le contexte
      client et donne les étapes de configuration clés.
    fivepennyai_revenue_potential: faible-par-client-mais-volume

  - id: accompanied
    name_fr: Voie B — Accompagnement hybride (prêt-à-l'emploi)
    ideal_profile_fr: |
      PME de 5 à 20 employés qui veut un résultat qui fonctionne bien sans
      y perdre des soirées. Budget modéré, préfère déléguer la configuration,
      veut être formé pour gérer l'outil au quotidien ensuite.
    description_fr: |
      5PennyAi configure l'outil SaaS choisi de A à Z : création du compte,
      paramétrage du ton, entraînement sur le contenu client, intégrations
      (site, Messenger, WhatsApp, CRM), tests, formation du client (1 h),
      puis support ponctuel pendant 30 jours.
    setup_duration: 1-2-jours
    client_time_required_hours:
      min: 3
      max: 6
    total_cost_cad:
      setup_range:
        min: 800
        max: 2000
      monthly_tool_range:
        min: 30
        max: 100
      first_year: "1 200 à 3 200 $"
    recommended_tools_priority:
      - tool_id: crisp
        reason_fr: Excellent rapport qualité/prix pour l'accompagnement francophone
      - tool_id: tidio
        reason_fr: Plus riche en fonctionnalités IA pour cas complexes
      - tool_id: hubspot-chatbot
        reason_fr: Si le client utilise déjà HubSpot CRM
    fivepennyai_service_fr: |
      Forfait "Chatbot clé en main" : audit + configuration complète + formation
      + 30 jours de support. Tarif fixe prévisible.
    fivepennyai_revenue_potential: moyen-par-client

  - id: custom
    name_fr: Voie C — Développement sur mesure
    ideal_profile_fr: |
      PME de 20+ employés avec besoins spécifiques qu'aucun SaaS ne couvre
      bien : contenu très spécialisé, intégrations complexes, branding strict,
      volume élevé, ou besoin de garder les données chez soi. Budget 5 000 $+.
    description_fr: |
      5PennyAi développe un agent IA personnalisé avec Botpress ou via
      Anthropic API directement. L'agent est entraîné sur le contenu
      spécifique du client, intégré profondément à ses systèmes existants,
      avec un branding complet. Peut inclure fonctions avancées (agents
      multi-étapes, actions dans des systèmes tiers, raisonnement complexe).
    setup_duration: 2-4-semaines
    client_time_required_hours:
      min: 10
      max: 30
    total_cost_cad:
      setup_range:
        min: 5000
        max: 15000
      monthly_hosting_range:
        min: 50
        max: 500
      first_year: "5 600 à 21 000 $"
    recommended_tools_priority:
      - tool_id: botpress
        reason_fr: Plateforme québécoise (Montréal), développement no-code/low-code flexible, pas de majoration sur les coûts IA
      - tool_id: anthropic-api
        reason_fr: Pour contrôle total; Claude Sonnet 4 comme moteur, stack React/Supabase
      - tool_id: voiceflow
        reason_fr: Alternative à Botpress, très visuel
    fivepennyai_service_fr: |
      AI Sprint 2-4 semaines : développement, déploiement, formation,
      maintenance continue optionnelle (mensuelle).
    fivepennyai_revenue_potential: eleve-par-client-mais-volume-faible

