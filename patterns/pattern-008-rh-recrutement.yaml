# ───── MÉTADONNÉES INTERNES ─────

confidence_level: high
source_diversity: vendor-officials + comparison-articles + legal-publications + industry-publications

adaptation_needed_for_qc:
  - Privilégier Folks RH ou Agendrix comme première brique (québécois, conformes Loi 25)
  - Toujours inclure dans le livrable une clause type Bill 149 et Loi 25 pour les offres d'emploi
  - Expliquer la responsabilité résiduelle de l'employeur même avec IA (motifs protégés)
  - Documenter le « human in the loop » dans le protocole de gouvernance
  - Auditer les outils en français — beaucoup d'outils anglo-saxons (Manatal, HireVue) sont moins performants
  - Pour secteurs CCQ (construction) : intégration Nethris ou Employeur D obligatoire
  - Pour OBNL et coopératives : conformité accrue au respect des principes d'inclusion
  - Mentionner la certification Bonjour-démarche pour entreprises faisant affaires en français au Québec

# ───── NOTES HONNÊTES (usage interne uniquement) ─────

internal_notes_fr: |
  ANGLE DIFFÉRENCIATEUR PRINCIPAL : CONFORMITÉ LÉGALE 2026
  Aucun intégrateur québécois ne semble structurer son offre RH autour
  de la conformité Loi 25 (section 12.1) + Bill 149 + droits de la
  personne. Pourtant, les cabinets d'avocats canadiens (Osler, Torys,
  Boughton, Ogletree, Koskie Minsky) publient régulièrement sur les
  risques. C'est un angle commercial puissant pour 5PennyAi : « on
  vous installe l'IA RH ET on vous protège juridiquement ».

  ANGLE COMPLÉMENTAIRE : SIRH QUÉBÉCOIS PAR DÉFAUT
  Folks RH est québécois (Sherbrooke), Agendrix aussi. À pousser
  systématiquement comme première recommandation. Le marché est riche
  en alternatives locales (Folks, Agendrix, Collage, SIGMA-RH) — c'est
  rare et précieux.

  FORCE DE CE PATTERN :
  Pattern à fort ROI mesurable (heures RH économisées × taux horaire),
  mais aussi à risque légal réel. La gouvernance N'EST PAS optionnelle —
  elle protège le client ET 5PennyAi. Toujours inclure le protocole
  de gouvernance dans la voie B.

  ATTENTION AUX OUTILS « ANALYSE VIDÉO IA » :
  HireVue, Hirevire, Interviewer.ai font de l'analyse de vidéo
  asynchrone (ton de voix, expressions faciales, etc.). C'est le segment
  LE PLUS contesté légalement (class actions aux USA). À ne PAS
  recommander aux clients québécois sans audit légal préalable.
  Risque réputationnel pour 5PennyAi.

  POSITIONNEMENT 5PENNYAI :
  - Voie A : audit + setup outil léger + protocole simple (199-399 $)
  - Voie B : forfait complet conformité + multi-outils + formation,
    2 500-5 000 $ (cher mais justifié par la gouvernance)
  - Voie C : réservée aux grandes PME ou cas haute complexité,
    18 000-50 000 $

  CROSS-SELL :
  Client qui adopte la voie B sur RH = excellent prospect pour :
  - Pattern 007 (transcription d'entrevues avec Noota) → s'enchaîne
    naturellement
  - Pattern 003 (prise de RDV) → pour scheduling d'entrevues complexes
  - Pattern 002 (chatbot) → pour FAQ candidats et présélection
  - Pattern 005 (gestion courriels) → pour communications candidats
    automatisées
  Pattern 008 est central dans la « stack RH » d'une PME en croissance.

  PIÈGES À ÉVITER :
  - Ne JAMAIS proposer de l'IA RH sans gouvernance claire — risque
    légal direct pour le client.
  - Ne PAS recommander Workable + Folks RH simultanément à une micro-
    entreprise — c'est trop. Choisir l'un ou l'autre selon le profil.
  - Ne PAS sous-estimer le risque de discrimination algorithmique —
    le client est responsable même si l'IA décide.
  - Ne JAMAIS proposer des outils d'analyse vidéo IA (HireVue) sans
    audit légal. Risque réputationnel.

  CHIFFRES À NUANCER :
  - « 51 % des organisations utilisent l'IA en recrutement » (SHRM
    2025) inclut des usages très basiques (filtres mots-clés). Ne pas
    présenter comme « tout le monde fait du tri IA avancé ».
  - « Time-to-fill réduit de 6 sem à 2 sem » est un best case (claims
    de SitePoint), à présenter avec prudence (« certaines entreprises
    rapportent jusqu'à... »).
  - Les économies de coût per hire (4 700 $ moyen US) ne se transposent
    pas tel quel au Québec, où les salaires et coûts sont différents.

  TENDANCE 2026 À SURVEILLER :
  L'AIDA fédéral pourrait passer dans les 12-24 mois et imposer de
  nouvelles obligations (oversight humain, signalement d'incidents).
  Les SIRH québécois (Folks RH notamment) intègrent progressivement
  plus d'IA — surveiller les évolutions pour ajuster les recommandations.
  La concurrence pourrait s'éveiller à l'angle conformité, donc 5PennyAi
  doit y aller vite.

