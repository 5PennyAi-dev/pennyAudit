# ───── PROBLÈME (voix du client pour narratif) ─────

pain_point_fr: |
  Je gère trois restaurants. Tous les mois, je reçois des dizaines de
  CV pour des postes de cuisinier ou de serveur, et la moitié des
  candidats ne se présentent même pas à l'entrevue. Je passe mes
  soirées à lire des CV, à appeler des gens qui ne rappellent pas, à
  reprogrammer des entrevues qui sautent. Pendant ce temps, mes équipes
  manquent de bras pour le service du soir. Je sais qu'il y a des outils
  d'IA pour aider, mais j'ai entendu parler de cas d'IA qui « rejette
  des candidats à cause d'erreurs » et de nouvelles lois au Québec et
  en Ontario qui obligent à divulguer quand on utilise l'IA. Je ne
  veux ni perdre du temps, ni me retrouver devant la Commission des
  droits de la personne.

problem_facts:
  - claim_fr: "L'adoption de l'IA en recrutement a augmenté de 428 % depuis 2023 selon iHire 2025"
    source_id: sitepoint-ai-sourcing
  - claim_fr: "51 % des organisations utilisent l'IA pour le recrutement et 89 % des pros RH rapportent des gains de temps selon SHRM 2025"
    source_id: pin-ai-recruitment-comparison
  - claim_fr: "Le coût moyen d'embauche aux États-Unis est de 4 700 $ selon SHRM 2025 Recruiting Benchmarking Report"
    source_id: pin-ai-recruitment-comparison
  - claim_fr: "Les top usages IA en recrutement : rédaction d'offres (66 %), screening de CV (44 %), automation des recherches (32 %) selon SHRM 2025"
    source_id: pin-ai-recruitment-comparison
  - claim_fr: "Le temps moyen pour pourvoir un poste est d'environ 6 semaines, certains outils d'IA réduisent ce délai à 2 semaines selon SitePoint"
    source_id: sitepoint-ai-sourcing
  - claim_fr: "L'Ontario Bill 149, en vigueur depuis le 1er janvier 2026, oblige les employeurs de 25+ employés à divulguer l'usage de l'IA dans les offres d'emploi publiques"
    source_id: osler-employment-considerations
  - claim_fr: "La Loi 25 du Québec, section 12.1, exige depuis 2022 d'informer toute personne sujette à une décision exclusivement automatisée et de lui offrir un mécanisme de révision humaine"
    source_id: ogletree-ai-job-postings

# ───── SOLUTION (prose + structure) ─────

solution_summary_fr: |
  On déploie une combinaison ciblée selon le profil. Pour une PME
  québécoise standard avec recrutement régulier, le coeur est un SIRH
  québécois (Folks RH ou Agendrix selon le profil) qui inclut un ATS
  natif et gère nativement la conformité Loi 25 / CNESST / CCQ. On
  ajoute une couche IA légère : assistant Claude ou ChatGPT pour
  rédiger les offres d'emploi inclusives, fonctions IA natives du SIRH
  pour le tri préliminaire des CV, et possiblement un chatbot de
  présélection (Paradox, Humanly) pour les secteurs à haut volume
  (resto, retail, manufacturier). Pour les entrevues, Noota (français,
  spécialisations recrutement) transcrit, génère des rapports candidats
  structurés et alimente l'ATS. La pièce critique souvent oubliée :
  un protocole de gouvernance qui (1) divulgue l'usage IA dans les
  offres, (2) maintient un humain dans la boucle pour toute décision
  finale, (3) audit périodique de biais. Cette gouvernance est aussi
  importante que les outils.

deployment_modes:
  - id: sirh-quebecois-tout-en-un
    name_fr: SIRH québécois tout-en-un avec ATS intégré
    description_fr: |
      Folks RH, Agendrix, Collage RH, Humi. Centralise dossiers
      employés, ATS, paie, congés, performance. Conformité Loi 25,
      CNESST, normes du travail provinciales. Bilingue français-anglais.
      Approche recommandée par défaut pour PME québécoise.

  - id: ats-international-ia-native
    name_fr: ATS international avec IA native
    description_fr: |
      Workable, Manatal, Zoho Recruit, Greenhouse, Lever. ATS
      sophistiqués avec parsing de CV, matching de candidats, analytics.
      Plus profond fonctionnellement que les SIRH québécois sur la
      partie recrutement, mais souvent en anglais d'abord et hébergement
      USA.

  - id: chatbot-screening-conversationnel
    name_fr: Chatbot de présélection conversationnel
    description_fr: |
      Paradox (Olivia), Humanly. Discute avec les candidats par SMS,
      chat ou WhatsApp pour qualifier, programmer entrevues, répondre
      aux questions. Idéal pour secteurs à haut volume (resto, retail,
      hôtellerie, centres d'appels).

  - id: video-interview-asynchrone
    name_fr: Entrevue vidéo asynchrone IA
    description_fr: |
      HireVue, Hirevire, Interviewer.ai. Le candidat enregistre des
      réponses à des questions standardisées; l'IA analyse et score.
      Réduit le temps de premières entrevues. Attention : usage à risque
      de biais et de contestation; à utiliser avec garde-fous.

  - id: ia-generative-redaction
    name_fr: IA générative pour rédaction RH
    description_fr: |
      Claude, ChatGPT, Textio. Rédiger des offres d'emploi inclusives,
      anti-bias dans le langage, des courriels de réponse aux candidats,
      des trames d'entrevue. Couche complémentaire à n'importe quel
      ATS.

  - id: sourcing-passif
    name_fr: Sourcing IA de candidats passifs
    description_fr: |
      hireEZ, Gem, LinkedIn Recruiter. Cherche dans les bases de
      données publiques et LinkedIn pour identifier des candidats qui
      ne postulent pas. Outils plus B2B / pour cabinets de recrutement
      ou postes hautement qualifiés.

  - id: custom-agent
    name_fr: Agent IA custom RH
    description_fr: |
      Pipeline custom (Claude API + Make/n8n + ATS) pour cas spécifiques :
      logique métier propre à l'entreprise (ex: matching technicien
      construction selon RBQ, expertise spécifique), intégration à un
      ERP ou système de paie maison, ou exigence de conformité Loi 25
      stricte avec hébergement Canada.

typical_capabilities:
  - Rédaction d'offres d'emploi en quelques minutes (avec IA générative)
  - Optimisation anti-bias du langage des offres (Textio)
  - Distribution automatique sur multiples sites d'emploi
  - Parsing de CV et extraction structurée des données
  - Matching candidats vs exigences du poste avec scoring
  - Présélection conversationnelle (chatbot 24/7)
  - Programmation d'entrevues (intégration calendriers)
  - Transcription et résumé d'entrevues
  - Évaluations de compétences automatisées
  - Génération de rapports candidats comparatifs
  - Onboarding automatisé (formulaires, signatures, accès)
  - Suivi de performance et engagement employés
  - Gestion des congés et absences
  - Conformité TPS/TVQ/CNESST/CCQ (outils québécois)
  - Disclosure automatique d'usage de l'IA (conformité Bill 149 + Loi 25)

# ───── VOIES D'IMPLÉMENTATION (core du pattern) ─────

implementation_paths:

  - id: self-serve
    name_fr: Voie A — Self-serve (autonomie)
    ideal_profile_fr: |
      PME 5-25 employés, recrutement modéré (3-15 embauches/an), pas de
      département RH dédié (souvent le propriétaire ou l'adjoint qui
      s'en occupe). Budget serré. Souvent : restaurants indépendants,
      petits commerces de détail, agences créatives, cabinets
      professionnels en croissance. Veut moderniser sans projet lourd.
    description_fr: |
      Le client active un SIRH abordable (Folks RH plan d'entrée ~5 $/
      employé/mois ou Agendrix ~5 $/utilisateur/mois) ou un ATS
      international léger (Manatal 15 $/utilisateur/mois, Zoho Recruit
      25 $). Pour la rédaction d'offres et de courriels candidats, il
      utilise Claude ou ChatGPT (gratuit ou 20 $/mois). 5PennyAi fournit
      un audit qui recommande les bons outils, les modèles d'offres
      d'emploi conformes Bill 149 (incluant la mention IA), un guide
      des prompts utiles (rédiger une offre, comparer 5 CV, préparer
      une trame d'entrevue), et un protocole de gouvernance simple
      (qui revoit les décisions IA, comment documenter).
    setup_duration: 4-10-heures
    client_time_required_hours:
      min: 4
      max: 12
    total_cost_cad:
      setup_range:
        min: 0
        max: 400
      monthly_min: 30
      monthly_max: 200
      first_year: "360 à 2 800 $"
    recommended_tools_priority:
      - tool_id: folks-rh
        reason_fr: SIRH québécois, ATS inclus, conformité native, à partir de 4-7 $/employé/mois
      - tool_id: agendrix
        reason_fr: Si équipe à horaires variables (resto, retail, services)
      - tool_id: manatal
        reason_fr: Si focus pur ATS international, 15 $/utilisateur/mois
      - tool_id: claude-ai
        reason_fr: Pour rédiger offres inclusives, comparer CV, préparer trames d'entrevue
      - tool_id: zoho-recruit
        reason_fr: Si déjà dans l'écosystème Zoho
    fivepennyai_service_fr: |
      Audit payant (199-399 $) : analyse du profil de recrutement,
      choix d'outil, configuration de base, modèles d'offres conformes
      Bill 149, guide de prompts IA personnalisés, protocole de
      gouvernance simple (1-2 pages), formation 1-2 h.
    fivepennyai_revenue_potential: faible-a-moyen-par-client

  - id: accompanied
    name_fr: Voie B — Accompagnement hybride (setup + formation + gouvernance)
    ideal_profile_fr: |
      PME 25-100 employés, recrutement régulier (15-50 embauches/an),
      souvent département RH d'une à trois personnes débordées. Volume
      qui justifie un chatbot de présélection ou des automatisations
      profondes. Souvent : restaurants à plusieurs locations, retail
      multi-magasins, manufacturiers, centres d'appels, agences de
      service, cabinets en croissance.
    description_fr: |
      5PennyAi configure une stack complète : SIRH québécois (Folks RH
      Pro ou Agendrix Plus), ATS international si besoin de profondeur
      (Workable Standard ou Greenhouse pour postes professionnels),
      chatbot de présélection (Paradox ou Humanly pour secteurs haut
      volume), Noota pour transcription des entrevues, Claude pour
      rédaction. Inclut : (1) audit complet du processus de recrutement
      actuel, (2) configuration multi-utilisateurs, (3) modèles d'offres
      d'emploi inclusives et conformes Bill 149 + Loi 25, (4) intégration
      au calendrier et au courriel, (5) chatbot de présélection
      configuré pour les rôles types, (6) protocole de gouvernance
      détaillé (clauses contractuelles, qui revoit, comment documenter
      les décisions IA, audit de biais semestriel), (7) formation
      équipe 3-4 h avec module éthique IA, (8) support 30 jours.
    setup_duration: 1-3-semaines
    client_time_required_hours:
      min: 8
      max: 25
    total_cost_cad:
      setup_range:
        min: 2500
        max: 6000
      monthly_tool_range:
        min: 200
        max: 1000
      first_year: "4 900 à 18 000 $"
    recommended_tools_priority:
      - tool_id: folks-rh
        reason_fr: Première brique pour PME québécoise standard
      - tool_id: workable
        reason_fr: ATS profond pour postes professionnels et qualifiés
      - tool_id: paradox-olivia
        reason_fr: Chatbot de présélection pour resto, retail, hôtellerie haut volume
      - tool_id: humanly
        reason_fr: Alternative chatbot mid-market plus accessible que Paradox
      - tool_id: noota
        reason_fr: Transcription d'entrevues en français, sync ATS, analyses candidats
      - tool_id: textio
        reason_fr: Optimisation anti-bias des descriptions de poste
      - tool_id: hireez
        reason_fr: Sourcing passif si besoin de profils qualifiés rares
    fivepennyai_service_fr: |
      Forfait « Recrutement IA Conforme » : audit + setup multi-outils
      + chatbot configuré + intégrations + formation équipe + protocole
      de gouvernance + support 30 jours + audit de biais initial.
      Différenciation 5PennyAi : on inclut TOUJOURS la gouvernance,
      pas seulement l'outil.
    fivepennyai_revenue_potential: moyen-a-eleve-par-client

  - id: custom
    name_fr: Voie C — Solution sur mesure / souveraine
    ideal_profile_fr: |
      PME 100+ employés ou grande organisation avec exigences spécifiques :
      logique métier propre (ex: matching technicien construction selon
      RBQ + CCQ + permis spécifiques), intégration à un système métier
      propriétaire, volume élevé (200+ embauches/an), exigence Loi 25
      stricte avec hébergement Canada, ou besoin de bias audit formel
      avec documentation pour défense légale.
    description_fr: |
      5PennyAi déploie un agent IA custom : pipeline Claude API +
      Make/n8n + ATS de marché + stockage AWS Canada Central. L'agent
      peut : générer des offres ciblées par profil de candidat, scorer
      les CV selon une rubrique métier propre, déclencher des workflows
      de présélection multi-étapes, intégrer au système de paie québécois
      (Nethris, Employeur D), produire des rapports d'audit de biais
      mensuels avec déclencheurs de revue humaine. Inclut documentation
      complète de conformité Loi 25 et Bill 149 prête pour défense en
      cas de plainte.
    setup_duration: 6-14-semaines
    client_time_required_hours:
      min: 30
      max: 80
    total_cost_cad:
      setup_range:
        min: 18000
        max: 50000
      monthly_hosting_range:
        min: 200
        max: 1500
      first_year: "20 400 à 68 000 $"
    recommended_tools_priority:
      - tool_id: anthropic-api
        reason_fr: Claude pour qualité française et raisonnement explicable
      - tool_id: make-zapier
        reason_fr: Orchestration des workflows multi-systèmes
      - tool_id: nethris-employeur-d
        reason_fr: Intégration au système de paie québécois pour onboarding
    fivepennyai_service_fr: |
      AI Sprint 8-14 semaines : audit conformité légale, conception,
      développement, intégration ERP/SIRH/paie, déploiement, formation,
      documentation conformité Loi 25 + Bill 149. Idéal pour grandes
      PME québécoises ou agences de placement avec volume soutenu.
    fivepennyai_revenue_potential: tres-eleve-par-client-mais-volume-faible
    honest_note_fr: |
      La voie custom est rarement nécessaire pour la majorité des PME
      québécoises. À réserver aux cas avec volume élevé, logique métier
      vraiment unique, ou risque légal réel justifiant un investissement
      important en gouvernance documentée. Pour 80 % des clients, la
      voie B avec Folks RH + Workable + chatbot couvre amplement.

