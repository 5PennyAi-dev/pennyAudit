# ───── INTÉGRATEURS IA QUÉBÉCOIS (CONCURRENCE DIRECTE) ─────

quebec_competitors:
  - name: Folks (services + plateforme)
    url: https://folksrh.com
    positioning_fr: Plateforme + accompagnement RH; concurrent à 5PennyAi sur la voie B
    note_fr: |
      Concurrent indirect : Folks vend sa propre plateforme et offre
      du conseil sur son déploiement. 5PennyAi peut se positionner
      comme l'auditeur indépendant qui recommande Folks ou un autre
      outil selon le profil — vs Folks qui pousse toujours sa solution.

  - name: Cabinets-conseil RH québécois (Iris, Pratus, etc.)
    url: null
    positioning_fr: Conseil RH traditionnel sans focus IA
    note_fr: |
      Concurrents indirects : ils font du conseil RH sans expertise
      IA forte. 5PennyAi peut s'intégrer en complémentarité ou en
      partenariat pour la dimension automatisation/IA.

  - name: Cabinets de recrutement (Bedard, Adecco, Randstad, etc.)
    url: null
    positioning_fr: Recrutement externalisé classique
    note_fr: |
      Pas la même prestation. 5PennyAi aide le client à recruter
      lui-même mieux; les cabinets recrutent à sa place. Complémentaires
      pour postes critiques.

  - name: FloatAI
    url: https://www.floatai.ca
    positioning_fr: Automatisation pour PME québécoises; pourrait inclure RH
    note_fr: Concurrent indirect; pas spécialisé RH mais peut en faire partie.

  - name: Gestisoft
    url: https://www.gestisoft.com
    positioning_fr: Microsoft Dynamics et solutions ERP/CRM, possiblement RH
    note_fr: Concurrent sur clients Microsoft.

strategic_note_fr: |
  L'automatisation RH par IA est un domaine où 5PennyAi a un angle
  différenciateur exceptionnel : la conformité légale canadienne
  2026 (Loi 25 + Bill 149 + droits de la personne). Aucun intégrateur
  québécois ne semble structurer son offre autour de cet angle, alors
  que les cabinets d'avocats canadiens (Osler, Torys, Boughton, Ogletree)
  publient régulièrement sur les risques. Différenciation 5PennyAi :
  (1) audit indépendant qui recommande l'outil selon le profil (pas
  vendor-locked sur Folks ou Workable), (2) gouvernance toujours
  incluse (clauses de divulgation, protocole de revue humaine, audit
  de biais), (3) priorité aux outils québécois pour SIRH (Folks,
  Agendrix) — ce qui résonne avec les valeurs locales et simplifie la
  conformité Loi 25 par construction.

