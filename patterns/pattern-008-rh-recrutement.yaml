# ───── RISQUES ─────

risks:
  - type: reglementaire-qc
    title_fr: Loi 25 section 12.1 — décisions automatisées et droit à révision humaine
    severity: important
    description_fr: |
      Au Québec, depuis 2022, toute décision « exclusivement automatisée »
      qui affecte un individu doit être divulguée à la personne
      concernée, qui a le droit de connaître les principaux facteurs
      ayant mené à la décision et de demander une révision humaine.
      S'applique aux décisions de tri de CV, de présélection automatique,
      de scoring de candidats, etc. dès qu'elles sont prises sans
      intervention humaine significative.
    mitigation_fr: |
      Règle absolue : maintenir un « humain dans la boucle » pour toute
      décision finale (rejet de candidat, invitation à entrevue, embauche).
      L'IA recommande, l'humain décide et documente. Inclure dans le
      protocole de gouvernance : qui revoit, comment, dans quel délai,
      où est documentée la décision. Préparer une procédure de révision
      sur demande du candidat (clause type dans les communications RH).

  - type: reglementaire-on-can
    title_fr: Bill 149 Ontario — divulgation de l'usage d'IA dans offres d'emploi
    severity: moyen
    description_fr: |
      Effective depuis le 1er janvier 2026, l'Ontario Working for
      Workers Four Act exige que tout employeur de 25+ employés
      divulgue dans ses offres d'emploi publiques s'il utilise l'IA
      pour screener, évaluer ou sélectionner les candidats. Sanctions
      jusqu'à 100 000 $ par infraction.
    mitigation_fr: |
      Pour clients pan-canadiens ou ayant des employés en Ontario :
      ajouter une mention type dans toutes les offres publiques
      (« Cette annonce est publiée par un employeur qui utilise des
      outils d'IA dans le processus de présélection des candidatures »).
      Documenter quels outils sont utilisés à quelle étape pour pouvoir
      répondre à une demande de précision.

  - type: reglementaire-droits-personne
    title_fr: Discrimination — 17 critères protégés (Code des droits)
    severity: important
    description_fr: |
      L'IA reproduit les biais des données d'entraînement. Une décision
      d'embauche discriminatoire reste illégale même si prise par un
      algorithme — l'employeur reste responsable. Cas documentés aux
      USA : class actions contre HireVue, Amazon (algo qui pénalisait
      les CV avec mots associés au féminin), etc. Au Canada, motifs
      protégés incluent : race, origine, ethnicité, citoyenneté,
      religion, sexe, orientation, identité de genre, âge, état civil,
      situation de famille, handicap, casier judiciaire, etc.
    mitigation_fr: |
      (1) Audit de biais initial avant déploiement (analyser les
      résultats du tri sur un échantillon historique pour détecter des
      biais); (2) audit semestriel pour détecter les dérives; (3)
      formation des équipes RH à reconnaître les biais; (4) éviter les
      outils opaques (HireVue analyse vidéo notamment) si on ne peut
      pas expliquer les décisions; (5) privilégier des outils avec
      bias controls documentés (Greenhouse Blind Recruitment, Textio,
      etc.).

  - type: technique
    title_fr: Hallucinations et erreurs de tri
    severity: moyen
    description_fr: |
      L'IA peut rejeter des candidats qualifiés sur base d'erreurs de
      parsing (CV non standard, formats inhabituels) ou
      d'« hallucinations » sur les compétences. Cas anecdotiques
      rapportés par Koskie Minsky et plusieurs publications légales.
    mitigation_fr: |
      Maintenir une revue humaine systématique des rejets IA pour les
      premiers 3-6 mois. Tester l'outil avec un échantillon de CV
      historiques (incluant des CV de personnes embauchées avec succès)
      pour valider la précision. Documenter les faux négatifs et
      ajuster les règles.

  - type: technique
    title_fr: Exclusivité linguistique
    severity: faible-a-moyen
    description_fr: |
      Plusieurs outils IA (Manatal, HireVue, certains modules de
      Workable) sont moins performants en français qu'en anglais. Au
      Québec, où la majorité des candidats postulent en français,
      cela peut désavantager systématiquement certains profils.
    mitigation_fr: |
      Pour les clients québécois francophones : tester en français
      avant déploiement. Privilégier les outils bilingues (Folks RH,
      Agendrix, Noota) ou Claude/ChatGPT pour la rédaction qui gèrent
      bien le français. Pour les outils anglais-first, ajouter une
      étape humaine pour les CV en français.

  - type: business
    title_fr: Expérience candidat dégradée par excès d'automatisation
    severity: moyen
    description_fr: |
      Si tout le processus est automatisé (chatbot, vidéo asynchrone,
      scoring), le candidat peut se sentir « processé » plutôt que
      considéré, et choisir un concurrent qui offre un contact humain.
      Sur un marché en pénurie de main-d'œuvre (cuisine, soins,
      construction au Québec), c'est un vrai risque de désengagement.
    mitigation_fr: |
      Garder un contact humain à au moins une étape du processus
      (idéalement la première vraie entrevue). Configurer les chatbots
      avec un ton chaleureux et la possibilité d'« parler à un humain »
      à tout moment. Mesurer le taux d'abandon en cours de processus
      et ajuster.

  - type: business
    title_fr: Perception interne et résistance des équipes RH
    severity: faible-a-moyen
    description_fr: |
      Les équipes RH peuvent percevoir l'IA comme une menace pour
      leurs emplois, ou comme une dévalorisation de leur expertise.
      Résistance silencieuse possible dans la mise en œuvre.
    mitigation_fr: |
      Positionner l'IA comme un assistant qui libère du temps pour
      les activités à plus forte valeur (entrevues, culture, conseil
      stratégique). Inclure les RH dans la conception du protocole
      de gouvernance — ils sont les garants de la conformité.

# ───── PRÉREQUIS ─────

prerequisites:
  - Volume minimum de recrutement justifiant l'investissement (3+ embauches/an pour voie A, 15+ pour voie B)
  - Consensus interne sur l'usage de l'IA en RH (direction + RH alignés)
  - Comptes employés bien tenus (pour bénéficier du SIRH au-delà du recrutement)
  - Politique de protection des renseignements personnels à jour (Loi 25)
  - Pour Bill 149 : volonté d'ajouter une clause type dans toutes les offres publiques
  - Pour clients sensibles : revue de la politique de confidentialité du fournisseur (utilisation des données pour entraîner l'IA notamment)
  - Identification d'un responsable RH ou propriétaire pour la gouvernance IA continue
  - Compréhension de base que l'IA recommande mais l'humain décide (philosophie « human in the loop »)

