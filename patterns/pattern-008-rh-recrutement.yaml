# Pattern 008 — Automatisation RH et recrutement par IA
# Format hybride : structure machine + prose humaine
# Trois voies d'implémentation (self-serve, accompagné, custom)
# ═══════════════════════════════════════════════════════════════

id: ai-hr-recruitment-automation
title_fr: Automatisation RH et recrutement par IA (tri CV, présélection, entrevues)
category: ressources-humaines-recrutement
version: 1.0
last_updated: 2026-04-26
language: fr

# ───── RÉSUMÉS (prose narrative pour livrable client) ─────

summary_short_fr: >
  Utilisation d'un SIRH québécois (Folks RH, Agendrix) combiné à des
  outils IA pour automatiser la rédaction d'offres d'emploi, le tri
  des CV, la présélection conversationnelle, la programmation
  d'entrevues et l'onboarding, le tout en respectant la Loi 25 et les
  obligations anti-discrimination.

summary_long_fr: |
  L'automatisation RH par IA couvre cinq fonctions principales :
  (1) rédiger des offres d'emploi inclusives et optimisées en quelques
  minutes, (2) trier et classer les CV selon les exigences réelles du
  poste, (3) présélectionner les candidats via un chatbot conversationnel
  (questions clés, disponibilités, salaire attendu), (4) programmer les
  entrevues automatiquement et les transcrire/résumer, (5) automatiser
  l'onboarding administratif. Selon SHRM 2025, 51 % des organisations
  utilisent déjà l'IA en recrutement et 89 % des professionnels RH
  utilisant l'IA rapportent des gains de temps. Les top usages sont la
  rédaction d'offres (66 %), le screening de CV (44 %), et l'automatisation
  des recherches (32 %). Au Canada, deux nouvelles obligations légales
  rendent ce pattern à la fois attrayant et délicat : (a) la Loi 25 du
  Québec, en vigueur depuis 2022, exige depuis sa section 12.1 que
  toute décision « exclusivement automatisée » soit divulguée au candidat,
  avec droit de révision humaine, (b) l'Ontario Bill 149 (Working for
  Workers Four Act) exige depuis le 1er janvier 2026 que les employeurs
  de 25+ employés divulguent l'usage d'IA dans les offres d'emploi
  publiques. À cela s'ajoute la responsabilité anti-discrimination
  (17 critères protégés au Canada) qui ne s'efface pas parce que l'IA
  a pris la décision. Le rôle de 5PennyAi : aider à automatiser sans
  faire dérailler la conformité.

# ───── COMPLÉMENTARITÉ AVEC AUTRES PATTERNS ─────

complementary_patterns:
  - pattern_id: ai-meeting-transcription-summary
    relation_fr: |
      Les entrevues d'embauche sont des réunions à enjeu fort. Le
      pattern 007 (Noota notamment, spécialisé recrutement) gère la
      transcription, l'évaluation structurée, la comparaison de
      candidats. Les deux patterns s'enchaînent naturellement dans
      le processus de recrutement.

  - pattern_id: ai-appointment-scheduling
    relation_fr: |
      La programmation d'entrevues est un sous-cas de prise de RDV.
      Cal.com, Calendly et GoodTime peuvent gérer la coordination de
      panels d'entrevue complexes (multiple intervieweurs, fuseaux
      horaires, salles). Pattern 003 fournit la couche scheduling.

  - pattern_id: ai-text-chatbot-multichannel
    relation_fr: |
      Les chatbots de présélection (Paradox Olivia, Humanly) sont une
      spécialisation des chatbots multi-canal. Pattern 002 fournit
      la base technique; ce pattern ajoute la couche métier RH.

