# ───── KPIs SECTORIELS PERTINENTS ─────

sectoral_kpis:

  acquisition:
    - leads_generes_par_mois
    - cout_par_lead
    - taux_conversion_lead_a_rendez-vous
    - taux_conversion_rendez-vous_a_mandat
    - sources_de_leads_top_3

  pipeline:
    - mandats_actifs_acheteurs
    - mandats_actifs_vendeurs
    - duree_moyenne_mandat_vendeur_en_jours
    - duree_moyenne_recherche_acheteur_en_jours
    - taux_de_renouvellement_mandats_expires

  performance:
    - transactions_fermees_par_mois
    - prix_moyen_des_transactions
    - commissions_recues_par_mois
    - taux_de_commission_moyen
    - delta_prix_demande_vs_prix_de_vente

  satisfaction:
    - net_promoter_score_clients
    - taux_de_references_par_clients_passes
    - reviews_google_recues_par_mois
    - taux_de_clients_repeats_5_ans

  efficience_temporelle:
    - heures_par_transaction_completee
    - ratio_heures_visites_vs_admin
    - delai_de_reponse_moyen_aux_leads_en_minutes

# ───── PAIN POINTS SPÉCIFIQUES À CE SEGMENT ─────

sector_specific_pain_points:

  - pain_id: leads-perdus
    pain_fr: Leads perdus dans la boîte courriel ou téléphone non répondu
    severity: critique
    frequency: quotidien
    description_fr: |
      Le courtier solo manque environ 30 % de ses appels en haute
      saison. Les courriels de qualification arrivent souvent tard
      le soir et restent sans réponse pendant 12-24 h. Selon Lindy,
      la vitesse de réponse est le déterminant #1 de la conversion
      des leads.
    relevant_pattern: ai-voice-receptionist + ai-text-chatbot-multichannel

  - pain_id: suivi-inconsistant
    pain_fr: Suivi inconsistant des leads chauds et tièdes
    severity: critique
    frequency: hebdomadaire
    description_fr: |
      Sans CRM structuré, le courtier oublie de relancer un lead
      tiède 3 semaines après le premier contact. Ces leads partent
      chez la concurrence. Excel n'aide pas — il faut un CRM avec
      automatisation des relances.
    relevant_tools: [follow-up-boss, top-producer, ai-email-management]

  - pain_id: descriptions-redondantes
    pain_fr: Rédaction de fiches Centris répétitive et chronophage
    severity: moyen
    frequency: par-mandat
    description_fr: |
      Une fiche Centris bien rédigée prend 30-60 minutes en mode
      manuel. Pour un courtier qui ouvre 20 mandats par an, c'est
      10-20 heures annuelles. Claude ou ChatGPT peut faire un premier
      draft en 5 minutes que le courtier ajuste.
    relevant_pattern: ai-marketing-content-creation

  - pain_id: photos-mediocres
    pain_fr: Photos de propriétés faibles ou pièces vides peu attractives
    severity: moyen
    frequency: par-mandat
    description_fr: |
      Pour les propriétés vides ou en rénovation, les photos brutes
      ne vendent pas. Le virtual staging AI résout ce problème à un
      coût marginal. Selon NAR, virtual staging augmente les visites
      jusqu'à 200 %.
    relevant_tool: virtual-staging-ai

  - pain_id: visites-mal-coordonnees
    pain_fr: Coordination des visites manuelle et stressante
    severity: moyen
    frequency: hebdomadaire
    description_fr: |
      Coordonner une visite implique : confirmer disponibilité du
      vendeur, du courtier acheteur, du courtier vendeur, gérer les
      annulations et reports. Un outil comme BrokerBay (canadien)
      automatise ça.
    relevant_pattern: ai-appointment-scheduling
    relevant_tool: brokerbay

  - pain_id: rencontres-non-documentees
    pain_fr: Rencontres avec vendeurs/acheteurs non documentées correctement
    severity: moyen
    frequency: hebdomadaire
    description_fr: |
      Les briefings initiaux avec vendeurs (état souhaité, prix
      espéré, motivations) et la qualification des acheteurs
      (besoins, budget, timing) reposent sur la mémoire ou des notes
      manuscrites. La transcription automatique avec Fathom ou Otter
      change la donne.
    relevant_pattern: ai-meeting-transcription-summary

  - pain_id: revenus-imprevisibles
    pain_fr: Stress des revenus variables et pipeline imprécis
    severity: critique
    frequency: continu
    description_fr: |
      Le courtier solo vit avec un stress constant : combien de
      transactions vais-je fermer ce mois-ci ? Un tableau de bord
      pipeline avec prévisions (mandats × probabilité × commission
      moyenne) donne de la visibilité.
    relevant_pattern: ai-data-dashboards

  - pain_id: marketing-personnel-chronophage
    pain_fr: Personal branding et présence sociale exigeants en temps
    severity: moyen
    frequency: hebdomadaire
    description_fr: |
      Le courtier doit publier 3-7 posts/semaine pour rester visible.
      Souvent fait en mode improvisé. Claude ou ChatGPT pour idées
      et premiers drafts, Canva pour visuels.
    relevant_pattern: ai-marketing-content-creation

# ───── RISQUES SECTORIELS À INTERNALISER ─────

sector_risks:

  - type: oaciq-conformite
    title_fr: Archivage 6 ans des communications
    severity: critique
    description_fr: |
      Toute communication avec un client (courriel, message texte,
      voicemail) liée à une transaction doit être archivée 6 ans.
      Si un chatbot IA répond à un client, ces interactions doivent
      être logguées et accessibles.
    mitigation_fr: |
      Choisir des outils IA avec export et historique consultable.
      Configurer une politique de rétention 7+ ans. Documenter les
      interactions importantes dans le CRM.

  - type: oaciq-publicite
    title_fr: Règles publicitaires OACIQ pour contenu généré
    severity: important
    description_fr: |
      Toute publicité d'un courtier doit respecter les règles OACIQ :
      mention du statut de courtier, nom de l'agence, pas de promesses
      trompeuses. Si l'IA génère du contenu publicitaire, le courtier
      doit le réviser pour conformité.
    mitigation_fr: |
      Inclure dans les prompts IA les règles OACIQ comme contraintes.
      Réviser systématiquement avant publication. Templates pré-validés
      par la bannière.

  - type: loi-25-donnees-clients
    title_fr: Loi 25 — collecte de données financières et personnelles
    severity: important
    description_fr: |
      Les courtiers collectent des données très sensibles : revenus,
      capacité d'emprunt, situation familiale, motivations. Tout
      outil IA traitant ces données est sous Loi 25.
    mitigation_fr: |
      (1) Préférer outils avec hébergement Canada quand possible.
      (2) Anonymiser les données avant envoi à un LLM public.
      (3) Documenter les finalités de collecte. (4) Consentement
      éclairé du client. (5) Si profilage automatisé (ex: scoring
      leads), divulgation et droit à révision.

  - type: scraping-centris
    title_fr: Restrictions Centris/Matrix sur usage automatisé
    severity: moyen
    description_fr: |
      Les conditions d'utilisation de Centris et Matrix interdisent
      généralement l'extraction automatique pour usage commercial.
      Tout outil IA qui prétend extraire des données de Centris est
      à valider légalement.
    mitigation_fr: |
      Utiliser uniquement les intégrations officielles (Centris IDX
      pour sites web). Éviter les outils qui scrapent. Quand un
      outil propose d'extraire de Centris, demander la documentation
      légale et la conformité avec les TOS.

  - type: erreurs-juridiques-iaa
    title_fr: Erreurs IA dans documents légaux (promesses d'achat, etc.)
    severity: critique
    description_fr: |
      Si l'IA aide à rédiger ou réviser des promesses d'achat,
      contre-offres, déclarations du vendeur, elle peut commettre
      des erreurs juridiques avec impact financier important.
    mitigation_fr: |
      Ne jamais utiliser une IA générative pour produire un document
      légal final. Limiter à : (a) résumés de documents existants,
      (b) explications en langage simple aux clients, (c) première
      ébauche de clauses standards à valider avec un notaire.

# ───── COMPETITION DANS LE SEGMENT ─────

competitive_landscape_fr: |
  Le segment IA + immobilier est en croissance rapide mais peu
  pénétré au Québec. Les courtiers québécois moyens utilisent peu
  d'IA en 2026, malgré 87 % d'adoption mondiale rapportée par Delta
  Media. Causes principales : (1) outils principalement en anglais
  (Follow Up Boss, Top Producer, Lofty), (2) intégrations limitées
  avec Centris/Matrix (vs MLS US), (3) bannières québécoises (RE/MAX
  Québec, Royal LePage Québec) qui n'ont pas encore poussé l'IA
  fortement, (4) méfiance vis-à-vis de l'IA dans une profession
  réglementée (OACIQ). Ce gap crée une opportunité pour 5PennyAi de
  se positionner comme l'auditeur indépendant qui aide le courtier
  québécois à choisir et configurer la bonne stack — sans dépendance
  à une bannière ou à un fournisseur unique.

  Concurrents potentiels :
  - Bannières (RE/MAX, Royal LePage) qui pourraient pousser des
    outils IA propres : à surveiller, mais souvent en retard sur
    l'adoption
  - Cabinets-conseil immobilier généralistes : pas spécialisés IA
  - Intégrateurs IA québécois généralistes (FloatAI, etc.) : pas
    spécialisés immobilier
  - Coaches immobiliers (Tom Ferry, Mike Ferry) qui poussent des
    pratiques sans nécessairement de stack IA technique

# ───── ANGLES COMMERCIAUX 5PENNYAI ─────

fivepennyai_positioning_fr: |
  L'angle commercial le plus fort : positionner 5PennyAi comme
  « l'auditeur indépendant qui démystifie l'IA pour les courtiers
  québécois ». La majorité des courtiers savent qu'ils devraient
  utiliser plus d'IA mais ne savent pas par où commencer ni quels
  outils choisir. Un audit 5PennyAi à 199-499 $ leur donne :
  (1) un diagnostic de leur situation actuelle, (2) une recommandation
  d'outils adaptés à leur profil (résidentiel volume, solo), (3) un
  plan d'implémentation par étapes, (4) un protocole de gouvernance
  OACIQ + Loi 25.

  Cibles commerciales prioritaires :
  - Courtiers solo établis (5+ ans dans le métier, 15+ transactions/
    an) qui plafonnent en volume — l'IA débloque la croissance.
  - Nouvelles bannières disruptives (exp Realty, EXIT) qui valorisent
    la technologie comme différenciation.
  - Équipes de 2-3 personnes qui se professionnalisent et ont besoin
    d'un stack cohérent.

  Cross-sell naturel :
  - Si le courtier a des contacts dans d'autres métiers (notaires,
    inspecteurs, hypothécaires), 5PennyAi peut les approcher avec
    les mêmes patterns adaptés.

