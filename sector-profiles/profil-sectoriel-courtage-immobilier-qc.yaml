id: secteur-courtage-immobilier-qc-residentiel
title_fr: Courtage immobilier résidentiel au Québec
type: profil-sectoriel
version: 1.0
last_updated: 2026-04-26
language: fr

# ───── CIBLAGE ─────

primary_segment_fr: |
  Courtier ou courtière immobilière résidentiel(le) sous l'égide d'une
  bannière (RE/MAX, Royal LePage, Sutton, Via Capitale, Centris, Engel
  & Völkers, KW, exp Realty, etc.), opérant solo ou en très petite
  équipe (1-3 personnes : courtier + adjoint, ou paire de co-courtiers).
  Marché : transactions résidentielles standards (premier achat,
  familles, condos urbains, maisons unifamiliales, jeunes acheteurs).
  Volume typique : 15-30 transactions par année.

secondary_segments_fr:
  - Équipes de 4-15 personnes (courtiers, adjoints administratifs)
  - Courtiers de luxe et haut de gamme (besoins similaires mais focus marketing premium)
  - Bannières et agences (15+ courtiers) — angle B2B où la bannière équipe ses courtiers

excluded_segments_fr:
  - Courtage commercial et industriel (réalités très différentes — analyses financières, négociations longues, écosystème distinct)
  - Promoteurs immobiliers et constructeurs neufs (autre métier, autres outils)
  - Investisseurs immobiliers (besoins data différents — focus rendement, multi-logements)

# ───── PROFIL DU COURTIER CIBLE ─────

courtier_persona_fr: |
  Bachelier ou DEC, 30-55 ans, autonome, organisé mais souvent débordé
  pendant les hautes saisons (mars-juin et septembre-octobre). Travaille
  en moyenne 50-60 heures par semaine, avec pics jusqu'à 70 heures lors
  des semaines à fortes transactions. Revenus variables (commissions),
  ce qui crée une pression constante pour gérer le pipeline. Souvent
  bilingue selon le marché (West Island, Outaouais, certaines parties
  de Montréal). Souvent membre d'un team chez sa bannière, mais
  responsable de son propre stack technologique.

  Profil technologique typique : utilisateur d'iPhone, app Centris,
  Authentisign, Outlook ou Gmail, CRM Excel ou Google Sheets, Mailchimp
  pour newsletters, photographe externe, présence Facebook/Instagram
  pour personal branding. Connaît les fondamentaux de l'IA mais n'a
  pas le temps de s'y plonger. A souvent essayé ChatGPT pour rédiger
  une fiche, mais sans approche structurée.

typical_volume_fr:
  leads_per_year: 50-200
  active_mandates: 15-30
  transactions_per_year: 15-30
  showings_per_week_high_season: 10-20
  showings_per_week_low_season: 3-5
  emails_per_day: 50-100
  phone_calls_per_day: 15-30
  social_media_posts_per_week: 3-7

# ───── ÉCOSYSTÈME RÉGLEMENTAIRE QUÉBÉCOIS ─────

regulatory_framework:

  - id: oaciq
    name: OACIQ (Organisme d'autoréglementation du courtage immobilier du Québec)
    url: https://www.oaciq.com
    description_fr: |
      Organisme régulateur unique au Québec qui supervise tous les
      courtiers et agences immobilières. Tout courtier doit détenir
      un permis OACIQ valide, suivre des formations continues, et
      respecter le Code de déontologie. L'OACIQ peut suspendre un
      permis pour faute professionnelle.
    key_obligations_fr:
      - Archivage de tous les dossiers de transaction pendant 6 ans minimum
      - Respect du Code de déontologie (intégrité, transparence, conflits d'intérêts)
      - Tenue de dossiers conforme (formulaires obligatoires, traces de communications)
      - Formations continues annuelles (OBC — Obligations de formation continue)
      - Divulgation au client des liens d'agence (vendeur ou acheteur)
      - Respect des règles publicitaires (pas de promesses trompeuses, divulgation du statut)
    ai_implications_fr: |
      Tout système IA qui génère des communications avec un client
      (courriels, messages texte, suggestions de propriétés) doit
      laisser une trace exploitable pour l'archivage 6 ans. Tout
      contenu publicitaire généré par IA doit respecter les règles
      OACIQ (pas de promesses, statut OACIQ visible). Le courtier
      reste responsable des communications, même si générées par IA.

  - id: loi-25-quebec
    name: Loi 25 — Loi modernisant des dispositions législatives en matière de protection des renseignements personnels
    url: https://www.cai.gouv.qc.ca
    description_fr: |
      Législation québécoise en vigueur depuis 2022 (et progressivement
      jusqu'en 2024) qui encadre la collecte, l'utilisation et la
      divulgation de renseignements personnels. Particulièrement
      pertinente en immobilier où les courtiers collectent énormément
      de données sensibles : revenus, situation familiale, capacité
      d'emprunt, intentions d'achat ou de vente, antécédents.
    key_obligations_fr:
      - Désigner un responsable de la protection des renseignements personnels
      - Politique de confidentialité accessible et compréhensible
      - Consentement éclairé à la collecte (chaque finalité doit être documentée)
      - Évaluation des facteurs relatifs à la vie privée (EFVP) pour projets sensibles
      - Section 12.1 — Décisions automatisées doivent être divulguées au client, avec droit à révision humaine
      - Notification des incidents de confidentialité à la CAI et aux personnes concernées
      - Sanctions jusqu'à 25 millions $ ou 4 % du chiffre d'affaires mondial
    ai_implications_fr: |
      Si un courtier utilise un outil IA qui prend des décisions
      automatisées sur les clients (par exemple, scoring automatique
      de leads pour décider qui contacter en priorité, segmentation
      automatique pour recommandations), il doit informer le client
      et offrir un mécanisme de révision humaine. L'usage de LLMs
      publics (ChatGPT, Claude version web) avec données client
      sensibles est délicat — préférer anonymisation ou versions API
      avec politique de non-rétention.

  - id: lcjti
    name: Loi sur les courtiers en immeubles et la Loi sur le courtage immobilier
    url: https://www.legisquebec.gouv.qc.ca/fr/document/lc/c-73.2
    description_fr: |
      Cadre législatif qui définit les obligations spécifiques des
      courtiers immobiliers au Québec. Contient des dispositions sur
      les promesses d'achat, les conditions de vente, les déclarations
      du vendeur, les inspections, et les obligations de bonne foi.
    ai_implications_fr: |
      Tout outil IA qui aide à générer ou réviser des promesses
      d'achat, contre-offres, ou autres documents légaux doit être
      utilisé avec précaution — l'IA peut commettre des erreurs
      juridiques. Le courtier reste personnellement responsable de
      la conformité légale des documents.

# ───── ÉCOSYSTÈME DES OUTILS METIER (NON-IA) ─────

industry_specific_tools:

  - id: centris
    name: Centris.ca (Système national d'inscriptions Québec)
    url: https://www.centris.ca
    type: mls-systeme-listing
    description_fr: |
      Système national d'inscriptions des propriétés au Québec, opéré
      par les chambres immobilières. Quasi-obligatoire pour tout
      courtier résidentiel — c'est là que les propriétés sont listées
      et que les acheteurs cherchent. Site grand public et système
      back-office (Matrix) pour les courtiers.
    ai_compatibility_fr: |
      Les conditions d'utilisation de Centris sont strictes —
      l'extraction automatique (scraping) des données pour usage
      commercial est généralement interdite. Tout outil IA qui
      prétend extraire des données de Centris doit être validé sur
      le plan légal avant déploiement. Centris a son propre IDX
      (Internet Data Exchange) pour intégrations légitimes sur les
      sites web des courtiers.

  - id: matrix
    name: Matrix (Système MLS)
    url: null
    type: mls-systeme-back-office
    description_fr: |
      Système back-office utilisé par les courtiers pour gérer leurs
      inscriptions, faire des recherches comparatives, créer des CMA
      (analyses comparatives de marché). Accessible uniquement aux
      courtiers actifs.

  - id: synbad
    name: Synbad (OACIQ)
    url: https://www.oaciq.com
    type: gestion-transactions
    description_fr: |
      Outil de gestion des transactions de l'OACIQ — formulaires
      réglementaires, suivi des dossiers, archivage. Obligatoire
      pour la conformité OACIQ.

  - id: authentisign
    name: Authentisign / DocuSign
    url: https://www.authentisign.com
    type: signature-electronique
    description_fr: |
      Outils de signature électronique adoptés massivement par les
      courtiers québécois. Authentisign est intégré nativement à
      WEBForms (système de formulaires standardisés OACIQ).
      DocuSign est l'alternative internationale.

  - id: brokerbay
    name: BrokerBay
    url: https://www.brokerbay.com
    type: gestion-visites
    description_fr: |
      Application mobile populaire au Canada pour la gestion des
      visites de propriétés (showings). Permet aux courtiers
      acheteurs de demander des visites, et aux courtiers vendeurs
      de gérer les confirmations. Spécifique au marché canadien.

  - id: weblead-leadpages
    name: WebLeads, LeadPages, et formulaires de capture
    url: null
    type: capture-leads
    description_fr: |
      Outils de capture de leads via formulaires web, alertes nouvelles
      propriétés, demandes d'évaluation gratuite. Souvent intégrés à
      la bannière du courtier.

  - id: ciq-jlr
    name: CIQ et JLR (analyses de marché)
    url: https://www.jlr.ca
    type: analyse-marche
    description_fr: |
      Plateformes québécoises d'analyse du marché immobilier. JLR est
      souvent utilisé par les courtiers pour produire des CMA (analyses
      comparatives de marché) et des rapports d'évaluation. CIQ
      (Centris Intelligence Québec) fournit des statistiques de marché.

  - id: hellosafe-rates
    name: HelloSafe, ratehub.ca (taux hypothécaires)
    url: https://www.ratehub.ca
    type: taux-hypothecaires
    description_fr: |
      Plateformes de comparaison des taux hypothécaires que les
      courtiers utilisent pour informer leurs clients acheteurs sur
      les options de financement.

