# ───── PATTERNS 5PENNYAI RECOMMANDÉS POUR CE PROFIL ─────

recommended_patterns_combinations:

  - combination_id: solo-essentiel
    name_fr: Combo « Solo essentiel » — démarrage à coût minimal
    target_fr: Courtier solo qui veut moderniser son stack sans grand investissement
    patterns_priorities:
      - pattern_id: ai-voice-receptionist
        priority: 1
        rationale_fr: |
          Capter les appels prospects 24/7 quand il est en visite ou
          en négociation. AgentZap ou Avoca selon le profil. Filet de
          sécurité essentiel pour ne pas perdre de leads.
      - pattern_id: ai-text-chatbot-multichannel
        priority: 2
        rationale_fr: |
          Chatbot Crisp ou Tidio sur le site personnel pour qualifier
          les visiteurs (acheteur ou vendeur, urgence, secteur d'intérêt).
      - pattern_id: ai-marketing-content-creation
        priority: 3
        rationale_fr: |
          Claude ou ChatGPT pour générer descriptions Centris en
          quelques minutes au lieu d'une heure. Canva pour images
          réseaux sociaux.
      - pattern_id: ai-email-management
        priority: 4
        rationale_fr: |
          Gmail ou Outlook avec filtres et templates. Mailchimp ou
          Brevo pour newsletters mensuelles aux clients passés.
    estimated_cost_cad:
      setup: "499 $ (audit 5PennyAi)"
      monthly: "150-300 $"
      first_year: "2 300-4 100 $"
    fivepennyai_offering_fr: Audit Voie A à 499 $ + accompagnement 1 mois.

  - combination_id: solo-volume
    name_fr: Combo « Solo volume » — courtier établi visant croissance
    target_fr: Courtier solo avec 15+ transactions/an voulant scaler vers 30+
    patterns_priorities:
      - pattern_id: ai-voice-receptionist
        priority: 1
        rationale_fr: AgentZap ou Avoca avec volumes élevés
      - pattern_id: ai-text-chatbot-multichannel
        priority: 2
        rationale_fr: Crisp avec routing avancé
      - pattern_id: ai-appointment-scheduling
        priority: 3
        rationale_fr: Cal.com pour visites de propriétés avec préparation
      - pattern_id: ai-marketing-content-creation
        priority: 4
        rationale_fr: Claude + Canva + Make pour distribution multi-canal
      - pattern_id: ai-email-management
        priority: 5
        rationale_fr: Mailchimp avec segmentation acheteurs/vendeurs/anciens clients
      - pattern_id: ai-meeting-transcription-summary
        priority: 6
        rationale_fr: |
          Fathom ou Otter pour transcrire les rencontres avec vendeurs
          (briefing initial) et acheteurs (qualification besoins).
          Souvent oublié, mais énorme gain.
    additional_industry_specific_tools:
      - virtual-staging-ai
      - matterport
      - follow-up-boss
    estimated_cost_cad:
      setup: "2 500-4 000 $ (forfait 5PennyAi Voie B)"
      monthly: "400-800 $"
      first_year: "7 300-13 600 $"
    fivepennyai_offering_fr: Forfait Voie B + intégration outils sectoriels immobiliers.

  - combination_id: petite-equipe
    name_fr: Combo « Petite équipe » — duo ou trio (courtier + adjoints)
    target_fr: 1-3 personnes (courtier + adjoint admin, ou paire de courtiers)
    patterns_priorities:
      - pattern_id: ai-voice-receptionist
        priority: 1
      - pattern_id: ai-text-chatbot-multichannel
        priority: 2
      - pattern_id: ai-appointment-scheduling
        priority: 3
      - pattern_id: ai-marketing-content-creation
        priority: 4
      - pattern_id: ai-email-management
        priority: 5
      - pattern_id: ai-meeting-transcription-summary
        priority: 6
      - pattern_id: ai-data-dashboards
        priority: 7
        rationale_fr: |
          Tableau de bord pipeline (mandats actifs, leads, transactions
          fermées vs prévues, commissions à recevoir). Looker Studio
          gratuit avec Google Sheets, ou Zoho Analytics.
    additional_industry_specific_tools:
      - follow-up-boss
      - virtual-staging-ai
      - matterport
      - structurely
    estimated_cost_cad:
