# ───── NOTES INTERNES ─────

internal_notes_fr: |
  USAGE DE CE PROFIL DANS LE PIPELINE 5PENNYAI

  Ce profil est consommé par le Skill 1 (Context Builder) lorsqu'il
  identifie l'industrie du client comme « courtage immobilier »,
  « agent immobilier », « courtier immobilier », ou termes proches.

  Le Skill 1 doit :
  1. Charger ce profil sectoriel en entier
  2. Combiner avec les réponses du formulaire d'intake du client
  3. Produire un Portrait sectoriel enrichi qui inclut :
     - Volumes typiques attendus pour ce profil
     - Pain points sectoriels probables
     - Outils d'écosystème déjà présents (Centris, Matrix, Authentisign)
     - Cadre réglementaire (OACIQ + Loi 25 immobilier)
  4. Le Skill 2 (Opportunity matcher) utilise ces informations pour
     adapter le matching des patterns horizontaux et leur priorité

  POINTS À VALIDER LORS DES BETA-TESTS

  - Validation que les volumes typiques (15-30 transactions/an)
    correspondent au marché québécois réel
  - Adoption réelle des CRM IA (Follow Up Boss, Top Producer) chez
    les courtiers québécois — peut-être plus faible que rapporté
    aux USA
  - Tolérance aux outils anglais — beaucoup de courtiers québécois
    sont bilingues, mais leur clientèle peut ne pas l'être
  - Pertinence des combinaisons « solo essentiel » vs « solo volume »
    vs « petite équipe » — calibrer en fonction des retours

  GAPS À COMBLER DANS LES PATTERNS HORIZONTAUX

  Modifications recommandées (à appliquer en revue groupée) :
  - Pattern 001 : ajouter agent-immobilier et courtier-immobilier
    aux target_industries; ajouter Ylopo en Tier 2 immo
  - Pattern 002 : ajouter target_industries; mention Structurely en
    Tier 2 immo
  - Pattern 003 : ajouter target_industries; mention BrokerBay et
    ShowingTime AI en Tier 2 immo
  - Pattern 004 : ajouter target_industries; mention spécifique des
    fiches Centris dans description; mention ValPal en Tier 2 immo
  - Pattern 005 : ajouter target_industries
  - Pattern 007 : ajouter target_industries; exemple briefing vendeur
  - Pattern 009 : ajouter target_industries; mention KPIs immo
    spécifiques (transactions/mois, mandats actifs, commission moyenne)

  Pattern 006 (devis/factures) : peu pertinent pour courtier solo
  (commissions traitées par bannière). Ne pas modifier sauf cas
  d'équipe organisée.

  Pattern 008 (RH) : non pertinent pour solo (1-3 pers). Pertinent
  uniquement à partir de 5+ employés.

  PATTERNS FUTURS QUI COMBLERONT LES TROUS RESTANTS

  - Pattern 015 (Vente B2B) : Tier 2 dédié aux CRM immobiliers
    (Follow Up Boss, Top Producer, Lofty, Rex Software, SmartZip)
  - Pattern 020 (Création visuelle générative) : section dédiée
    virtual staging (Virtual Staging AI, Collov, REimagineHome,
    BoxBrownie) et photographie immobilière

  ÉTUDE COMMERCIALE FUTURE

  Si les beta-tests valident ce profil, considérer :
  - Partenariat avec une bannière québécoise (RE/MAX Québec, Royal
    LePage Québec) pour distribuer les audits 5PennyAi à leurs
    courtiers
  - Webinaires dédiés courtiers : « IA pour courtiers résidentiels —
    par où commencer »
  - Contenu pour réseaux sociaux LinkedIn ciblant les courtiers
    établis en croissance plateau
